<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shift Flows</title>
<style>
body { font-family: Arial, sans-serif; padding: 40px; max-width: 900px; margin: auto; }
ul { line-height: 1.6; }
</style>
</head>
<body>

<h1>Shift Check‑In / Check‑Out Flows</h1>

<h2>Shift Check‑In</h2>
<ul>
<li>How are you arriving today?</li>
<li>Is there anything you want to park?</li>
<li>What value do you want to hold this shift?</li>
</ul>

<h2>Shift Check‑Out</h2>
<ul>
<li>What stays with you from this shift?</li>
<li>What went okay?</li>
<li>What can you hand over or let go of?</li>
</ul>

</body>
</html>
