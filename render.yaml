services:
  - type: web
    name: indicare-frontend-next
    env: node
    plan: starter
    region: frankfurt
    branch: main
    rootDir: indicare-frontend-next
    buildCommand: rm -rf .next && npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_ORB_UI_BUILD
        value: "2000"
      - key: NEXT_PUBLIC_ENVIRONMENT
        value: production
      - key: NEXT_PUBLIC_CANONICAL_FRONTEND
        value: indicare-frontend-next
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://childrens-homes-assistant-backend-new.onrender.com
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://childrens-homes-assistant-backend-new.onrender.com
      - key: BACKEND_URL
        value: https://childrens-homes-assistant-backend-new.onrender.com
  - type: web
    name: childrens-homes-assistant-backend-new
    env: python
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENV
        value: production
      - key: APP_ENV
        value: production
      - key: ENABLE_DEBUG_ROUTES
        value: false
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: APP_BASE_URL
        value: https://app.indicare.co.uk
      - key: FRONTEND_APP_URL
        value: https://indicare-frontend-next.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://indicare-frontend-next.onrender.com,https://app.indicare.co.uk,https://api.indicare.co.uk
      - key: CORS_ALLOWED_ORIGINS
        value: https://indicare-frontend-next.onrender.com,https://app.indicare.co.uk,https://api.indicare.co.uk
      - key: PASSKEY_RP_ID
        value: app.indicare.co.uk
      - key: PASSKEY_ALLOWED_ORIGINS
        value: https://app.indicare.co.uk,https://indicare-frontend-next.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
