services:
  - type: web
    name: indicare-os
    env: python
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENV
        value: production
      - key: APP_ENV
        value: production
      - key: ENABLE_DEBUG_ROUTES
        value: false
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: APP_BASE_URL
        value: https://app.indicare.co.uk
      - key: CORS_ALLOWED_ORIGINS
        value: https://app.indicare.co.uk
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
