<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notifications | IndiCare Care OS</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7faf9;color:#10201f}.wrap{padding:20px}.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:16px}.head h1{margin:0;font-size:24px}.head p{margin:4px 0 0;color:#5f746f}.list{display:grid;gap:10px}.item{background:#fff;border:1px solid #d8e4e0;border-radius:16px;padding:12px}.item strong{display:block}.item p{margin:5px 0 0;color:#5f746f}.unread{border-color:#163b3a}.empty{color:#5f746f;font-weight:700}.error{background:#fff1f2;border-color:#fecdd3;color:#8a1230}
  </style>
</head>
<body>
  <main class="wrap">
    <header class="head">
      <div><h1>Notifications</h1><p>Unread alerts, reminders and system updates.</p></div>
      <button id="refreshBtn">Refresh</button>
    </header>
    <section id="list" class="list"><p class="empty">Loading notifications…</p></section>
  </main>
  <script>
    async function loadNotifications(){
      const list=document.getElementById('list');
      try{
        const res=await fetch('/notifications',{credentials:'include',headers:{Accept:'application/json'}});
        if(res.status===401){window.top.location.replace('/login?next=/care-os#notifications');return}
        const data=await res.json();
        if(!res.ok)throw new Error(data.detail||'Notifications unavailable');
        const items=Array.isArray(data)?data:(data.items||[]);
        list.innerHTML='';
        if(!items.length){list.innerHTML='<p class="empty">No notifications.</p>';return}
        items.forEach(n=>{const el=document.createElement('div');el.className='item '+(n.read?'':'unread');el.innerHTML='<strong>'+escapeHtml(n.title||'Notification')+'</strong><p>'+escapeHtml(n.message||'')+'</p>';list.appendChild(el)})
      }catch(e){list.innerHTML='<div class="item error"><strong>Unable to load</strong><p>'+escapeHtml(String(e.message||e))+'</p></div>'}
    }
    function escapeHtml(v){return String(v||'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]))}
    document.getElementById('refreshBtn').addEventListener('click',loadNotifications);loadNotifications();
  </script>
</body>
</html>
