<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I-Notes</title>
  <link rel="stylesheet" href="/ai-notes.css" />
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <h1>I-Notes</h1>
        <p>Record, transcribe, edit, save.</p>
      </div>
      <div class="row">
        <a href="/" class="btn light">Dashboard</a>
        <button id="recordBtn" class="btn primary">Record meeting</button>
      </div>
    </header>

    <main class="grid">
      <section class="card main">
        <div class="row between">
          <div>
            <h2>Current note</h2>
            <p class="muted">Transcript on the left, editable note on the right.</p>
          </div>
          <span id="status" class="pill">Ready</span>
        </div>

        <div class="row">
          <input id="title" placeholder="Note title" />
          <input id="prompt" placeholder="Describe a change... e.g. make this more professional" />
        </div>

        <div class="row">
          <button id="transcribeBtn" class="btn dark" disabled>Transcribe</button>
          <button id="aiBtn" class="btn light">Apply AI</button>
          <button id="saveBtn" class="btn success">Save</button>
          <button id="printBtn" class="btn light">Print</button>
          <button id="pdfBtn" class="btn light">PDF</button>
          <button id="docxBtn" class="btn light">DOCX</button>
          <button id="clearBtn" class="btn danger">Clear</button>
        </div>

        <div class="editor">
          <div>
            <label>Transcript</label>
            <textarea id="transcript" placeholder="Transcript..."></textarea>
          </div>
          <div>
            <label>Note</label>
            <textarea id="note" class="big" placeholder="AI note..."></textarea>
          </div>
        </div>
      </section>

      <aside class="card side">
        <div class="row between">
          <div>
            <h2>Saved notes</h2>
            <p class="muted">Only your notes.</p>
          </div>
          <button id="refreshBtn" class="btn light">Refresh</button>
        </div>
        <div id="empty" class="muted">No saved notes yet.</div>
        <table>
          <thead><tr><th>Title</th><th>Updated</th><th>Actions</th></tr></thead>
          <tbody id="list"></tbody>
        </table>
      </aside>
    </main>
  </div>

  <div id="modal" class="modal hide">
    <div class="rec">
      <div class="small">Recording live</div>
      <div id="timer" class="timer">00:00</div>
      <div id="recState" class="muted">Recording...</div>
      <div class="mic" id="mic">🎤</div>
      <div class="row center">
        <button id="pauseBtn" class="btn light" disabled>Pause</button>
        <button id="resumeBtn" class="btn light" disabled>Resume</button>
        <button id="stopBtn" class="btn danger" disabled>Stop</button>
      </div>
    </div>
  </div>

  <audio id="audio" controls hidden></audio>
  <div id="toast" class="toast"></div>
  <script src="/ai-notes.js"></script>
</body>
</html>
