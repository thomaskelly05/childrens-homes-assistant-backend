<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IndiCare Rostering</title>
  <link rel="stylesheet" href="/css/rostering.css" />
</head>
<body>
  <div class="rostering-shell">
    <header class="rostering-topbar">
      <div class="title-wrap">
        <h1>IndiCare Rostering</h1>
        <p>Residential workforce operating system</p>
      </div>

      <div class="rostering-actions">
        <input type="number" id="homeId" value="1" min="1" />
        <input type="date" id="weekStart" />
        <button id="loadWeekBtn">Load week</button>
        <button id="buildWeekBtn">Build week</button>
        <button id="publishWeekBtn" class="primary">Publish + SMS</button>
        <button id="payrollBtn">Payroll export</button>
        <button id="evidenceBtn">Evidence pack</button>
      </div>
    </header>

    <section class="summary-strip">
      <div class="summary-card">
        <span class="summary-label">Publication</span>
        <strong id="publicationStatus">Draft</strong>
      </div>
      <div class="summary-card">
        <span class="summary-label">Warnings</span>
        <strong id="warningCount">0</strong>
      </div>
      <div class="summary-card">
        <span class="summary-label">Attendance</span>
        <strong id="attendanceCount">0</strong>
      </div>
      <div class="summary-card">
        <span class="summary-label">SMS</span>
        <strong id="smsCount">0</strong>
      </div>
    </section>

    <section class="rostering-main">
      <aside class="staff-sidebar">
        <div class="panel-head">
          <h2>Available staff</h2>
        </div>
        <div id="staffList"></div>
      </aside>

      <main class="rota-board-wrap">
        <div id="warningPanel"></div>
        <div id="rotaBoard"></div>
      </main>

      <aside class="manager-sidebar">
        <div class="panel-head">
          <h2>Attendance</h2>
        </div>
        <div id="attendancePanel" class="side-list"></div>

        <div class="panel-head top-gap">
          <h2>SMS delivery</h2>
        </div>
        <div id="smsPanel" class="side-list"></div>
      </aside>
    </section>
  </div>

  <script src="/js/rostering.js"></script>
</body>
</html>
