<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IndiCare OS | Residential Workforce</title>
  <link rel="stylesheet" href="/css/rostering.css" />
</head>
<body>
  <div class="rostering-shell">
    <header class="rostering-topbar">
      <div class="title-wrap">
        <h1>IndiCare <span class="os-badge">OS</span></h1>
        <p>Children's Residential Compliance & Rostering</p>
      </div>

      <div class="rostering-actions">
        <div class="input-group">
          <label>Home ID</label>
          <input type="number" id="homeId" value="1" min="1" />
        </div>
        <div class="input-group">
          <label>Week Commencing</label>
          <input type="date" id="weekStart" />
        </div>
        <button id="loadWeekBtn">Sync</button>
        <button id="buildWeekBtn">Auto-Gen Template</button>
        <button id="publishWeekBtn" class="primary">Publish & SMS Notify</button>
        <div class="secondary-actions">
            <button id="payrollBtn" title="Export CSV">Payroll</button>
            <button id="evidenceBtn" title="Compliance Pack">Evidence</button>
        </div>
      </div>
    </header>

    <section class="summary-strip">
      <div class="summary-card" id="stat-publication">
        <span class="summary-label">Status</span>
        <strong id="publicationStatus">Draft</strong>
      </div>
      <div class="summary-card danger-card" id="stat-warnings">
        <span class="summary-label">Compliance Gaps</span>
        <strong id="warningCount">0</strong>
      </div>
      <div class="summary-card" id="stat-agency">
        <span class="summary-label">Agency Usage</span>
        <strong id="agencyCount">0</strong>
      </div>
      <div class="summary-card" id="stat-attendance">
        <span class="summary-label">Live Attendance</span>
        <strong id="attendanceCount">0</strong>
      </div>
    </section>

    <section class="rostering-main">
      <aside class="staff-sidebar">
        <div class="panel-head">
          <h2>Staff Directory</h2>
          <small>Drag to assign</small>
        </div>
        <div id="staffList"></div>
      </aside>

      <main class="rota-board-wrap">
        <div id="warningPanel"></div>
        <div id="rotaBoard"></div>
      </main>

      <aside class="manager-sidebar">
        <div class="panel-head">
          <h2>Verified Logs</h2>
        </div>
        <div class="tabs">
            <button class="tab-btn active">Attendance</button>
        </div>
        <div id="attendancePanel" class="side-list"></div>

        <div class="panel-head top-gap">
          <h2>SMS Gateway</h2>
        </div>
        <div id="smsPanel" class="side-list"></div>
      </aside>
    </section>
  </div>

  <script src="/js/rostering.js"></script>
</body>
</html>
