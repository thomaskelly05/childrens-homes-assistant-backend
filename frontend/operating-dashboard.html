<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Care Hub OS | IndiCare OS</title>
  <link rel="stylesheet" href="/css/operating-dashboard.css" />
</head>
<body class="indicare-care-hub-body">
  <div id="careHubSidebar"></div>

  <main class="ops-shell">
    <header class="ops-header">
      <h1>Care Hub OS</h1>
    </header>

    <section id="opsStatus">Loading…</section>

    <section class="ops-grid ops-grid-main">
      <div id="opsTodayList" class="ops-card"></div>
      <div id="opsLifecycleList" class="ops-card"></div>
    </section>

    <section class="ops-grid ops-grid-three">
      <div id="opsApprovalsList" class="ops-card"></div>
      <div id="opsActionsList" class="ops-card"></div>
      <div id="opsSafeguardingList" class="ops-card"></div>
    </section>
  </main>

  <script type="module">
    import "/js/care-hub-sidebar.js";
    window.IndiCareCareHubSidebar?.bindCareHubSidebar?.();
  </script>
  <script type="module" src="/js/operating-dashboard.js"></script>
</body>
</html>
