<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IndiCare | Assistant</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <main class="ica-main" id="appMain">
        <header class="ica-topbar">
            <h2>IndiCare Assistant</h2>
            <div style="display: flex; gap: 8px;">
                <button id="privacyBtn" class="ica-icon-btn" title="Quick Privacy Blur (Hide Screen)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
                <button class="ica-icon-btn" title="New Chat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"></path>
                    </svg>
                </button>
            </div>
        </header>

        <section class="ica-chat" id="chatArea">
            <div class="msg msg-ai">Hello. How can I assist you with your residential care duties today?</div>
        </section>

        <div class="ica-composer">
            <div class="ica-chatbar">
                
                <label for="docUpload" class="ica-chatbar-icon" title="Upload Document">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                    </svg>
                </label>
                <input type="file" id="docUpload" hidden>

                <button id="micBtn" class="ica-chatbar-icon" title="Dictate Message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="22"></line>
                    </svg>
                </button>

                <textarea id="chatInput" class="ica-textarea" rows="1" placeholder="Type a message or click the mic to speak..."></textarea>

                <button id="sendBtn" class="ica-send-btn">Send</button>
            </div>

            <div class="ica-footer-note-wrap">
                <div class="ica-note">
                    <strong>Important:</strong> Always accuracy-check AI outputs against the facts provided, current guidance, and your organisation’s policy before use.
                </div>
                <div class="ica-copyright">
                    &copy; 2026 IndiCare. All rights reserved.
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
