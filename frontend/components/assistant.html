<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IndiCare OS | Command Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f6f8fc;
      --panel:#ffffff;
      --line:#e2e8f0;
      --text:#1e293b;
      --muted:#64748b;
      --accent:#2563eb;
      --accent-soft:rgba(37,99,235,.08);
      --danger:#dc2626;
      --user:#e8eef9;
      --shadow:0 10px 30px rgba(15,23,42,.06);
      --sidebar-mini:72px;
      --sidebar-full:290px;
      --radius:18px;
    }

    body.theme-dark{
      --bg:#0f172a;
      --panel:#111827;
      --line:#334155;
      --text:#f1f5f9;
      --muted:#94a3b8;
      --accent:#3b82f6;
      --accent-soft:rgba(59,130,246,.12);
      --danger:#ef4444;
      --user:#1e293b;
      --shadow:0 10px 30px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}
    body{
      background:var(--bg);
      color:var(--text);
      height:100dvh;
      overflow:hidden;
      -webkit-font-smoothing:antialiased;
    }

    button,select,textarea,input{
      font:inherit;
      border:none;
      outline:none;
      background:none;
      color:inherit;
    }

    button{
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    a{color:inherit;text-decoration:none}

    .app{
      display:flex;
      height:100%;
      width:100%;
      position:relative;
    }

    .sidebar{
      width:var(--sidebar-mini);
      background:var(--panel);
      border-right:1px solid var(--line);
      transition:.25s;
      overflow:hidden;
      z-index:20;
      display:flex;
      flex-direction:column;
    }

    .sidebar.open{width:var(--sidebar-full)}

    .sidebar-inner{
      width:var(--sidebar-full);
      height:100%;
      display:flex;
      flex-direction:column;
      padding:12px;
    }

    .sidebar-top{
      display:flex;
      align-items:center;
      gap:12px;
      min-height:48px;
    }

    .icon-btn,.nav-btn,.primary-btn,.send-btn,.small-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:.2s;
    }

    .icon-btn{
      width:40px;height:40px;border-radius:12px;color:var(--muted);
    }

    .icon-btn:hover{background:var(--accent-soft);color:var(--accent)}

    .brand{
      font-weight:700;
      font-size:1.05rem;
      color:var(--accent);
      white-space:nowrap;
    }

    .sidebar-content{
      opacity:0;
      pointer-events:none;
      transition:.15s;
      display:flex;
      flex-direction:column;
      height:100%;
    }

    .sidebar.open .sidebar-content{
      opacity:1;
      pointer-events:auto;
    }

    .primary-btn{
      width:100%;
      background:linear-gradient(180deg, var(--accent), #1d4ed8);
      color:#fff;
      border-radius:14px;
      padding:12px;
      font-weight:700;
      margin-top:14px;
      box-shadow:var(--shadow);
    }

    .nav{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:14px;
    }

    .nav-btn{
      justify-content:flex-start;
      gap:12px;
      width:100%;
      padding:12px;
      border-radius:14px;
      color:var(--muted);
      font-weight:600;
    }

    .nav-btn:hover,.nav-btn.active{
      background:var(--accent-soft);
      color:var(--accent);
    }

    .search{
      margin-top:12px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px 12px;
      background:var(--bg);
      color:var(--text);
      width:100%;
    }

    .history{
      flex:1;
      overflow:auto;
      margin-top:12px;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding-right:2px;
    }

    .history-item{
      border:1px solid transparent;
      border-radius:14px;
      padding:8px;
      transition:.2s;
      background:transparent;
    }

    .history-item:hover,.history-item.active{
      background:var(--accent-soft);
      border-color:var(--line);
    }

    .history-row{
      display:flex;
      align-items:center;
      gap:6px;
    }

    .history-main{
      flex:1;
      min-width:0;
      justify-content:flex-start;
      padding:7px 8px;
      border-radius:10px;
      color:var(--text);
      text-align:left;
    }

    .history-main:hover{background:rgba(255,255,255,.08)}

    .history-title{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-size:.92rem;
      font-weight:500;
    }

    .small-btn{
      width:30px;height:30px;border-radius:10px;color:var(--muted);flex-shrink:0;
    }

    .small-btn:hover{background:var(--accent-soft);color:var(--accent)}
    .small-btn.danger:hover{background:rgba(220,38,38,.08);color:var(--danger)}

    .workspace{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
    }

    .header{
      height:66px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.8);
      backdrop-filter:blur(10px);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 16px;
      gap:12px;
    }

    body.theme-dark .header{
      background:rgba(17,24,39,.8);
    }

    .header-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .title{
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:-.02em;
    }

    .header-right{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .chat{
      flex:1;
      overflow:auto;
      padding:20px 16px 8px;
    }

    .chat-inner{
      max-width:860px;
      margin:0 auto;
    }

    .welcome{
      border:1px dashed var(--line);
      background:linear-gradient(180deg, rgba(37,99,235,.04), rgba(37,99,235,.02));
      border-radius:24px;
      padding:42px 26px;
      text-align:center;
      color:var(--muted);
      margin-top:7vh;
    }

    .welcome h1{
      color:var(--text);
      font-size:2.25rem;
      margin-bottom:10px;
      letter-spacing:-.05em;
      line-height:1.05;
    }

    .welcome p{
      max-width:680px;
      margin:0 auto;
      line-height:1.6;
      font-size:1rem;
    }

    .messages{
      display:flex;
      flex-direction:column;
      gap:22px;
    }

    .msg-wrap{
      display:flex;
      gap:12px;
      width:100%;
    }

    .msg-wrap.user{flex-direction:row-reverse}

    .avatar{
      width:34px;height:34px;border-radius:12px;
      background:var(--line);
      flex-shrink:0;
      font-size:.75rem;
      font-weight:700;
      display:flex;align-items:center;justify-content:center;
      margin-top:2px;
    }

    .msg-wrap.assistant .avatar{
      background:var(--accent);
      color:#fff;
      box-shadow:var(--shadow);
    }

    .msg-block{
      max-width:86%;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .msg{
      line-height:1.72;
      color:var(--text);
      overflow-wrap:anywhere;
      white-space:normal;
      font-size:.97rem;
    }

    .msg-wrap.user .msg{
      background:var(--user);
      padding:13px 16px;
      border-radius:20px 20px 8px 20px;
      color:#0f172a;
      box-shadow:var(--shadow);
    }

    body.theme-dark .msg-wrap.user .msg{color:#f8fafc}

    .msg-wrap.assistant .msg{
      padding:2px 0;
    }

    .msg p{margin:0 0 12px}
    .msg p:last-child{margin-bottom:0}
    .msg h3{
      margin:16px 0 8px;
      color:var(--accent);
      font-size:1rem;
      font-weight:700;
      letter-spacing:-.01em;
    }
    .msg ul{
      margin:10px 0 14px 22px;
      display:grid;
      gap:6px;
    }
    .msg li{
      padding-left:2px;
    }

    .msg-meta{
      font-size:.74rem;
      color:var(--muted);
    }

    .action-bar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
      opacity:0;
      transition:.2s;
    }

    .msg-wrap:hover .action-bar{opacity:1}

    .chip{
      border:1px solid var(--line);
      background:var(--bg);
      color:var(--accent);
      border-radius:999px;
      padding:7px 12px;
      font-size:.75rem;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 2px 8px rgba(15,23,42,.03);
    }

    .chip:hover{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }

    .doc-chip{
      max-width:860px;
      margin:0 auto 10px;
      display:none;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--panel);
      box-shadow:var(--shadow);
      color:var(--muted);
      font-size:.85rem;
    }

    .doc-chip.show{display:flex}

    .input-wrap{
      padding:12px 16px 16px;
      background:linear-gradient(180deg, transparent, rgba(15,23,42,.01));
    }

    .input-inner{
      max-width:860px;
      margin:0 auto;
    }

    .input-box{
      border:1px solid var(--line);
      background:var(--panel);
      border-radius:26px;
      box-shadow:var(--shadow);
      padding:8px 12px;
    }

    .input-row{
      display:flex;
      align-items:flex-end;
      gap:8px;
    }

    .textarea{
      flex:1;
      resize:none;
      background:transparent;
      color:var(--text);
      padding:10px 4px;
      max-height:120px;
      font-size:1rem;
      line-height:1.45;
    }

    .send-btn{
      width:44px;height:44px;border-radius:50%;
      background:linear-gradient(180deg, var(--accent), #1d4ed8);
      color:#fff;
      flex-shrink:0;
      box-shadow:var(--shadow);
    }

    .send-btn:disabled{opacity:.35;cursor:not-allowed}

    .helper{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:.76rem;
      padding:8px 6px 0;
    }

    .settings-overlay,.mobile-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      display:none;
      z-index:30;
    }

    .settings-overlay.show,.mobile-overlay.show{display:block}

    .settings-panel{
      position:fixed;
      top:0;right:-100%;
      width:340px;max-width:100vw;height:100dvh;
      background:var(--panel);
      border-left:1px solid var(--line);
      box-shadow:var(--shadow);
      z-index:40;
      transition:.25s;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .settings-panel.open{right:0}

    .settings-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .settings-card{
      border:1px solid var(--line);
      background:var(--bg);
      border-radius:16px;
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .settings-card label{
      font-size:.82rem;
      color:var(--muted);
      font-weight:700;
    }

    .settings-select{
      border:1px solid var(--line);
      border-radius:12px;
      background:var(--panel);
      padding:10px 12px;
      color:var(--text);
    }

    .settings-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .toggle{
      width:48px;height:28px;border-radius:999px;
      background:var(--line);
      position:relative;
      cursor:pointer;
      flex-shrink:0;
    }

    .toggle::after{
      content:"";
      position:absolute;
      top:3px;left:3px;
      width:22px;height:22px;border-radius:50%;
      background:#fff;
      transition:.2s;
    }

    .toggle.active{background:var(--accent)}
    .toggle.active::after{left:23px}

    .ghost-btn,.danger-btn{
      width:100%;
      border-radius:14px;
      padding:12px;
      justify-content:center;
      font-weight:700;
    }

    .ghost-btn{
      border:1px solid var(--line);
      color:var(--text);
      background:var(--panel);
    }

    .danger-btn{
      color:#fff;
      background:var(--danger);
    }

    .status{
      position:fixed;
      top:14px;left:50%;
      transform:translateX(-50%);
      z-index:50;
      background:#111827;
      color:#fff;
      padding:10px 14px;
      border-radius:12px;
      box-shadow:var(--shadow);
      font-size:.85rem;
      display:none;
      max-width:calc(100vw - 24px);
      text-align:center;
    }

    body.theme-dark .status{
      background:#f8fafc;
      color:#111827;
    }

    .typing::after{
      content:"▊";
      color:var(--accent);
      margin-left:2px;
      animation:blink 1s infinite;
    }

    @keyframes blink{
      0%,100%{opacity:1}
      50%{opacity:0}
    }

    @media (max-width:768px){
      body{
        overflow:hidden;
      }

      .sidebar{
        position:fixed;
        left:0;top:0;bottom:0;
        transform:translateX(-100%);
        width:86vw !important;
        max-width:310px;
        box-shadow:var(--shadow);
      }

      .sidebar.open{
        transform:translateX(0);
      }

      .mobile-only{display:flex !important}

      .header{
        height:60px;
        padding:0 10px;
      }

      .title{
        font-size:.98rem;
      }

      .chat{
        padding:14px 10px 6px;
      }

      .chat-inner{
        max-width:100%;
      }

      .welcome{
        margin-top:4vh;
        padding:28px 18px;
        border-radius:20px;
      }

      .welcome h1{
        font-size:1.8rem;
      }

      .welcome p{
        font-size:.95rem;
      }

      .messages{
        gap:18px;
      }

      .msg-wrap{
        gap:10px;
      }

      .avatar{
        width:30px;
        height:30px;
        border-radius:10px;
        font-size:.72rem;
      }

      .msg-block{
        max-width:92%;
      }

      .msg{
        font-size:.95rem;
        line-height:1.68;
      }

      .msg-wrap.user .msg{
        padding:12px 14px;
        border-radius:18px 18px 8px 18px;
      }

      .action-bar{
        opacity:1;
        gap:6px;
      }

      .chip{
        padding:7px 10px;
        font-size:.72rem;
      }

      .input-wrap{
        padding:10px 10px 12px;
      }

      .input-box{
        border-radius:22px;
        padding:6px 10px;
      }

      .textarea{
        font-size:1rem;
        padding:10px 4px;
      }

      .send-btn{
        width:42px;
        height:42px;
      }

      .helper{
        font-size:.72rem;
        gap:8px;
        padding:8px 4px 0;
      }
    }

    @media (min-width:769px){
      .mobile-only{display:none !important}
    }
  </style>
</head>
<body class="theme-light">
  <div id="statusBanner" class="status"></div>
  <div id="mobileOverlay" class="mobile-overlay"></div>
  <div id="settingsOverlay" class="settings-overlay"></div>

  <aside id="settingsPanel" class="settings-panel">
    <div class="settings-head">
      <strong>Settings</strong>
      <button id="closeSettingsBtn" class="icon-btn" type="button">✕</button>
    </div>

    <div class="settings-card">
      <label for="languageSelect">Reply language</label>
      <select id="languageSelect" class="settings-select">
        <option value="en-GB">English</option>
        <option value="pl-PL">Polski</option>
        <option value="ro-RO">Română</option>
        <option value="ur-PK">اردو</option>
        <option value="ar">العربية</option>
        <option value="fr-FR">Français</option>
        <option value="es-ES">Español</option>
        <option value="pt-PT">Português</option>
      </select>
    </div>

    <div class="settings-card">
      <label for="responseModeSelect">Response mode</label>
      <select id="responseModeSelect" class="settings-select">
        <option value="quick">Quick</option>
        <option value="balanced" selected>Balanced</option>
        <option value="deep">Deep</option>
      </select>
    </div>

    <div class="settings-card">
      <div class="settings-row">
        <div>
          <div style="font-weight:700;">Privacy mode</div>
          <div style="font-size:.8rem;color:var(--muted);">Blur chat until hover</div>
        </div>
        <button id="privacyToggle" class="toggle" type="button"></button>
      </div>

      <div class="settings-row">
        <div>
          <div style="font-weight:700;">Dark mode</div>
          <div style="font-size:.8rem;color:var(--muted);">Switch appearance</div>
        </div>
        <button id="themeToggle" class="toggle" type="button"></button>
      </div>
    </div>

    <div style="margin-top:auto;display:flex;flex-direction:column;gap:10px;">
      <button id="backWelcomeBtn" class="ghost-btn" type="button">Back to welcome screen</button>
      <button id="logoutBtn" class="danger-btn" type="button">Log out</button>
    </div>
  </aside>

  <div class="app" id="appShell">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-top">
          <button id="sidebarToggle" class="icon-btn" type="button" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <div class="brand">IndiCare Command</div>
        </div>

        <div class="sidebar-content">
          <button id="newConversationBtn" class="primary-btn" type="button">+ New Log</button>

          <div class="nav">
            <button class="nav-btn active" type="button">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
              Assistant
            </button>

            <a class="nav-btn" href="https://app.indicare.co.uk/ai-note.html" target="_blank" rel="noopener noreferrer">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
              </svg>
              I-Notes
            </a>
          </div>

          <input id="conversationSearch" class="search" type="text" placeholder="Search conversations..." />
          <div id="recentList" class="history"></div>
        </div>
      </div>
    </aside>

    <main class="workspace">
      <header class="header">
        <div class="header-left">
          <button id="mobileMenuBtn" class="icon-btn mobile-only" type="button" aria-label="Open menu">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <div id="conversationHeading" class="title">Intelligence for Care</div>
        </div>

        <div class="header-right">
          <button id="settingsBtn" class="icon-btn" type="button" aria-label="Open settings">
            <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.09A1.65 1.65 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>
        </div>
      </header>

      <section id="chat" class="chat">
        <div class="chat-inner">
          <div id="chatEmpty" class="welcome">
            <h1 id="welcomeTitle">Ready.</h1>
            <p id="welcomeSubtitle">Your assistant is ready to help with documentation, guidance, and drafting.</p>
          </div>
          <div id="messages" class="messages" hidden></div>
        </div>
      </section>

      <section class="input-wrap">
        <div class="input-inner">
          <div id="documentChip" class="doc-chip">
            <span id="documentChipText"></span>
            <button id="clearDocumentBtn" class="icon-btn" type="button" aria-label="Remove document">✕</button>
          </div>

          <div class="input-box">
            <div class="input-row">
              <label for="documentUpload" class="icon-btn" style="cursor:pointer;color:var(--muted);">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                </svg>
                <input id="documentUpload" type="file" hidden accept=".txt,.docx,.pdf" />
              </label>

              <textarea id="chatInput" class="textarea" rows="1" placeholder="Describe situation..."></textarea>

              <button id="sendBtn" class="send-btn" type="button" aria-label="Send">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="transform:rotate(45deg);margin-right:2px;">
                  <line x1="22" y1="2" x2="11" y2="13"></line>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
              </button>
            </div>
          </div>

          <div class="helper">
            <span id="languageHelperText">Assistant replies in English.</span>
            <span id="modeHelperText">Mode: Balanced</span>
            <span>Review final records before saving or export.</span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    window.conversationId = null;
    window.currentDocumentText = null;
    window.currentDocumentName = null;
    window.isStreaming = false;
    window.conversationCache = [];

    let typewriterQueue = [];
    let isTypewriterActive = false;
    let lastUserPrompt = "";

    const REG_PROMPT = " [SYSTEM: Verify response against Ofsted SCCIF and Quality Standards for Children's Homes]";
    const DEFAULT_LANGUAGE = "en-GB";

    const LANGUAGE_OPTIONS = {
      "en-GB": { label: "English", promptLabel: "English" },
      "pl-PL": { label: "Polski", promptLabel: "Polish" },
      "ro-RO": { label: "Română", promptLabel: "Romanian" },
      "ur-PK": { label: "اردو", promptLabel: "Urdu" },
      "ar": { label: "العربية", promptLabel: "Arabic" },
      "fr-FR": { label: "Français", promptLabel: "French" },
      "es-ES": { label: "Español", promptLabel: "Spanish" },
      "pt-PT": { label: "Português", promptLabel: "Portuguese" }
    };

    const RESPONSE_MODE_LABELS = {
      quick: "Quick",
      balanced: "Balanced",
      deep: "Deep"
    };

    const GREETINGS = [
      name => `Good morning, ${name}.`,
      name => `Welcome back, ${name}.`,
      name => `Hope you're doing well, ${name}.`,
      name => `Ready when you are, ${name}.`,
      name => `Good to see you, ${name}.`,
      name => `How can I help today, ${name}?`
    ];

    function $(id){ return document.getElementById(id); }

    function showBanner(message, ms = 2600){
      const el = $("statusBanner");
      el.textContent = message;
      el.style.display = "block";
      clearTimeout(showBanner._t);
      showBanner._t = setTimeout(() => { el.style.display = "none"; }, ms);
    }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    function getAdultFirstName(){
      return (
        window.currentUser?.first_name ||
        localStorage.getItem("first_name") ||
        localStorage.getItem("adult_first_name") ||
        localStorage.getItem("user_first_name") ||
        "there"
      );
    }

    function setRandomWelcome(){
      const firstName = getAdultFirstName();
      const pick = GREETINGS[Math.floor(Math.random() * GREETINGS.length)];
      $("welcomeTitle").textContent = pick(firstName);
      $("welcomeSubtitle").textContent = "Your assistant is ready to help with documentation, guidance, and drafting.";
    }

    function getSelectedLanguage(){
      const v = $("languageSelect").value || DEFAULT_LANGUAGE;
      return LANGUAGE_OPTIONS[v] ? v : DEFAULT_LANGUAGE;
    }

    function getLanguageMeta(code){
      return LANGUAGE_OPTIONS[code] || LANGUAGE_OPTIONS[DEFAULT_LANGUAGE];
    }

    function getSelectedResponseMode(){
      const v = $("responseModeSelect").value || "balanced";
      return RESPONSE_MODE_LABELS[v] ? v : "balanced";
    }

    function updateLanguageUi(){
      const meta = getLanguageMeta(getSelectedLanguage());
      $("languageHelperText").textContent = `Assistant replies in ${meta.promptLabel}.`;
      localStorage.setItem("indicare_reply_language", getSelectedLanguage());
    }

    function updateModeUi(){
      const label = RESPONSE_MODE_LABELS[getSelectedResponseMode()];
      $("modeHelperText").textContent = `Mode: ${label}`;
      localStorage.setItem("indicare_response_mode", getSelectedResponseMode());
    }

    function syncThemeToggle(){
      $("themeToggle").classList.toggle("active", document.body.classList.contains("theme-dark"));
    }

    function syncPrivacyToggle(){
      $("privacyToggle").classList.toggle("active", $("appShell").classList.contains("privacy-active"));
    }

    function buildLanguageInstruction(){
      const code = getSelectedLanguage();
      const meta = getLanguageMeta(code);
      if (code === DEFAULT_LANGUAGE) return "";
      return ` [SYSTEM: Reply in ${meta.promptLabel}. Keep safeguarding, care, and formal documentation wording clear and professional.]`;
    }

    function stripSystemText(text){
      return String(text || "")
        .replace(/\s*\[SYSTEM:[\s\S]*$/i, "")
        .trim();
    }

    function summariseTitle(text){
      const clean = stripSystemText(text)
        .replace(/[^\p{L}\p{N}\s'-]/gu, " ")
        .replace(/\s+/g, " ")
        .trim();

      if (!clean) return "New Log";

      const stop = new Set([
        "the","a","an","and","or","but","for","with","from","into","onto","about",
        "who","what","when","where","why","how","are","is","am","do","does","did",
        "can","could","would","should","will","please","me","my","your","our","tell",
        "write","give","good","morning","afternoon","evening","indicare"
      ]);

      const words = clean.split(" ").filter(Boolean);
      const preferred = words.filter(w => !stop.has(w.toLowerCase()));
      const picked = (preferred.length ? preferred : words).slice(0, 3);
      const finalWords = picked.map(w => w.charAt(0).toUpperCase() + w.slice(1));
      return finalWords.join(" ") || "New Log";
    }

    async function maybeRenameNewConversation(conversationId, originalPrompt){
      const shortTitle = summariseTitle(originalPrompt);
      try{
        await apiRequest(`/chat/conversations/${conversationId}/rename`, {
          method: "POST",
          body: JSON.stringify({ title: shortTitle })
        });
        updateConversationHeading(shortTitle);
        await loadConversations();
      } catch(e){
        console.error("Rename failed", e);
      }
    }

    function prettifyAssistantText(text){
      let out = String(text || "").trim();

      out = out.replace(/:\s*-\s+/g, ":\n- ");
      out = out.replace(/([a-z])\s*-\s+/g, "$1\n- ");
      out = out.replace(/([.!?])\s+([A-Z][a-z]+:)/g, "$1\n\n$2");
      out = out.replace(/([.!?])\s+(My role is|I can assist|I can help|My aim is|This includes|That means)/g, "$1\n\n$2");
      out = out.replace(/\n{3,}/g, "\n\n");

      return out;
    }

    function renderMarkdown(text, role = "assistant"){
      if (!text) return "";

      let safe = escapeHtml(role === "assistant" ? prettifyAssistantText(text) : text);
      safe = safe.replace(/^### (.*)$/gm, "<h3>$1</h3>");
      safe = safe.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

      const lines = safe.split("\n");
      let html = "";
      let inList = false;

      for (const line of lines){
        if (/^\s*-\s+/.test(line)){
          if (!inList){
            html += "<ul>";
            inList = true;
          }
          html += `<li>${line.replace(/^\s*-\s+/,"")}</li>`;
        } else {
          if (inList){
            html += "</ul>";
            inList = false;
          }

          if (line.trim() === ""){
            html += "<br>";
          } else if (!/^<h3>.*<\/h3>$/.test(line)){
            html += `<p>${line}</p>`;
          } else {
            html += line;
          }
        }
      }

      if (inList) html += "</ul>";
      return html;
    }

    function autoResizeTextarea(){
      const input = $("chatInput");
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    }

    function showDocumentChip(name){
      $("documentChipText").textContent = name;
      $("documentChip").classList.add("show");
    }

    function hideDocumentChip(){
      $("documentChipText").textContent = "";
      $("documentChip").classList.remove("show");
    }

    function openSettings(){
      $("settingsOverlay").classList.add("show");
      $("settingsPanel").classList.add("open");
    }

    function closeSettings(){
      $("settingsOverlay").classList.remove("show");
      $("settingsPanel").classList.remove("open");
    }

    function updateConversationHeading(title = "Intelligence for Care"){
      $("conversationHeading").textContent = title;
    }

    async function apiRequest(url, options = {}){
      const token = localStorage.getItem("access_token");

      const res = await fetch(url, {
        ...options,
        headers: {
          ...(options.headers || {}),
          "Authorization": `Bearer ${token}`,
          ...(options.body && !(options.body instanceof FormData) ? { "Content-Type": "application/json" } : {})
        }
      });

      if (res.status === 401){
        window.location.href = "/login";
        return null;
      }

      if (!res.ok){
        let detail = "Request failed";
        try {
          const err = await res.json();
          detail = err.detail || err.error || detail;
        } catch (_) {
          detail = `${detail} (${res.status})`;
        }
        throw new Error(detail);
      }

      const contentType = res.headers.get("content-type") || "";
      if (!contentType.includes("application/json")) return null;
      return res.json();
    }

    async function uploadDocument(file){
      const token = localStorage.getItem("access_token");
      const formData = new FormData();
      formData.append("file", file);
      if (window.conversationId) formData.append("conversation_id", window.conversationId);

      const res = await fetch("/chat/upload", {
        method: "POST",
        headers: { "Authorization": `Bearer ${token}` },
        body: formData
      });

      if (res.status === 401){
        window.location.href = "/login";
        return;
      }

      if (!res.ok){
        let detail = "Upload failed";
        try{
          const err = await res.json();
          detail = err.detail || err.error || detail;
        } catch(_) {}
        throw new Error(detail);
      }

      const data = await res.json();
      window.currentDocumentText = data.text;
      window.currentDocumentName = data.filename;
      showDocumentChip(data.filename);
      showBanner(`Document attached: ${data.filename}`);
    }

    function copyMessageText(text){
      navigator.clipboard.writeText(text).then(() => {
        showBanner("Copied");
      }).catch(() => {
        showBanner("Could not copy");
      });
    }

    async function editUserMessage(messageId, currentText){
      const edited = prompt("Edit message", currentText);
      if (edited === null) return;

      const cleaned = stripSystemText(edited).trim();
      if (!cleaned){
        showBanner("Message cannot be empty");
        return;
      }

      window.isStreaming = true;
      $("sendBtn").disabled = true;

      try{
        await streamAssistantResponse(
          `/chat/messages/${messageId}/edit`,
          {
            message: cleaned,
            document_text: window.currentDocumentText,
            document_name: window.currentDocumentName,
            response_mode: getSelectedResponseMode()
          },
          getSelectedLanguage()
        );

        if (window.conversationId){
          await openConversation(window.conversationId, $("conversationHeading").textContent);
        }
        showBanner("Updated");
      } catch(e){
        console.error(e);
        showBanner(e.message || "Edit failed");
      } finally {
        window.isStreaming = false;
        $("sendBtn").disabled = false;
      }
    }

    function appendMessage(role, text, options = {}){
      const displayText = role === "user" ? stripSystemText(text) : text;

      const wrap = document.createElement("div");
      wrap.className = `msg-wrap ${role}`;
      if (options.messageId) wrap.dataset.messageId = options.messageId;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "assistant" ? "IC" : "Y";
      wrap.appendChild(avatar);

      const block = document.createElement("div");
      block.className = "msg-block";

      const msg = document.createElement("div");
      msg.className = "msg";
      msg.innerHTML = role === "user"
        ? escapeHtml(displayText)
        : renderMarkdown(displayText, "assistant");
      block.appendChild(msg);

      if (options.metaText){
        const meta = document.createElement("div");
        meta.className = "msg-meta";
        meta.textContent = options.metaText;
        block.appendChild(meta);
      }

      const actions = document.createElement("div");
      actions.className = "action-bar";

      if (role === "assistant"){
        const copyBtn = document.createElement("button");
        copyBtn.className = "chip";
        copyBtn.type = "button";
        copyBtn.textContent = "Copy";
        copyBtn.addEventListener("click", () => copyMessageText(displayText));

        const ofstedBtn = document.createElement("button");
        ofstedBtn.className = "chip";
        ofstedBtn.type = "button";
        ofstedBtn.textContent = "Format for Ofsted";
        ofstedBtn.addEventListener("click", () => quickPrompt("Ofsted"));

        const riskBtn = document.createElement("button");
        riskBtn.className = "chip";
        riskBtn.type = "button";
        riskBtn.textContent = "Draft Risk Assess";
        riskBtn.addEventListener("click", () => quickPrompt("Risk"));

        actions.append(copyBtn, ofstedBtn, riskBtn);
      }

      if (role === "user"){
        const copyBtn = document.createElement("button");
        copyBtn.className = "chip";
        copyBtn.type = "button";
        copyBtn.textContent = "Copy";
        copyBtn.addEventListener("click", () => copyMessageText(displayText));
        actions.appendChild(copyBtn);

        if (options.messageId){
          const editBtn = document.createElement("button");
          editBtn.className = "chip";
          editBtn.type = "button";
          editBtn.textContent = "Edit";
          editBtn.addEventListener("click", () => editUserMessage(options.messageId, displayText));
          actions.appendChild(editBtn);
        }
      }

      if (actions.children.length){
        block.appendChild(actions);
      }

      wrap.appendChild(block);
      $("messages").appendChild(wrap);
      $("chat").scrollTop = $("chat").scrollHeight;
    }

    function createOrResetStreamingMessage(languageCode){
      const old = $("streaming-msg");
      if (old) old.remove();

      const wrap = document.createElement("div");
      wrap.id = "streaming-msg";
      wrap.className = "msg-wrap assistant";
      wrap.innerHTML = `
        <div class="avatar">IC</div>
        <div class="msg-block">
          <div class="msg typing" data-raw=""></div>
          <div class="msg-meta">Reply language: ${escapeHtml(getLanguageMeta(languageCode || DEFAULT_LANGUAGE).label)} · Mode: ${escapeHtml(RESPONSE_MODE_LABELS[getSelectedResponseMode()])}</div>
        </div>
      `;
      $("messages").appendChild(wrap);
      $("chat").scrollTop = $("chat").scrollHeight;
    }

    function startTypewriter(){
      if (isTypewriterActive) return;
      isTypewriterActive = true;

      const el = document.querySelector("#streaming-msg .msg");
      if (!el){ isTypewriterActive = false; return; }

      let raw = el.getAttribute("data-raw") || "";

      const interval = setInterval(() => {
        if (typewriterQueue.length > 0){
          raw += typewriterQueue.shift();
          el.innerHTML = renderMarkdown(raw, "assistant");
          el.setAttribute("data-raw", raw);
          $("chat").scrollTop = $("chat").scrollHeight;
        } else if (!window.isStreaming){
          clearInterval(interval);
          isTypewriterActive = false;
          el.classList.remove("typing");
        }
      }, 8);
    }

    async function streamAssistantResponse(url, bodyData, languageCode){
      bodyData.message += REG_PROMPT + buildLanguageInstruction();
      bodyData.reply_language = languageCode;
      bodyData.reply_language_label = getLanguageMeta(languageCode).promptLabel;
      bodyData.response_mode = getSelectedResponseMode();

      const response = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${localStorage.getItem("access_token")}`
        },
        body: JSON.stringify(bodyData)
      });

      if (response.status === 401){
        window.location.href = "/login";
        return;
      }

      if (!response.ok){
        let detail = `Chat request failed (${response.status})`;
        try{
          const txt = await response.text();
          if (txt) detail = txt;
        } catch(_) {}
        throw new Error(detail);
      }

      if (!response.body) throw new Error("No response body from server");

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      createOrResetStreamingMessage(languageCode);

      while (true){
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split("\n");
        buffer = parts.pop() || "";

        for (const line of parts){
          if (!line.startsWith("data:")) continue;
          const payload = line.slice(5);
          const normalised = payload.startsWith(" ") ? payload.slice(1) : payload;
          if (normalised === "[DONE]") continue;

          for (const char of normalised) typewriterQueue.push(char);
          startTypewriter();
        }
      }
    }

    function resetToWelcome(){
      window.conversationId = null;
      window.currentDocumentText = null;
      window.currentDocumentName = null;
      $("messages").innerHTML = "";
      $("messages").hidden = true;
      $("chatEmpty").hidden = false;
      $("chatInput").value = "";
      hideDocumentChip();
      autoResizeTextarea();
      updateConversationHeading("Intelligence for Care");
      setRandomWelcome();
      applyConversationFilter();
      closeSettings();
    }

    async function deleteConversation(conversationId){
      if (!confirm("Delete this conversation?")) return;

      try{
        await apiRequest(`/chat/conversations/${conversationId}`, { method: "DELETE" });
        if (Number(window.conversationId) === Number(conversationId)){
          resetToWelcome();
        }
        await loadConversations();
        showBanner("Conversation deleted");
      } catch(e){
        console.error(e);
        showBanner(e.message || "Delete failed");
      }
    }

    function renderConversationList(rows){
      const list = $("recentList");
      list.innerHTML = "";

      for (const r of rows){
        const item = document.createElement("div");
        item.className = `history-item ${Number(r.id) === Number(window.conversationId) ? "active" : ""}`;

        const row = document.createElement("div");
        row.className = "history-row";

        const main = document.createElement("button");
        main.type = "button";
        main.className = "history-main";
        main.innerHTML = `<div class="history-title">${escapeHtml(r.title || "Observation")}</div>`;
        main.addEventListener("click", () => openConversation(r.id, r.title || "Observation"));

        const copyBtn = document.createElement("button");
        copyBtn.type = "button";
        copyBtn.className = "small-btn";
        copyBtn.title = "Copy title";
        copyBtn.textContent = "⧉";
        copyBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          copyMessageText(r.title || "Observation");
        });

        const delBtn = document.createElement("button");
        delBtn.type = "button";
        delBtn.className = "small-btn danger";
        delBtn.title = "Delete";
        delBtn.textContent = "🗑";
        delBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteConversation(r.id);
        });

        row.append(main, copyBtn, delBtn);
        item.appendChild(row);
        list.appendChild(item);
      }
    }

    function applyConversationFilter(){
      const q = ($("conversationSearch").value || "").trim().toLowerCase();
      const rows = q
        ? window.conversationCache.filter(r => (r.title || "").toLowerCase().includes(q))
        : window.conversationCache;
      renderConversationList(rows);
    }

    async function loadConversations(){
      try{
        const rows = await apiRequest("/chat/conversations") || [];
        window.conversationCache = rows;
        applyConversationFilter();
        return rows;
      } catch(e){
        console.error(e);
        showBanner("Could not load conversations");
        return [];
      }
    }

    async function openConversation(id, title = "Observation"){
      try{
        const data = await apiRequest(`/chat/conversations/${id}`);
        if (!data) return;

        window.conversationId = id;
        $("messages").innerHTML = "";
        $("chatEmpty").hidden = true;
        $("messages").hidden = false;

        data.messages.forEach(m => {
          appendMessage(m.role, m.message, { messageId: m.id });
        });

        if (data.document){
          window.currentDocumentText = data.document.text;
          window.currentDocumentName = data.document.filename;
          showDocumentChip(data.document.filename);
        } else {
          window.currentDocumentText = null;
          window.currentDocumentName = null;
          hideDocumentChip();
        }

        updateConversationHeading(title || `Conversation ${id}`);
        applyConversationFilter();

        if (window.innerWidth <= 768){
          $("sidebar").classList.remove("open");
          $("mobileOverlay").classList.remove("show");
        }
      } catch(e){
        console.error(e);
        showBanner(e.message || "Could not open conversation");
      }
    }

    async function sendMessage(){
      const input = $("chatInput");
      const text = stripSystemText(input.value).trim();
      if (!text || window.isStreaming) return;

      const selectedLanguage = getSelectedLanguage();
      const previousConversationId = window.conversationId;
      lastUserPrompt = text;

      window.isStreaming = true;
      $("sendBtn").disabled = true;
      $("chatEmpty").hidden = true;
      $("messages").hidden = false;

      appendMessage("user", text, {
        metaText: `Mode: ${RESPONSE_MODE_LABELS[getSelectedResponseMode()]}`
      });

      input.value = "";
      autoResizeTextarea();

      try{
        await streamAssistantResponse("/chat/", {
          message: text,
          conversation_id: window.conversationId,
          document_text: window.currentDocumentText,
          document_name: window.currentDocumentName
        }, selectedLanguage);
      } catch(e){
        console.error(e);
        const streamMsg = document.querySelector("#streaming-msg .msg");
        if (streamMsg){
          streamMsg.classList.remove("typing");
          streamMsg.innerHTML = renderMarkdown(`Sorry, there was a problem: ${e.message}`, "assistant");
        } else {
          appendMessage("assistant", `Sorry, there was a problem: ${e.message}`);
        }
      } finally {
        window.isStreaming = false;
        $("sendBtn").disabled = false;

        const rows = await loadConversations();
        if (!previousConversationId && !window.conversationId && rows.length > 0){
          window.conversationId = rows[0].id;
          await maybeRenameNewConversation(window.conversationId, lastUserPrompt);
          applyConversationFilter();
        }
      }
    }

    function quickPrompt(type){
      const input = $("chatInput");

      if (type === "Ofsted"){
        input.value = "Rewrite the above documentation so it aligns with Ofsted Quality Standards and is ready for professional review.";
      } else if (type === "Risk"){
        input.value = "Generate a formal risk assessment based on this situation. Include presenting risks, protective factors, staff actions, and follow-up actions.";
      }

      autoResizeTextarea();
      sendMessage();
    }

    function applySavedTheme(){
      const saved = localStorage.getItem("indicare_theme") || "light";
      document.body.classList.toggle("theme-dark", saved === "dark");
      syncThemeToggle();
    }

    function applySavedLanguage(){
      const saved = localStorage.getItem("indicare_reply_language") || DEFAULT_LANGUAGE;
      $("languageSelect").value = LANGUAGE_OPTIONS[saved] ? saved : DEFAULT_LANGUAGE;
      updateLanguageUi();
    }

    function applySavedMode(){
      const saved = localStorage.getItem("indicare_response_mode") || "balanced";
      $("responseModeSelect").value = RESPONSE_MODE_LABELS[saved] ? saved : "balanced";
      updateModeUi();
    }

    function bindUi(){
      $("sidebarToggle").onclick = () => $("sidebar").classList.toggle("open");

      $("mobileMenuBtn").onclick = () => {
        $("sidebar").classList.add("open");
        $("mobileOverlay").classList.add("show");
      };

      $("mobileOverlay").onclick = () => {
        $("sidebar").classList.remove("open");
        $("mobileOverlay").classList.remove("show");
      };

      $("settingsBtn").onclick = openSettings;
      $("closeSettingsBtn").onclick = closeSettings;
      $("settingsOverlay").onclick = closeSettings;

      $("newConversationBtn").onclick = resetToWelcome;
      $("backWelcomeBtn").onclick = resetToWelcome;

      $("logoutBtn").onclick = () => {
        localStorage.removeItem("access_token");
        window.location.href = "/login";
      };

      $("themeToggle").onclick = () => {
        document.body.classList.toggle("theme-dark");
        localStorage.setItem("indicare_theme", document.body.classList.contains("theme-dark") ? "dark" : "light");
        syncThemeToggle();
      };

      $("privacyToggle").onclick = () => {
        $("appShell").classList.toggle("privacy-active");
        syncPrivacyToggle();
      };

      $("languageSelect").addEventListener("change", () => {
        updateLanguageUi();
        showBanner(`Reply language set to ${getLanguageMeta(getSelectedLanguage()).label}`);
      });

      $("responseModeSelect").addEventListener("change", () => {
        updateModeUi();
        showBanner(`Response mode set to ${RESPONSE_MODE_LABELS[getSelectedResponseMode()]}`);
      });

      $("conversationSearch").addEventListener("input", applyConversationFilter);

      $("chatInput").addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey){
          e.preventDefault();
          sendMessage();
        }
      });

      $("chatInput").addEventListener("input", autoResizeTextarea);
      $("sendBtn").onclick = sendMessage;

      $("documentUpload").addEventListener("change", async e => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;

        try{
          await uploadDocument(file);
        } catch(err){
          console.error(err);
          showBanner(err.message || "Upload failed");
        } finally {
          e.target.value = "";
        }
      });

      $("clearDocumentBtn").onclick = async () => {
        try{
          if (window.conversationId){
            await apiRequest(`/chat/conversations/${window.conversationId}/document`, { method: "DELETE" });
          }
        } catch(err){
          console.error(err);
        }

        window.currentDocumentText = null;
        window.currentDocumentName = null;
        hideDocumentChip();
        showBanner("Document removed");
      };
    }

    async function init(){
      bindUi();
      applySavedTheme();
      applySavedLanguage();
      applySavedMode();
      autoResizeTextarea();
      setRandomWelcome();
      await loadConversations();
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
