<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndiCare OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f8fc;
  --panel:#fff;
  --text:#1e293b;
  --muted:#64748b;
  --accent:#2563eb;
  --border:#e2e8f0;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{background:var(--bg);color:var(--text);height:100vh;display:flex}

.sidebar{
  width:260px;
  background:var(--panel);
  border-right:1px solid var(--border);
  padding:12px;
  display:flex;
  flex-direction:column;
}

.history{flex:1;overflow:auto;margin-top:12px}

.history-item{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.history-item:hover{background:#eef2ff}

.main{flex:1;display:flex;flex-direction:column}

.header{
  height:60px;
  display:flex;
  align-items:center;
  padding:0 16px;
  border-bottom:1px solid var(--border);
  font-weight:600;
}

.chat{
  flex:1;
  overflow:auto;
  padding:16px;
}

.messages{
  max-width:700px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.msg{
  line-height:1.7;
}

.user{
  align-self:flex-end;
  background:#e0e7ff;
  padding:12px 14px;
  border-radius:18px 18px 4px 18px;
}

.assistant{}

.msg h3{
  color:var(--accent);
  margin:12px 0 6px;
}

.msg ul{margin-left:20px}

.input{
  padding:12px;
  border-top:1px solid var(--border);
}

textarea{
  width:100%;
  border:1px solid var(--border);
  border-radius:20px;
  padding:10px;
  resize:none;
}

button{
  margin-top:8px;
  padding:10px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="newChat()">+ New</button>
  <div id="history" class="history"></div>
</div>

<div class="main">
  <div id="title" class="header">IndiCare</div>

  <div id="chat" class="chat">
    <div id="messages" class="messages"></div>
  </div>

  <div class="input">
    <textarea id="input" rows="1" placeholder="Type..."></textarea>
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
let conversationId = null
let streaming = false

function format(text){
  text = text.replace(/\[SYSTEM[\s\S]*/,"")

  text = text.replace(/([a-z]):(?=[A-Z])/g,"$1:\n")

  text = text.replace(/What matters most here:/gi,"### What matters most here")
  text = text.replace(/Key points:/gi,"### Key points")
  text = text.replace(/Suggested staff response \/ next steps:/gi,"### Next steps")
  text = text.replace(/What should be recorded \/ handed over \/ reviewed if relevant:/gi,"### Recording")

  text = text.replace(/- /g,"\n- ")
  text = text.replace(/\.\s+/g,".\n\n")

  return text
}

function md(text){
  text = format(text)

  let html = ""
  let list = false

  text.split("\n").forEach(l=>{
    if(l.startsWith("###")){
      html += `<h3>${l.replace("###","")}</h3>`
    }
    else if(l.startsWith("- ")){
      if(!list){html+="<ul>";list=true}
      html+=`<li>${l.slice(2)}</li>`
    }
    else{
      if(list){html+="</ul>";list=false}
      if(l.trim()) html+=`<p>${l}</p>`
    }
  })

  if(list) html+="</ul"
  return html
}

function append(role,text,id){
  const div=document.createElement("div")
  div.className="msg "+role

  div.innerHTML = role==="assistant" ? md(text) : text

  if(role==="assistant"){
    const copy=document.createElement("button")
    copy.innerText="Copy"
    copy.onclick=()=>navigator.clipboard.writeText(text)
    div.appendChild(copy)
  }

  document.getElementById("messages").appendChild(div)
  document.getElementById("chat").scrollTop=999999
}

function stream(el){
  let q=[]
  let txt=""

  return char=>{
    if(char){
      q.push(char)
    }

    if(q.length){
      txt+=q.shift()
      el.innerHTML=md(txt)
      setTimeout(()=>stream(el)(),3)
    }
  }
}

async function send(){
  if(streaming) return

  const input=document.getElementById("input")
  const text=input.value.trim()
  if(!text) return

  append("user",text)

  input.value=""
  streaming=true

  const res=await fetch("/chat/",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+localStorage.getItem("access_token")
    },
    body:JSON.stringify({
      message:text,
      conversation_id:conversationId
    })
  })

  const reader=res.body.getReader()
  const dec=new TextDecoder()

  const msg=document.createElement("div")
  msg.className="msg assistant"
  document.getElementById("messages").appendChild(msg)

  const writer=stream(msg)
  writer("...") // instant feedback

  while(true){
    const {done,value}=await reader.read()
    if(done) break

    const chunk=dec.decode(value)
    chunk.split("\n").forEach(l=>{
      if(l.startsWith("data:")){
        const t=l.replace("data:","").trim()
        if(t!=="[DONE]") writer(t)
      }
    })
  }

  streaming=false
}

function newChat(){
  conversationId=null
  document.getElementById("messages").innerHTML=""
  document.getElementById("title").innerText="New Chat"
}

document.getElementById("input").addEventListener("keydown",e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault()
    send()
  }
})
</script>

</body>
</html>
