<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiCare AI | Intelligence for Care</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-app: #f4f7fb; --bg-sidebar: #ffffff; --bg-chat: #ffffff; --bg-input: #ffffff;
            --bg-msg-user: #e0e9f5; --text-primary: #1e293b; --text-secondary: #64748b;
            --text-muted: #94a3b8; --border-color: #e2e8f0; --accent-color: #2563eb;
            --shadow-md: 0 4px 12px -2px rgb(0 0 0 / 0.05); --sidebar-width-full: 280px; --sidebar-width-mini: 68px;
        }
        body.theme-dark {
            --bg-app: #0f172a; --bg-sidebar: #1e293b; --bg-chat: #0f172a;
            --bg-input: #0a0f1d; --bg-msg-user: #1e293b; --text-primary: #f1f5f9;
            --text-secondary: #94a3b8; --border-color: #334155; --accent-color: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-primary); height: 100dvh; overflow: hidden; -webkit-font-smoothing: antialiased; }
        button { background: none; border: none; cursor: pointer; color: inherit; outline: none; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        
        .ica-shell { display: flex; height: 100%; width: 100vw; position: relative; }

        /* --- SIDEBAR --- */
        .ica-sidebar { width: var(--sidebar-width-mini); background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 40; overflow: hidden; }
        .is-sidebar-open .ica-sidebar { width: var(--sidebar-width-full); }
        .ica-sidebar-header { height: 60px; display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
        .ica-sidebar-content { flex: 1; display: flex; flex-direction: column; width: var(--sidebar-width-full); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .is-sidebar-open .ica-sidebar-content { opacity: 1; pointer-events: auto; }

        .ica-nav-rail { position: absolute; top: 70px; left: 0; width: var(--sidebar-width-mini); display: flex; flex-direction: column; align-items: center; gap: 20px; transition: opacity 0.2s; }
        .is-sidebar-open .ica-nav-rail { opacity: 0; pointer-events: none; }
        .rail-icon { width: 44px; height: 44px; border-radius: 12px; color: var(--text-secondary); }
        .rail-icon:hover { background: var(--bg-hover); color: var(--accent-color); }
        .rail-icon.active { background: rgba(37, 99, 235, 0.1); color: var(--accent-color); }

        .sidebar-group-label { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; padding: 16px 12px 8px; letter-spacing: 0.05em; }
        .ica-history-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; margin: 0 8px 2px; display: flex; align-items: center; justify-content: space-between; }
        .ica-history-item:hover { background: var(--bg-app); }
        .ica-history-item.is-active { background: var(--bg-app); border: 1px solid var(--border-color); }
        .ica-history-item-title { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

        /* --- MAIN AREA --- */
        .ica-main { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); min-width: 0; position: relative; }
        .ica-header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--border-color); }
        
        .privacy-active .ica-message { filter: blur(12px); transition: filter 0.3s; }
        .privacy-active .ica-message:hover { filter: blur(0); }

        .ica-chat-scroll { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }
        .ica-messages-container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

        .ica-message-wrapper { display: flex; gap: 12px; width: 100%; }
        .ica-message-wrapper.is-user { flex-direction: row-reverse; }
        .ica-message-avatar { width: 32px; height: 32px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; background: var(--border-color); flex-shrink: 0; }
        .is-assistant .ica-message-avatar { background: var(--accent-color); color: white; }
        
        .ica-message-block { display: flex; flex-direction: column; gap: 4px; max-width: 85%; }
        .ica-message { font-size: 0.95rem; line-height: 1.6; color: var(--text-primary); }
        .is-user .ica-message { background: var(--bg-msg-user); padding: 12px 16px; border-radius: 18px 18px 4px 18px; color: #0f172a; }

        /* Assistant Markdown Styling */
        .ica-message h1, .ica-message h2, .ica-message h3, .ica-message h4 { color: var(--accent-color); margin: 16px 0 8px; font-weight: 600; }
        .ica-message h3 { font-size: 1.1rem; }
        .ica-message h4 { font-size: 1rem; color: var(--text-primary); }
        .ica-message p { margin-bottom: 12px; }
        .ica-message ul { margin: 8px 0 16px 20px; list-style: disc; }
        .ica-message li { margin-bottom: 6px; }

        .is-typing::after { content: '▊'; color: var(--accent-color); animation: blink 1s infinite; margin-left: 2px; }

        /* --- INPUT --- */
        .ica-input-container { padding: 0 24px 12px; max-width: 800px; margin: 0 auto; width: 100%; flex-shrink: 0; }
        .ica-input-box { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 24px; padding: 10px 16px; box-shadow: var(--shadow-md); display: flex; flex-direction: column; }
        .ica-input-row { display: flex; align-items: flex-end; gap: 8px; }
        .ica-textarea { flex: 1; max-height: 150px; padding: 10px 0; color: var(--text-primary); border: none; outline: none; background: transparent; }
        
        .ica-send-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-color); color: white; transition: 0.3s; }
        .ica-send-btn:disabled { opacity: 0.3; }

        .ica-doc-chip { display: flex; align-items: center; gap: 8px; padding: 4px 10px; background: var(--bg-app); border-radius: 10px; margin-bottom: 8px; width: fit-content; font-size: 0.8rem; border: 1px solid var(--border-color); }
        #micBtn.is-recording { color: #ef4444; animation: pulse-red 1.5s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="theme-light">

    <div id="statusBanner" class="ica-status-banner"></div>

    <div id="assistantShell" class="ica-shell">
        <aside class="ica-sidebar">
            <div class="ica-sidebar-header">
                <button id="sidebarToggle"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                <span style="font-weight: 600; color: var(--accent-color);">IndiCare</span>
            </div>

            <div class="ica-nav-rail">
                <div class="rail-icon active"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></div>
                <div class="rail-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line></svg></div>
            </div>

            <div class="ica-sidebar-content">
                <button id="newConversationBtn" class="ica-btn-primary" style="margin-top:10px;">+ New Session</button>
                <div class="sidebar-group-label">Saved Sessions</div>
                <div id="recentList" class="ica-sidebar-list"></div>
                <div class="ica-sidebar-footer">
                    <button id="logoutBtn" style="font-size:0.8rem; color:var(--text-secondary);">Sign out</button>
                </div>
            </div>
        </aside>

        <main class="ica-main">
            <header class="ica-header">
                <h2 id="conversationHeading" style="font-size:0.9rem; font-weight:500;">Intelligence for Care</h2>
                <div style="display:flex; gap:12px;">
                    <button id="privacyBtn" title="Privacy Shield"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
                    <button id="themeToggle"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
                </div>
            </header>

            <div id="chat" class="ica-chat-scroll">
                <div id="chatEmpty" style="text-align:center; margin-top:20vh;">
                    <h1 style="font-size:2.4rem; letter-spacing:-0.04em;">Ready.</h1>
                    <p style="color:var(--text-secondary);">IndiCare OS Documentation Assistant</p>
                </div>
                <div id="messages" class="ica-messages-container" hidden></div>
            </div>

            <div class="ica-input-container">
                <div id="documentChip" class="ica-doc-chip ica-hidden">
                    <span id="documentChipText"></span>
                    <button id="clearDocumentBtn">×</button>
                </div>
                <div class="ica-input-box">
                    <div class="ica-input-row">
                        <label for="documentUpload" style="cursor:pointer; color:var(--text-muted); padding:8px;"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg><input type="file" id="documentUpload" hidden></label>
                        <textarea id="chat-input" class="ica-textarea" placeholder="Type message..." rows="1"></textarea>
                        <button id="micBtn" style="padding:8px; color:var(--text-muted);"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line></svg></button>
                        <button id="send-btn" class="ica-send-btn"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="transform:rotate(45deg);"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- STATE & BACKEND ---
        window.conversationId = null;
        window.currentDocumentText = null;
        let typewriterQueue = [];
        let isTypewriterActive = false;

        async function apiRequest(url, options = {}) {
            const token = localStorage.getItem("access_token");
            const res = await fetch(url, { ...options, headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` } });
            if (res.status === 401) { window.location.href = "/login"; return; }
            return res.json();
        }

        // --- IMPROVED BRAIN (TYPEWRITER) ---
        async function streamAssistantResponse(url, bodyData) {
            try {
                const token = localStorage.getItem("access_token");
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                    body: JSON.stringify(bodyData)
                });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                createOrResetStreamingMessage();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const payload = line.slice(5).trim();
                            if (payload === '[DONE]') continue;
                            // Add payload to queue, ensuring we split on words to avoid "thechildwas"
                            payload.split(/(\s+)/).forEach(part => typewriterQueue.push(part));
                            startTypewriter();
                        }
                    }
                }
            } catch (err) { console.error(err); }
        }

        function startTypewriter() {
            if (isTypewriterActive) return;
            isTypewriterActive = true;
            const el = document.querySelector('#streaming-msg .ica-message');
            let rawBuffer = el.getAttribute('data-raw') || "";

            const interval = setInterval(() => {
                if (typewriterQueue.length > 0) {
                    rawBuffer += typewriterQueue.shift();
                    el.innerHTML = renderMarkdown(rawBuffer);
                    el.setAttribute('data-raw', rawBuffer);
                    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                } else if (!window.isStreaming) {
                    clearInterval(interval);
                    isTypewriterActive = false;
                }
            }, 25);
        }

        // --- NEW MARKDOWN ENGINE ---
        function renderMarkdown(text) {
            return text
                .replace(/^#### (.*$)/gim, '<h4>$1</h4>') // H4
                .replace(/^### (.*$)/gim, '<h3>$1</h3>') // H3
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')  // H2
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')   // H1
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') // Bold
                .replace(/^\- (.*$)/gim, '<li>$1</li>') // List items
                .replace(/\n/g, '<br>') // Breaks
                .replace(/(<li>.*<\/li>)/gim, '<ul>$1</ul>') // List wrap
                .replace(/<\/ul><ul>/gim, ''); // Cleanup
        }

        // --- UI & FEATURES ---
        function initChat() {
            const shell = document.getElementById('assistantShell');
            document.getElementById('sidebarToggle').onclick = () => shell.classList.toggle('is-sidebar-open');
            document.getElementById('privacyBtn').onclick = () => shell.classList.toggle('privacy-active');
            document.getElementById('send-btn').onclick = sendMessage;
            document.getElementById('themeToggle').onclick = () => {
                const t = document.body.classList.contains('theme-light') ? 'dark' : 'light';
                document.body.className = 'theme-' + t;
            };
            loadConversations();
            initSpeech();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            window.isStreaming = true;
            document.getElementById('chatEmpty').hidden = true;
            document.getElementById('messages').hidden = false;
            appendMessage('user', text);
            input.value = '';
            await streamAssistantResponse("/chat/", { message: text, conversation_id: window.conversationId });
            window.isStreaming = false;
            loadConversations();
        }

        function appendMessage(role, text) {
            const wrapper = document.createElement("div");
            wrapper.className = `ica-message-wrapper is-${role}`;
            const avatar = role==='assistant'?'IC':'Y';
            wrapper.innerHTML = `<div class="ica-message-avatar">${avatar}</div><div class="ica-message">${role==='user'?text:renderMarkdown(text)}</div>`;
            document.getElementById('messages').appendChild(wrapper);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }

        function createOrResetStreamingMessage() {
            const old = document.getElementById('streaming-msg');
            if (old) old.remove();
            const wrapper = document.createElement("div");
            wrapper.id = 'streaming-msg';
            wrapper.className = 'ica-message-wrapper is-assistant';
            wrapper.innerHTML = `<div class="ica-message-avatar">IC</div><div class="ica-message-block"><div class="ica-message" data-raw=""></div></div>`;
            document.getElementById('messages').appendChild(wrapper);
        }

        async function loadConversations() {
            const rows = await apiRequest("/chat/conversations") || [];
            document.getElementById('recentList').innerHTML = rows.map(r => `
                <div class="ica-history-item" onclick="openConversation('${r.id}')">
                    <div class="ica-history-item-title">${r.title || "Observation"}</div>
                </div>`).join('');
        }

        async function openConversation(id) {
            const data = await apiRequest(`/chat/conversations/${id}`);
            window.conversationId = id;
            document.getElementById('messages').innerHTML = '';
            document.getElementById('chatEmpty').hidden = true;
            document.getElementById('messages').hidden = false;
            data.messages.forEach(m => appendMessage(m.role, m.message));
        }

        function initSpeech() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return;
            const rec = new Speech();
            rec.onresult = (e) => document.getElementById('chat-input').value += e.results[0][0].transcript;
            document.getElementById('micBtn').onclick = () => {
                document.getElementById('micBtn').classList.toggle('is-recording');
                try { rec.start(); } catch(e) { rec.stop(); }
            };
        }

        document.addEventListener("DOMContentLoaded", initChat);
    </script>
</body>
</html>
