<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiCare OS | Intelligence for Residential Care</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-app: #f4f7fb;
            --bg-sidebar: #ffffff;
            --bg-chat: #ffffff;
            --bg-input: #ffffff;
            --bg-msg-user: #e0e9f5;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --accent-color: #2563eb;
            --accent-soft: rgba(37, 99, 235, 0.1);
            --shadow-md: 0 4px 12px -2px rgb(0 0 0 / 0.05);
            --sidebar-width-full: 280px;
            --sidebar-width-mini: 68px;
        }

        body.theme-dark {
            --bg-app: #0f172a; --bg-sidebar: #1e293b; --bg-chat: #0f172a;
            --bg-input: #0a0f1d; --bg-msg-user: #1e293b;
            --text-primary: #f1f5f9; --text-secondary: #94a3b8; --border-color: #334155;
            --accent-color: #3b82f6; --accent-soft: rgba(59, 130, 246, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-primary); height: 100dvh; overflow: hidden; -webkit-font-smoothing: antialiased; }
        button { background: none; border: none; cursor: pointer; color: inherit; outline: none; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        
        .ica-shell { display: flex; height: 100%; width: 100vw; position: relative; }

        /* --- SIDEBAR --- */
        .ica-sidebar {
            width: var(--sidebar-width-mini);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 40; overflow: hidden; position: relative;
        }
        .is-sidebar-open .ica-sidebar { width: var(--sidebar-width-full); }
        .ica-sidebar-header { height: 60px; display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
        .ica-sidebar-content { flex: 1; display: flex; flex-direction: column; width: var(--sidebar-width-full); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .is-sidebar-open .ica-sidebar-content { opacity: 1; pointer-events: auto; }

        .ica-nav-rail { position: absolute; top: 70px; left: 0; width: var(--sidebar-width-mini); display: flex; flex-direction: column; align-items: center; gap: 20px; transition: opacity 0.2s; }
        .is-sidebar-open .ica-nav-rail { opacity: 0; pointer-events: none; }
        .rail-icon { width: 44px; height: 44px; border-radius: 12px; color: var(--text-secondary); }
        .rail-icon:hover { background: var(--bg-hover); color: var(--accent-color); }
        .rail-icon.active { background: var(--accent-soft); color: var(--accent-color); }

        .sidebar-group-label { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; padding: 16px 12px 8px; letter-spacing: 0.05em; }
        .ica-sidebar-list { flex: 1; overflow-y: auto; padding: 0 8px; }
        .ica-history-item { 
            padding: 10px 12px; border-radius: 10px; cursor: pointer; margin-bottom: 2px; 
            display: flex; align-items: center; justify-content: space-between; transition: 0.2s;
        }
        .ica-history-item:hover { background: var(--bg-app); }
        .ica-history-item.is-active { background: var(--bg-app); border: 1px solid var(--border-color); }
        .ica-history-item.is-pinned { border-left: 3px solid var(--accent-color); background: var(--accent-soft); }

        /* --- MAIN AREA --- */
        .ica-main { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); min-width: 0; }
        .ica-header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--border-color); }
        
        .ica-chat-scroll { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }
        .ica-messages-container { max-width: 850px; margin: 0 auto; display: flex; flex-direction: column; gap: 32px; padding-bottom: 40px; }

        /* --- MESSAGES & MARKDOWN --- */
        .ica-message-wrapper { display: flex; gap: 16px; width: 100%; }
        .ica-message-wrapper.is-user { flex-direction: row-reverse; }
        .ica-message-avatar { width: 34px; height: 34px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; background: var(--border-color); flex-shrink: 0; }
        .is-assistant .ica-message-avatar { background: var(--accent-color); color: white; }
        
        .ica-message-block { display: flex; flex-direction: column; gap: 8px; max-width: 85%; }
        .ica-message { font-size: 0.95rem; line-height: 1.7; color: var(--text-primary); }
        .is-user .ica-message { background: var(--bg-msg-user); padding: 12px 18px; border-radius: 18px 18px 4px 18px; color: #0f172a; border: 1px solid rgba(0,0,0,0.05); }

        /* Privacy Blur */
        .privacy-active .ica-message { filter: blur(10px); transition: 0.3s; }
        .privacy-active .ica-message:hover { filter: blur(0); }

        /* Table Rendering */
        table { border-collapse: collapse; width: 100%; margin: 16px 0; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
        th, td { padding: 10px 14px; border: 1px solid var(--border-color); text-align: left; }
        th { background: var(--bg-app); font-weight: 600; }

        /* Markdown Headers */
        .ica-message h3 { font-size: 1.2rem; margin: 20px 0 10px; color: var(--accent-color); font-weight: 600; }
        .ica-message ul { margin: 8px 0 16px 24px; }
        .ica-message li { margin-bottom: 6px; }

        /* Cloud Sync Dot */
        .sync-indicator { width: 8px; height: 8px; border-radius: 50%; background: #10b981; margin-right: 8px; box-shadow: 0 0 8px #10b981; }
        .sync-indicator.syncing { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; animation: pulse 1s infinite; }

        /* --- INPUT --- */
        .ica-input-container { padding: 0 24px 12px; max-width: 850px; margin: 0 auto; width: 100%; flex-shrink: 0; }
        .ica-input-box { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 24px; padding: 10px 16px; box-shadow: var(--shadow-md); display: flex; flex-direction: column; }
        .ica-textarea { flex: 1; max-height: 150px; padding: 8px 0; color: var(--text-primary); border: none; outline: none; background: transparent; }
        .ica-send-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--accent-color); color: white; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="theme-light">

    <div id="statusBanner" class="ica-status-banner"></div>

    <div id="assistantShell" class="ica-shell">
        <aside class="ica-sidebar">
            <div class="ica-sidebar-header">
                <button id="sidebarToggle"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                <span style="font-weight: 600; color: var(--accent-color);">IndiCare OS</span>
            </div>

            <div class="ica-nav-rail">
                <div class="rail-icon active" title="Assistant"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></div>
                <div class="rail-icon" title="I-Notes"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line></svg></div>
            </div>

            <div class="ica-sidebar-content">
                <button id="newConversationBtn" class="ica-btn-primary" style="margin-top:10px;">+ New Log</button>
                <div id="sidebarList" class="ica-sidebar-list">
                    <div class="sidebar-group-label">Pinned Cases</div>
                    <div id="pinnedList"></div>
                    <div class="sidebar-group-label">Recent History</div>
                    <div id="recentList"></div>
                </div>
                <div class="ica-sidebar-footer">
                    <button id="logoutBtn" style="font-size: 0.8rem; color: var(--text-secondary);">Sign out</button>
                </div>
            </div>
        </aside>

        <main class="ica-main">
            <header class="ica-header">
                <div style="display:flex; align-items:center;">
                    <div id="cloudSync" class="sync-indicator"></div>
                    <h2 id="conversationHeading" style="font-size: 0.9rem; font-weight: 500; color: var(--text-secondary);">IndiCare Assistant</h2>
                </div>
                <div style="display:flex; gap:16px;">
                    <button id="privacyBtn" title="Privacy Shield"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
                    <button id="themeToggle"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
                </div>
            </header>

            <div id="chat" class="ica-chat-scroll">
                <div id="chatEmpty" style="text-align: center; margin-top: 20vh;">
                    <h1 style="font-size: 2.8rem; letter-spacing: -0.05em; margin-bottom: 10px;">IndiCare OS</h1>
                    <p style="color: var(--text-secondary); max-width: 400px; margin: 0 auto;">Welcome</p>
                </div>
                <div id="messages" class="ica-messages-container" hidden></div>
                <div id="typingRow" class="ica-message-wrapper is-assistant" hidden style="margin-top: 20px;">
                    <div class="ica-message-avatar">IC</div>
                    <div style="padding:12px; font-size: 0.8rem; color: var(--accent-color); font-weight: 600;">...</div>
                </div>
            </div>

            <div class="ica-input-container">
                <div class="ica-input-box">
                    <div class="ica-input-row">
                        <textarea id="chat-input" class="ica-textarea" placeholder="Describe the situation..." rows="1"></textarea>
                        <button id="send-btn" class="ica-send-btn"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="transform: rotate(45deg);"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- CONFIG & STATE ---
        window.conversationId = null;
        let typewriterQueue = [];
        let isTypewriterActive = false;

        // --- BACKEND BRIDGE ---
        async function apiRequest(url, options = {}) {
            setSyncing(true);
            const token = localStorage.getItem("access_token");
            const res = await fetch(url, { ...options, headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` } });
            setSyncing(false);
            if (res.status === 401) { window.location.href = "/login"; return; }
            return res.json();
        }

        async function streamAssistantResponse(url, bodyData) {
            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${localStorage.getItem("access_token")}` },
                    body: JSON.stringify(bodyData)
                });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                createOrResetStreamingMessage();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const payload = line.slice(5).trim();
                            if (payload === '[DONE]') continue;
                            // JOINED-UP FIX: Break chunks into words to ensure typewriter preserves gaps
                            payload.split(' ').forEach(word => {
                                if(word) typewriterQueue.push(word + " ");
                            });
                            startTypewriter();
                        }
                    }
                }
            } catch (err) { console.error(err); }
        }

        function startTypewriter() {
            if (isTypewriterActive) return;
            isTypewriterActive = true;
            const el = document.querySelector('#streaming-msg .ica-message');
            let currentText = el.getAttribute('data-raw') || "";

            const interval = setInterval(() => {
                if (typewriterQueue.length > 0) {
                    currentText += typewriterQueue.shift();
                    el.innerHTML = renderMarkdown(currentText);
                    el.setAttribute('data-raw', currentText);
                    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                } else if (!window.isStreaming) {
                    clearInterval(interval);
                    isTypewriterActive = false;
                }
            }, 30); // Controlled word-by-word flow
        }

        // --- THE RENDERER: HEADERS, LISTS, TABLES ---
        function renderMarkdown(text) {
            let html = text
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/^\- (.*$)/gim, '<li>$1</li>')
                .replace(/\n/g, '<br>');

            // Simple Table Logic
            if (html.includes('|')) {
                const lines = html.split('<br>');
                let tableHtml = '<table>';
                lines.forEach((line, i) => {
                    if (line.includes('|')) {
                        const cols = line.split('|').filter(c => c.trim().length > 0);
                        tableHtml += '<tr>' + cols.map(c => i === 0 ? `<th>${c}</th>` : `<td>${c}</td>`).join('') + '</tr>';
                    }
                });
                tableHtml += '</table>';
                return tableHtml;
            }

            return html.replace(/(<li>.*<\/li>)/gim, '<ul>$1</ul>').replace(/<\/ul><ul>/gim, '');
        }

        // --- UI HANDLERS ---
        function setSyncing(val) { document.getElementById('cloudSync').className = val ? 'sync-indicator syncing' : 'sync-indicator'; }
        
        function initChat() {
            const shell = document.getElementById('assistantShell');
            document.getElementById('sidebarToggle').onclick = () => shell.classList.toggle('is-sidebar-open');
            document.getElementById('themeToggle').onclick = () => {
                const t = document.body.classList.contains('theme-light') ? 'dark' : 'light';
                document.body.className = 'theme-' + t;
                localStorage.setItem("indicare-theme", t);
            };
            document.getElementById('privacyBtn').onclick = () => shell.classList.toggle('privacy-active');
            document.getElementById('send-btn').onclick = sendMessage;
            document.getElementById('newConversationBtn').onclick = () => window.location.reload();
            document.body.className = 'theme-' + (localStorage.getItem("indicare-theme") || 'light');
            loadConversations();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            window.isStreaming = true;
            document.getElementById('chatEmpty').hidden = true;
            document.getElementById('messages').hidden = false;
            appendMessage('user', text);
            input.value = '';
            await streamAssistantResponse("/chat/", { message: text, conversation_id: window.conversationId });
            window.isStreaming = false;
            loadConversations();
        }

        function appendMessage(role, text) {
            const wrapper = document.createElement("div");
            wrapper.className = `ica-message-wrapper is-${role}`;
            const avatar = role === 'assistant' ? 'IC' : 'Y';
            wrapper.innerHTML = `<div class="ica-message-avatar">${avatar}</div><div class="ica-message-block"><div class="ica-message">${role === 'user' ? text : renderMarkdown(text)}</div></div>`;
            document.getElementById('messages').appendChild(wrapper);
        }

        function createOrResetStreamingMessage() {
            const old = document.getElementById('streaming-msg');
            if (old) old.remove();
            const wrapper = document.createElement("div");
            wrapper.id = 'streaming-msg';
            wrapper.className = 'ica-message-wrapper is-assistant';
            wrapper.innerHTML = `<div class="ica-message-avatar">IC</div><div class="ica-message-block"><div class="ica-message" data-raw=""></div></div>`;
            document.getElementById('messages').appendChild(wrapper);
        }

        async function loadConversations() {
            const rows = await apiRequest("/chat/conversations") || [];
            const pins = JSON.parse(localStorage.getItem("indicare-pinned") || "[]");
            const render = (r) => `<div class="ica-history-item">
                <div class="ica-history-item-title" onclick="openConversation('${r.id}')">${r.title || "Observation"}</div>
                <button onclick="togglePin('${r.id}')">📌</button></div>`;
            document.getElementById('pinnedList').innerHTML = rows.filter(r => pins.includes(String(r.id))).map(render).join('');
            document.getElementById('recentList').innerHTML = rows.filter(r => !pins.includes(String(r.id))).map(render).join('');
        }

        window.togglePin = (id) => {
            let pins = JSON.parse(localStorage.getItem("indicare-pinned") || "[]");
            pins = pins.includes(String(id)) ? pins.filter(p => p !== String(id)) : [...pins, String(id)];
            localStorage.setItem("indicare-pinned", JSON.stringify(pins));
            loadConversations();
        };

        document.addEventListener("DOMContentLoaded", initChat);
    </script>
</body>
</html>
