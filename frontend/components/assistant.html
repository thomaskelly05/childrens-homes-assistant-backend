<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiCare AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- Premium Variables & Theming --- */
        :root {
            --bg-app: #ffffff;
            --bg-sidebar: #f9fafb;
            --bg-chat: #ffffff;
            --bg-input: #ffffff;
            --bg-msg-user: #f3f4f6;
            --bg-msg-assistant: transparent;
            --bg-hover: #f3f4f6;
            --bg-active: #e5e7eb;
            
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            
            --border-color: #e5e7eb;
            --accent-color: #0f766e; /* IndiCare Teal */
            --accent-hover: #115e59;
            --danger-color: #ef4444;
            
            /* Softer, more premium shadows */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.03);
            --shadow-md: 0 4px 12px -2px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 25px -3px rgb(0 0 0 / 0.08);
            
            --radius-lg: 12px;
            --radius-full: 9999px;
            --sidebar-width: 280px;
        }

        body.theme-dark {
            --bg-app: #111827;
            --bg-sidebar: #1f2937;
            --bg-chat: #111827;
            --bg-input: #374151;
            --bg-msg-user: #374151;
            --bg-msg-assistant: transparent;
            --bg-hover: #374151;
            --bg-active: #4b5563;
            
            --text-primary: #f9fafb;
            --text-secondary: #d1d5db;
            --text-muted: #6b7280;
            
            --border-color: #374151;
            --accent-color: #14b8a6;
            --accent-hover: #0d9488;
        }

        /* --- Resets --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-primary); height: 100vh; height: 100dvh; overflow: hidden; -webkit-font-smoothing: antialiased; }
        button { background: none; border: none; cursor: pointer; color: inherit; font: inherit; outline: none; }
        input, textarea, select { font: inherit; background: none; border: none; outline: none; color: inherit; }

        /* --- Layout --- */
        .ica-shell { display: flex; height: 100%; width: 100vw; position: relative; }
        .ica-hidden { display: none !important; }

        /* --- Sidebar --- */
        .ica-sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 40;
        }

        .is-sidebar-collapsed .ica-sidebar { width: 0; overflow: hidden; border-right: none; }

        .ica-sidebar-header { padding: 20px 16px; display: flex; gap: 8px; align-items: center; }
        .ica-btn-primary {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background-color: var(--accent-color); color: white;
            padding: 10px 16px; border-radius: var(--radius-full);
            font-weight: 500; width: 100%; transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }
        .ica-btn-primary:hover { background-color: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .ica-btn-primary:active { transform: translateY(0); }
        .ica-btn-primary svg { width: 18px; height: 18px; }

        .ica-sidebar-search-wrap { margin: 0 16px 16px; position: relative; }
        .ica-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; color: var(--text-muted); }
        .ica-search-input {
            width: 100%; background: var(--bg-app); padding: 10px 12px 10px 36px;
            border-radius: var(--radius-full); border: 1px solid var(--border-color);
            font-size: 0.875rem; transition: all 0.2s ease;
        }
        .ica-search-input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1); }

        .ica-sidebar-list-header { padding: 0 16px 8px; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .ica-sidebar-list { flex: 1; overflow-y: auto; padding: 0 8px; display: flex; flex-direction: column; gap: 2px; }
        
        /* Custom Scrollbar */
        .ica-sidebar-list::-webkit-scrollbar, .ica-chat-scroll::-webkit-scrollbar, .ica-textarea::-webkit-scrollbar { width: 6px; }
        .ica-sidebar-list::-webkit-scrollbar-track, .ica-chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .ica-sidebar-list::-webkit-scrollbar-thumb, .ica-chat-scroll::-webkit-scrollbar-thumb, .ica-textarea::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .ica-sidebar-list::-webkit-scrollbar-thumb:hover, .ica-chat-scroll::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .ica-history-item {
            padding: 12px 14px; border-radius: var(--radius-lg); cursor: pointer;
            position: relative; transition: background-color 0.2s ease;
        }
        .ica-history-item:hover { background-color: var(--bg-hover); }
        .ica-history-item.is-active { background-color: var(--bg-active); }
        .ica-history-item-top { display: flex; justify-content: space-between; align-items: center; }
        .ica-history-item-title { font-size: 0.875rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
        .ica-history-item-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }
        .ica-history-item-preview { display: none; } 

        .ica-history-actions { display: none; gap: 4px; }
        .ica-history-item:hover .ica-history-actions { display: flex; }
        .ica-history-icon-btn { color: var(--text-secondary); padding: 4px; border-radius: 4px; transition: 0.2s; }
        .ica-history-icon-btn:hover { color: var(--text-primary); background: var(--border-color); }
        .ica-history-icon-btn svg { width: 14px; height: 14px; }

        .ica-rename-input { width: 100%; font-size: 0.875rem; padding: 4px 6px; border: 1px solid var(--accent-color); border-radius: 6px; background: var(--bg-app); }

        .ica-sidebar-footer { padding: 16px; border-top: 1px solid var(--border-color); background: var(--bg-sidebar); padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
        .ica-select { width: 100%; padding: 10px 12px; margin-bottom: 12px; border-radius: var(--radius-lg); border: 1px solid var(--border-color); background: var(--bg-app); font-size: 0.875rem; cursor: pointer; transition: 0.2s; }
        .ica-select:hover { border-color: var(--text-muted); }
        .ica-btn-secondary { display: flex; align-items: center; gap: 8px; width: 100%; padding: 10px 12px; color: var(--text-secondary); font-size: 0.875rem; border-radius: var(--radius-lg); font-weight: 500; transition: 0.2s; }
        .ica-btn-secondary:hover { background-color: var(--bg-hover); color: var(--text-primary); }
        .ica-btn-secondary svg { width: 16px; height: 16px; }

        /* --- Main Area --- */
        .ica-main { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg-chat); min-width: 0; }
        .ica-header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; flex-shrink: 0; }
        .ica-header-left, .ica-header-right { display: flex; align-items: center; gap: 12px; }
        .ica-header-title { font-size: 1rem; font-weight: 600; color: var(--text-primary); display: none; }
        .ica-icon-btn { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: var(--radius-full); color: var(--text-secondary); transition: all 0.2s ease; }
        .ica-icon-btn:hover { background-color: var(--bg-hover); color: var(--text-primary); transform: scale(1.05); }
        .ica-icon-btn svg { width: 18px; height: 18px; }

        /* --- Chat Container --- */
        .ica-chat-scroll { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }
        .ica-messages-container { max-width: 768px; margin: 0 auto; display: flex; flex-direction: column; gap: 32px; padding-bottom: 20px; }

        /* --- Messages --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .ica-message-wrapper { display: flex; gap: 16px; width: 100%; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .ica-message-wrapper.is-user { flex-direction: row-reverse; }
        
        .ica-message-avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; background: var(--bg-active); color: var(--text-secondary); flex-shrink: 0; }
        .ica-message-wrapper.is-assistant .ica-message-avatar { background: var(--accent-color); color: white; }

        .ica-message-block { display: flex; flex-direction: column; gap: 6px; max-width: 85%; min-width: 0; }
        .ica-message-wrapper.is-user .ica-message-block { align-items: flex-end; }
        
        .ica-message-meta { display: none; } 

        .ica-message { padding: 14px 18px; font-size: 0.95rem; line-height: 1.6; color: var(--text-primary); word-break: break-word; }
        .ica-message.is-user { background-color: var(--bg-msg-user); border-radius: 20px 20px 4px 20px; }
        .ica-message.is-assistant { background-color: transparent; padding-left: 0; padding-top: 4px; }

        .ica-message-actions { display: flex; gap: 8px; margin-top: 4px; opacity: 0; transition: opacity 0.2s ease; }
        .ica-message-wrapper:hover .ica-message-actions { opacity: 1; }
        .ica-copy-btn { font-size: 0.75rem; font-weight: 500; color: var(--text-muted); background: transparent; padding: 4px 8px; border-radius: 6px; transition: 0.2s; border: 1px solid transparent; }
        .ica-copy-btn:hover { color: var(--text-primary); background: var(--bg-hover); border-color: var(--border-color); }

        /* --- Inline Edit --- */
        .ica-inline-edit-wrap { width: 100%; display: flex; flex-direction: column; gap: 8px; background: var(--bg-app); padding: 12px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); }
        .ica-inline-edit-textarea { width: 100%; min-width: 250px; padding: 8px; border-radius: 8px; border: none; background: transparent; font-size: 0.95rem; line-height: 1.5; resize: none; }
        .ica-inline-edit-textarea:focus { outline: none; }

        /* --- Markdown Styles inside Assistant Message --- */
        .ica-message.is-assistant p { margin-bottom: 1em; }
        .ica-message.is-assistant p:last-child { margin-bottom: 0; }
        .ica-message.is-assistant strong { font-weight: 600; color: var(--text-primary); }
        .ica-message.is-assistant ul, .ica-message.is-assistant ol { margin: 0.5em 0 1em 1.5em; padding: 0; }
        .ica-message.is-assistant li { margin-bottom: 0.35em; }
        .ica-message.is-assistant pre { background: var(--bg-sidebar); padding: 16px; border-radius: 12px; overflow-x: auto; margin: 1.5em 0; border: 1px solid var(--border-color); font-size: 0.85em; }
        .ica-message.is-assistant code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; background: var(--bg-hover); padding: 3px 6px; border-radius: 6px; font-size: 0.85em; }
        .ica-message.is-assistant pre code { background: none; padding: 0; border-radius: 0; }
        .ica-message.is-assistant blockquote { border-left: 3px solid var(--accent-color); padding-left: 16px; margin: 1.5em 0; color: var(--text-secondary); font-style: italic; background: var(--bg-hover); padding: 12px 12px 12px 16px; border-radius: 0 8px 8px 0; }

        /* --- Empty State --- */
        .ica-empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; max-width: 640px; margin: 0 auto; text-align: center; animation: fadeIn 0.6s ease-out; }
        .ica-empty-logo { width: 56px; height: 56px; color: var(--accent-color); margin-bottom: 24px; padding: 12px; background: rgba(15, 118, 110, 0.08); border-radius: 20px; }
        .ica-welcome-title { font-size: 1.75rem; font-weight: 600; margin-bottom: 12px; letter-spacing: -0.02em; }
        .ica-welcome-sub { color: var(--text-secondary); margin-bottom: 40px; font-size: 1rem; line-height: 1.6; max-width: 80%; }
        .ica-suggestions { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; width: 100%; }
        .ica-prompt-chip { background: var(--bg-app); border: 1px solid var(--border-color); padding: 16px; border-radius: 16px; font-size: 0.9rem; color: var(--text-secondary); text-align: left; transition: all 0.2s ease; box-shadow: var(--shadow-sm); }
        .ica-prompt-chip:hover { border-color: var(--accent-color); color: var(--text-primary); transform: translateY(-2px); box-shadow: var(--shadow-md); }

        /* --- Input Area (Premium Pill Design) --- */
        .ica-input-container { padding: 0 24px 16px; max-width: 768px; margin: 0 auto; width: 100%; position: relative; background: linear-gradient(180deg, rgba(255,255,255,0) 0%, var(--bg-chat) 20%); flex-shrink: 0; }
        .ica-input-box { 
            background: var(--bg-input); border: 1px solid var(--border-color); 
            border-radius: 28px; 
            padding: 8px 12px 8px 16px; 
            box-shadow: var(--shadow-md); 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
            position: relative; display: flex; flex-direction: column;
        }
        .ica-input-box:focus-within { border-color: var(--accent-color); box-shadow: var(--shadow-lg), 0 0 0 4px rgba(15, 118, 110, 0.05); }

        .ica-doc-chip { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--bg-hover); border-radius: 16px; margin-bottom: 8px; width: fit-content; border: 1px solid var(--border-color); animation: fadeIn 0.2s ease; }
        .ica-doc-chip svg { width: 14px; height: 14px; color: var(--accent-color); }
        .ica-doc-chip-text { font-size: 0.8rem; font-weight: 500; }
        .ica-icon-btn.small { width: 24px; height: 24px; }

        .ica-input-row { display: flex; align-items: flex-end; gap: 12px; }
        
        .ica-upload-label { cursor: pointer; color: var(--text-muted); padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; margin-bottom: 2px;}
        .ica-upload-label:hover { background: var(--bg-hover); color: var(--text-primary); }
        .ica-upload-label svg { width: 20px; height: 20px; }

        .ica-textarea { flex: 1; max-height: 150px; padding: 12px 0; resize: none; overflow-y: auto; font-size: 1rem; line-height: 1.5; margin-bottom: 2px; }
        .ica-textarea::placeholder { color: var(--text-muted); }

        .ica-input-actions { display: flex; gap: 4px; align-items: center; margin-bottom: 4px; }
        
        .ica-send-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-color); color: white; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .ica-send-btn:hover { background: var(--accent-hover); transform: scale(1.05); box-shadow: 0 2px 8px rgba(15, 118, 110, 0.3); }
        .ica-send-btn:disabled { background: var(--bg-active); color: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }
        .ica-send-btn svg { width: 16px; height: 16px; margin-left: -2px; }
        .ica-send-btn.is-loading svg { animation: spin 1s linear infinite; margin-left: 0; }

        /* --- Footer Meta Data / Legal - Hyper Compact --- */
        .ica-input-under { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px 0; font-size: 0.75rem; color: var(--text-muted); }
        .ica-text-btn { font-size: 0.75rem; color: var(--text-muted); transition: color 0.2s; }
        .ica-text-btn:hover { color: var(--text-primary); text-decoration: none; }

        .ica-footer-legal { 
            text-align: center; font-size: 0.65rem; color: var(--text-muted); 
            padding-top: 6px; display: flex; justify-content: center; align-items: center; gap: 8px; flex-wrap: wrap; 
            padding-bottom: env(safe-area-inset-bottom); /* iOS Safe Area */
        }

        /* --- Mic Recording State --- */
        #micBtn { margin-bottom: 2px; }
        #micBtn.is-recording { color: var(--danger-color); animation: pulse-red 1.5s infinite; background: rgba(239, 68, 68, 0.1); }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Premium Typing Indicator --- */
        .ica-typing-dots { display: flex; gap: 5px; padding: 12px 16px; background: var(--bg-hover); border-radius: 16px; width: fit-content; }
        .ica-typing-dots span { width: 6px; height: 6px; background: var(--accent-color); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; opacity: 0.6; }
        .ica-typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .ica-typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* --- Status Banner --- */
        .ica-status-banner { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-150%); background: var(--bg-sidebar); border: 1px solid var(--border-color); padding: 12px 24px; border-radius: var(--radius-full); box-shadow: var(--shadow-lg); z-index: 100; display: flex; align-items: center; gap: 10px; font-size: 0.875rem; font-weight: 500; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; }
        .ica-status-banner.is-show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .ica-status-banner svg { width: 18px; height: 18px; }
        .ica-status-banner.is-success svg { color: var(--accent-color); }
        .ica-status-banner.is-error svg { color: var(--danger-color); }
        .ica-status-banner.is-warn svg { color: #f59e0b; }

        /* --- Mobile Responsiveness --- */
        .ica-desktop-only { display: flex; }
        .ica-mobile-only { display: none; }
        .ica-sidebar-backdrop { display: none; position: absolute; inset: 0; background: rgba(17, 24, 39, 0.4); backdrop-filter: blur(2px); z-index: 30; opacity: 0; transition: opacity 0.3s ease; }

        @media (max-width: 980px) {
            .ica-desktop-only { display: none; }
            .ica-mobile-only { display: flex; }
            .ica-header { padding: 0 16px; }
            .ica-header-title { display: block; }
            
            .ica-sidebar { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); box-shadow: var(--shadow-lg); }
            .is-sidebar-open .ica-sidebar { transform: translateX(0); }
            .is-sidebar-open .ica-sidebar-backdrop { display: block; opacity: 1; }
            
            .ica-chat-scroll { padding: 16px 12px; }
            .ica-message-wrapper { gap: 10px; }
            .ica-message-block { max-width: 90%; }
            .ica-message { padding: 12px 14px; font-size: 0.9rem; }
            
            .ica-input-container { padding: 0 12px 12px; }
            .ica-input-box { border-radius: 24px; padding: 6px 8px 6px 12px; }
            .ica-textarea { font-size: 0.95rem; }
            
            .ica-empty-state { padding: 0 12px; }
            .ica-welcome-title { font-size: 1.5rem; }
            .ica-welcome-sub { max-width: 100%; font-size: 0.95rem; }
            
            /* Stack chips on small mobile */
            .ica-suggestions { grid-template-columns: 1fr; gap: 8px; }
            .ica-prompt-chip { padding: 14px; }
            
            /* Ultra compact footer on mobile */
            .ica-footer-legal { font-size: 0.6rem; }
            #footerCopyright { display: none; /* Hide copyright on mobile */ }
            
            /* Show actions immediately on touch devices */
            .ica-message-actions { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="statusBanner" class="ica-status-banner"></div>

    <div id="assistantShell" class="ica-shell">
        <div id="sidebarBackdrop" class="ica-sidebar-backdrop"></div>

        <aside class="ica-sidebar">
            <div class="ica-sidebar-header">
                <button id="newConversationBtn" class="ica-btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Chat
                </button>
                <button id="sidebarCollapseBtn" class="ica-icon-btn ica-desktop-only" aria-label="Collapse sidebar" title="Collapse sidebar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                </button>
            </div>
            
            <div class="ica-sidebar-search-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ica-search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="historySearch" class="ica-search-input" placeholder="Search history... (Ctrl+K)">
            </div>

            <div class="ica-sidebar-list-header">
                Conversations (<span id="historyCount">0</span>)
            </div>
            
            <div id="conversationList" class="ica-sidebar-list">
                </div>

            <div class="ica-sidebar-footer">
                <select id="responseMode" class="ica-select" aria-label="Response Mode">
                    <option value="balanced" selected>⚖️ Balanced</option>
                    <option value="quick">⚡ Quick</option>
                    <option value="deep">🧠 Deep review</option>
                </select>
                <button id="logoutBtn" class="ica-btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </button>
            </div>
        </aside>

        <main class="ica-main">
            <header class="ica-header">
                <div class="ica-header-left">
                    <button id="sidebarToggle" class="ica-icon-btn ica-mobile-only" aria-label="Open Menu">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <h1 id="conversationHeading" class="ica-header-title">New conversation</h1>
                </div>
                <div class="ica-header-right">
                    <button id="headerNewChatBtn" class="ica-icon-btn ica-mobile-only" title="New Chat">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </button>
                </div>
            </header>

            <div id="chat" class="ica-chat-scroll">
                
                <div id="chatEmpty" class="ica-empty-state">
                    <div class="ica-empty-logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 12V2.25A9.96 9.96 0 0 1 22 12h-9.75z"></path></svg>
                    </div>
                    <h2 id="welcomeHeading" class="ica-welcome-title">Good morning</h2>
                    <p id="welcomeSubtext" class="ica-welcome-sub">How can I help today?</p>
                    
                    <div class="ica-suggestions">
                        <button class="ica-prompt-chip"><strong>Draft a support plan</strong><br/><span style="font-size: 0.8em; color: var(--text-muted)">Create a structured behaviour outline</span></button>
                        <button class="ica-prompt-chip"><strong>Review wording</strong><br/><span style="font-size: 0.8em; color: var(--text-muted)">Check a safeguarding log for neutrality</span></button>
                        <button class="ica-prompt-chip"><strong>Key work ideas</strong><br/><span style="font-size: 0.8em; color: var(--text-muted)">Activities for teenagers</span></button>
                        <button class="ica-prompt-chip"><strong>Reflect on an incident</strong><br/><span style="font-size: 0.8em; color: var(--text-muted)">Debrief a recent challenging situation</span></button>
                    </div>
                </div>

                <div id="messages" class="ica-messages-container" hidden></div>

                <div id="typingRow" class="ica-message-wrapper is-assistant" hidden>
                    <div class="ica-message-avatar">IC</div>
                    <div class="ica-message-block">
                        <div class="ica-typing-dots"><span></span><span></span><span></span></div>
                    </div>
                </div>
                
            </div>

            <div class="ica-input-container">
                <div class="ica-input-box">
                    
                    <div id="documentChip" class="ica-doc-chip ica-hidden">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                        <span id="documentChipText" class="ica-doc-chip-text"></span>
                        <button id="clearDocumentBtn" class="ica-icon-btn small">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>

                    <div class="ica-input-row">
                        <label for="documentUpload" class="ica-upload-label" title="Attach Document">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                            <input type="file" id="documentUpload" hidden>
                        </label>
                        
                        <textarea id="chat-input" class="ica-textarea" placeholder="Message IndiCare..." rows="1"></textarea>
                        
                        <div class="ica-input-actions">
                            <button id="micBtn" class="ica-icon-btn" title="Start voice input">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                            </button>
                            <button id="send-btn" class="ica-send-btn" title="Send message">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="ica-input-under">
                    <span id="uploadStatus"></span>
                    <button id="clearChatBtn" class="ica-text-btn">Clear draft</button>
                </div>

                <div class="ica-footer-legal">
                    <span id="footerWarning"></span>
                    <span id="footerCopyright"></span>
                </div>
            </div>
        </main>
    </div>

    <script>
        window.conversationId = null;
        window.currentDocumentText = null;
        window.currentDocumentName = null;

        const chatState = {
            historyRows: [],
            theme: localStorage.getItem("indicare-theme") || "light",
            recognition: null,
            isRecording: false,
            speechSupported: false,
            draftKeyPrefix: "indicare-chat-draft:",
            isStreamingResponse: false
        };

        function initChat() {
            applyTheme(chatState.theme);
            bindChatInput();
            bindConversationButtons();
            bindDocumentUpload();
            bindLogout();
            bindHistorySearch();
            bindSidebarControls();
            bindSidebarCollapse();
            bindThemeToggle();
            bindGlobalMessageActions();
            bindResponseMode();
            initSpeechToText();
            applyWelcomeMessage();
            applyFooterMeta();
            refreshUploadStatus();
            restoreDraft();
            loadConversations(true);
        }

        window.initChat = initChat;

        function bindChatInput() {
            const sendBtn = document.getElementById("send-btn");
            const input = document.getElementById("chat-input");
            const clearBtn = document.getElementById("clearChatBtn");

            if (!sendBtn || !input) return;

            autoResizeTextarea(input);

            sendBtn.addEventListener("click", sendMessage);

            input.addEventListener("input", () => {
                autoResizeTextarea(input);
                saveDraft();
                
                if(input.value.trim().length > 0) {
                    sendBtn.style.opacity = "1";
                } else {
                    sendBtn.style.opacity = "0.7";
                }
            });

            input.addEventListener("keydown", (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") {
                    e.preventDefault();
                    document.getElementById("historySearch")?.focus();
                    return;
                }

                if (e.key === "Enter" && !e.shiftKey) {
                    // Prevent default enter key behavior on mobile to avoid jumping, submit instead
                    if(window.innerWidth > 768) {
                        e.preventDefault();
                        sendMessage();
                    }
                }
            });

            clearBtn?.addEventListener("click", () => {
                input.value = "";
                autoResizeTextarea(input);
                saveDraft();
                input.focus();
                sendBtn.style.opacity = "0.7";
            });

            document.querySelectorAll(".ica-prompt-chip").forEach((chip) => {
                chip.addEventListener("click", () => {
                    const strongText = chip.querySelector('strong')?.textContent;
                    input.value = strongText || chip.textContent?.trim() || "";
                    autoResizeTextarea(input);
                    saveDraft();
                    sendBtn.style.opacity = "1";
                    input.focus();
                });
            });
        }

        function bindConversationButtons() {
            document.getElementById("newConversationBtn")?.addEventListener("click", startNewConversation);
            document.getElementById("headerNewChatBtn")?.addEventListener("click", startNewConversation);
        }

        function bindHistorySearch() {
            const search = document.getElementById("historySearch");
            if (!search) return;

            search.addEventListener("input", () => {
                renderConversationList(chatState.historyRows, search.value.trim());
            });
        }

        function bindSidebarControls() {
            const shell = document.getElementById("assistantShell");
            const toggle = document.getElementById("sidebarToggle");
            const backdrop = document.getElementById("sidebarBackdrop");

            if (!shell) return;

            toggle?.addEventListener("click", () => {
                shell.classList.toggle("is-sidebar-open");
                toggle.setAttribute("aria-expanded", String(shell.classList.contains("is-sidebar-open")));
            });

            backdrop?.addEventListener("click", closeSidebar);

            window.addEventListener("resize", () => {
                if (window.innerWidth > 980) {
                    closeSidebar();
                }
            });
        }

        function bindSidebarCollapse() {
            const shell = document.getElementById("assistantShell");
            const collapseBtn = document.getElementById("sidebarCollapseBtn");

            if (!shell || !collapseBtn) return;

            const savedState = localStorage.getItem("indicare-sidebar-collapsed");
            if (savedState === "true" && window.innerWidth > 980) {
                shell.classList.add("is-sidebar-collapsed");
                collapseBtn.setAttribute("aria-label", "Expand sidebar");
                collapseBtn.setAttribute("title", "Expand sidebar");
            }

            collapseBtn.addEventListener("click", () => {
                if (window.innerWidth <= 980) return;

                shell.classList.toggle("is-sidebar-collapsed");
                const collapsed = shell.classList.contains("is-sidebar-collapsed");

                localStorage.setItem("indicare-sidebar-collapsed", String(collapsed));
                collapseBtn.setAttribute("aria-label", collapsed ? "Expand sidebar" : "Collapse sidebar");
                collapseBtn.setAttribute("title", collapsed ? "Expand sidebar" : "Collapse sidebar");
            });

            window.addEventListener("resize", () => {
                if (window.innerWidth <= 980) {
                    shell.classList.remove("is-sidebar-collapsed");
                } else {
                    const shouldCollapse = localStorage.getItem("indicare-sidebar-collapsed") === "true";
                    shell.classList.toggle("is-sidebar-collapsed", shouldCollapse);
                    collapseBtn.setAttribute("aria-label", shouldCollapse ? "Expand sidebar" : "Collapse sidebar");
                    collapseBtn.setAttribute("title", shouldCollapse ? "Expand sidebar" : "Collapse sidebar");
                }
            });
        }

        function bindThemeToggle() {
            document.getElementById("themeToggle")?.addEventListener("click", () => {
                applyTheme(chatState.theme === "dark" ? "light" : "dark");
            });
        }

        function bindResponseMode() {
            const select = document.getElementById("responseMode");
            if (!select) return;

            const saved = localStorage.getItem("indicare-response-mode");
            if (saved && ["quick", "balanced", "deep"].includes(saved)) {
                select.value = saved;
            }

            select.addEventListener("change", () => {
                const value = getResponseMode();
                localStorage.setItem("indicare-response-mode", value);
                showStatusBanner("success", `Response mode set to ${labelForResponseMode(value)}.`);
            });
        }

        function getResponseMode() {
            const select = document.getElementById("responseMode");
            const value = select?.value || localStorage.getItem("indicare-response-mode") || "balanced";
            return ["quick", "balanced", "deep"].includes(value) ? value : "balanced";
        }

        function labelForResponseMode(value) {
            if (value === "quick") return "Quick";
            if (value === "deep") return "Deep review";
            return "Balanced";
        }

        function bindGlobalMessageActions() {
            const messages = document.getElementById("messages");
            if (!messages) return;

            messages.addEventListener("click", async (event) => {
                const copyBtn = event.target.closest("[data-copy-text]");
                if (copyBtn) {
                    const text = copyBtn.getAttribute("data-copy-text") || "";
                    try {
                        await navigator.clipboard.writeText(text);
                        const original = copyBtn.innerHTML;
                        copyBtn.innerHTML = `Copied ✓`;
                        setTimeout(() => {
                            copyBtn.innerHTML = original;
                        }, 1500);
                    } catch (err) {
                        console.error("Copy failed:", err);
                    }
                    return;
                }

                const editBtn = event.target.closest("[data-edit-message-id]");
                if (editBtn) {
                    const messageId = editBtn.getAttribute("data-edit-message-id");
                    const currentText = decodeURIComponent(editBtn.getAttribute("data-current-text") || "");
                    if (messageId) await startInlineMessageEdit(messageId, currentText);
                    return;
                }

                const cancelBtn = event.target.closest("[data-cancel-edit-message-id]");
                if (cancelBtn) {
                    const messageId = cancelBtn.getAttribute("data-cancel-edit-message-id");
                    if (messageId) cancelInlineMessageEdit(messageId);
                    return;
                }

                const saveBtn = event.target.closest("[data-save-edit-message-id]");
                if (saveBtn) {
                    const messageId = saveBtn.getAttribute("data-save-edit-message-id");
                    if (messageId) await submitInlineMessageEdit(messageId);
                }
            });

            messages.addEventListener("keydown", async (event) => {
                const textarea = event.target.closest(".ica-inline-edit-textarea");
                if (!textarea) return;

                const messageId = textarea.getAttribute("data-editing-message-id");
                if (!messageId) return;

                if (event.key === "Escape") {
                    event.preventDefault();
                    cancelInlineMessageEdit(messageId);
                }

                if (event.key === "Enter" && !event.shiftKey) {
                    event.preventDefault();
                    await submitInlineMessageEdit(messageId);
                }
            });

            messages.addEventListener("input", (event) => {
                const textarea = event.target.closest(".ica-inline-edit-textarea");
                if (!textarea) return;
                autoResizeTextarea(textarea);
            });
        }

        function applyTheme(theme) {
            chatState.theme = theme;
            localStorage.setItem("indicare-theme", theme);
            document.body.classList.toggle("theme-dark", theme === "dark");
        }

        function closeSidebar() {
            const shell = document.getElementById("assistantShell");
            const toggle = document.getElementById("sidebarToggle");
            if (!shell) return;

            shell.classList.remove("is-sidebar-open");
            toggle?.setAttribute("aria-expanded", "false");
        }

        function bindDocumentUpload() {
            const uploadInput = document.getElementById("documentUpload");
            const clearBtn = document.getElementById("clearDocumentBtn");

            uploadInput?.addEventListener("change", async () => {
                const file = uploadInput.files?.[0];
                if (!file) return;

                const formData = new FormData();
                formData.append("file", file);

                if (window.conversationId) {
                    formData.append("conversation_id", String(window.conversationId));
                }

                setUploadStatus(`Uploading ${file.name}...`);
                showStatusBanner("success", `Uploading ${file.name}...`);

                try {
                    const token = localStorage.getItem("access_token");

                    const response = await fetch("/chat/upload", {
                        method: "POST",
                        headers: {
                            ...(token ? { Authorization: `Bearer ${token}` } : {})
                        },
                        credentials: "include",
                        body: formData
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        if (response.status === 401) {
                            localStorage.removeItem("access_token");
                            localStorage.removeItem("current_user");
                            window.location.href = "/login";
                            return;
                        }

                        setUploadStatus(data.detail || "Upload failed.");
                        showStatusBanner("error", data.detail || "Upload failed.");
                        return;
                    }

                    window.currentDocumentText = data.text || "";
                    window.currentDocumentName = data.filename || file.name;
                    refreshUploadStatus();
                    showStatusBanner("success", "Document attached.");
                } catch (error) {
                    console.error("Upload failed:", error);
                    setUploadStatus("Could not upload the document.");
                    showStatusBanner("error", "Could not upload the document.");
                } finally {
                    uploadInput.value = "";
                }
            });

            clearBtn?.addEventListener("click", async () => {
                if (window.conversationId) {
                    try {
                        await fetch(`/chat/conversations/${window.conversationId}/document`, {
                            method: "DELETE"
                        });
                    } catch (error) {
                        console.error("Failed to clear stored document:", error);
                    }
                }

                window.currentDocumentText = null;
                window.currentDocumentName = null;
                refreshUploadStatus();
                showStatusBanner("warn", "Document removed.");
            });
        }

        function setUploadStatus(text) {
            const uploadStatus = document.getElementById("uploadStatus");
            if (uploadStatus) uploadStatus.textContent = text || "";
        }

        function refreshUploadStatus() {
            const chip = document.getElementById("documentChip");
            const chipText = document.getElementById("documentChipText");

            if (window.currentDocumentName && window.currentDocumentText) {
                chip?.classList.remove("ica-hidden");
                if (chipText) chipText.textContent = window.currentDocumentName;
                setUploadStatus("Document attached.");
            } else {
                chip?.classList.add("ica-hidden");
                if (chipText) chipText.textContent = "";
                setUploadStatus("");
            }
        }

        function showStatusBanner(type, message) {
            const banner = document.getElementById("statusBanner");
            if (!banner) return;

            const icons = {
                success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`,
                warn: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`,
                error: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`
            };

            banner.className = `ica-status-banner is-show is-${type}`;
            banner.innerHTML = `${icons[type] || ""}<span>${escapeHtml(message)}</span>`;

            clearTimeout(showStatusBanner._timer);
            showStatusBanner._timer = setTimeout(() => {
                banner.className = "ica-status-banner";
                banner.innerHTML = "";
            }, 3000);
        }

        function bindLogout() {
            const logoutBtn = document.getElementById("logoutBtn");
            if (!logoutBtn) return;

            logoutBtn.addEventListener("click", async () => {
                try {
                    localStorage.removeItem("access_token");
                    localStorage.removeItem("current_user");

                    try {
                        await fetch("/auth/logout", { method: "POST" });
                    } catch (_) {}

                    window.location.href = "/login";
                } catch (_) {
                    window.location.href = "/login";
                }
            });
        }

        function getAdultFirstName() {
            try {
                const raw = localStorage.getItem("current_user");
                if (!raw) return "";
                const parsed = JSON.parse(raw);

                if (parsed?.first_name) return String(parsed.first_name).trim();
                if (parsed?.user?.first_name) return String(parsed.user.first_name).trim();
                if (parsed?.adult?.first_name) return String(parsed.adult.first_name).trim();

                return "";
            } catch (error) {
                console.error("Could not read first_name from current_user:", error);
                return "";
            }
        }

        function getUserInitials() {
            try {
                const raw = localStorage.getItem("current_user");
                if (!raw) return "Y";
                const parsed = JSON.parse(raw);

                const firstName = parsed?.first_name || parsed?.user?.first_name || parsed?.adult?.first_name || "";
                const lastName = parsed?.last_name || parsed?.user?.last_name || parsed?.adult?.last_name || "";

                const firstInitial = String(firstName).trim().slice(0, 1).toUpperCase();
                const lastInitial = String(lastName).trim().slice(0, 1).toUpperCase();

                const initials = `${firstInitial}${lastInitial}`.trim();
                return initials || firstInitial || "Y";
            } catch {
                return "Y";
            }
        }

        function getTimeGreeting() {
            const hour = new Date().getHours();
            if (hour < 12) return "Good morning";
            if (hour < 18) return "Good afternoon";
            return "Good evening";
        }

        function applyWelcomeMessage() {
            const heading = document.getElementById("welcomeHeading");
            const subtext = document.getElementById("welcomeSubtext");

            if (!heading || !subtext) return;

            const firstName = getAdultFirstName();
            const greeting = getTimeGreeting();

            heading.textContent = firstName ? `${greeting}, ${firstName}` : greeting;
            subtext.textContent = firstName
                ? `How can I help with support for ${firstName} today?`
                : `How can I help today?`;
        }

        function applyFooterMeta() {
            const warning = document.getElementById("footerWarning");
            const copyright = document.getElementById("footerCopyright");

            if (warning) {
                warning.innerHTML = `<span>Important: Verify AI outputs against guidance and policy.</span>`;
            }

            if (copyright) {
                copyright.textContent = `© ${new Date().getFullYear()} IndiCare.`;
            }
        }

        function initSpeechToText() {
            const micBtn = document.getElementById("micBtn");
            const input = document.getElementById("chat-input");
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!micBtn || !input || !SpeechRecognition) {
                if (micBtn) {
                    micBtn.style.display = "none";
                }
                return;
            }

            chatState.speechSupported = true;

            const recognition = new SpeechRecognition();
            recognition.lang = "en-GB";
            recognition.interimResults = true;
            recognition.continuous = false;
            recognition.maxAlternatives = 1;

            let baseTextBeforeRecording = "";
            let micBusy = false;

            recognition.onstart = () => {
                chatState.isRecording = true;
                baseTextBeforeRecording = input.value.trim();
                micBtn.classList.add("is-recording");
                micBtn.setAttribute("aria-label", "Stop voice input");
                micBtn.title = "Listening… click to stop";
            };

            recognition.onresult = (event) => {
                const results = Array.from(event.results);
                const transcript = results.map((r) => r[0].transcript).join(" ").trim();

                input.value = [baseTextBeforeRecording, transcript].filter(Boolean).join(baseTextBeforeRecording ? " " : "");
                autoResizeTextarea(input);
                saveDraft();
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error:", event.error);

                if (event.error === "aborted") {
                    stopMicVisualState();
                    return;
                }

                if (event.error === "no-speech") {
                    stopMicVisualState();
                    showStatusBanner("warn", "No speech was detected.");
                    return;
                }

                if (event.error === "not-allowed" || event.error === "service-not-allowed") {
                    stopMicVisualState();
                    showStatusBanner("error", "Microphone access was not allowed.");
                    return;
                }

                stopMicVisualState();
                showStatusBanner("error", "Voice input could not be completed.");
            };

            recognition.onend = () => {
                stopMicVisualState();
                input.focus();
                saveDraft();
            };

            micBtn.addEventListener("click", () => {
                if (micBusy) return;

                if (!chatState.isRecording) {
                    try {
                        micBusy = true;
                        recognition.start();
                        setTimeout(() => {
                            micBusy = false;
                        }, 400);
                    } catch (error) {
                        micBusy = false;
                        console.error("Could not start speech recognition:", error);
                    }
                } else {
                    micBusy = true;
                    recognition.stop();
                    setTimeout(() => {
                        micBusy = false;
                    }, 400);
                }
            });

            chatState.recognition = recognition;
        }

        function stopMicVisualState() {
            const micBtn = document.getElementById("micBtn");
            chatState.isRecording = false;

            if (micBtn) {
                micBtn.classList.remove("is-recording");
                micBtn.setAttribute("aria-label", "Start voice input");
                micBtn.title = "Start voice input";
            }
        }

        function getDraftStorageKey() {
            return `${chatState.draftKeyPrefix}${window.conversationId || "new"}`;
        }

        function saveDraft() {
            const input = document.getElementById("chat-input");
            if (!input) return;
            localStorage.setItem(getDraftStorageKey(), input.value || "");
        }

        function restoreDraft() {
            const input = document.getElementById("chat-input");
            if (!input) return;

            const draft = localStorage.getItem(getDraftStorageKey()) || "";
            input.value = draft;
            autoResizeTextarea(input);
            
            const sendBtn = document.getElementById("send-btn");
            if(sendBtn) sendBtn.style.opacity = draft.trim().length > 0 ? "1" : "0.7";
        }

        function clearDraft() {
            localStorage.removeItem(getDraftStorageKey());
        }

        async function streamAssistantResponse(url, bodyData) {
            try {
                const token = localStorage.getItem("access_token");

                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        ...(token ? { Authorization: `Bearer ${token}` } : {})
                    },
                    credentials: "include",
                    body: JSON.stringify(bodyData)
                });

                if (!response.ok || !response.body) {
                    let data = {};
                    try { data = await response.json(); } catch { data = {}; }

                    if (response.status === 401) {
                        localStorage.removeItem("access_token");
                        localStorage.removeItem("current_user");
                        window.location.href = "/login";
                        return;
                    }

                    appendMessage("assistant", data.detail || `Request failed (${response.status}).`);
                    showStatusBanner("error", data.detail || `Request failed (${response.status}).`);
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                let fullText = "";
                let receivedAnyChunk = false;
                let buffer = ""; 

                createOrResetStreamingAssistantMessage();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const messages = buffer.split(/\n\n/);
                    
                    buffer = messages.pop() || "";

                    for (const message of messages) {
                        if (!message.trim()) continue;

                        const lines = message.split('\n');
                        for (const line of lines) {
                            if (line.startsWith('data:')) {
                                let chunkData = line.slice(5);
                                
                                if (chunkData.startsWith(' ')) {
                                    chunkData = chunkData.slice(1);
                                }
                                
                                if (chunkData === '[DONE]') continue;

                                receivedAnyChunk = true;
                                fullText += chunkData;
                                
                                updateAssistantMessage(fullText);
                            }
                        }
                    }
                }

                if (!receivedAnyChunk && !fullText.trim()) {
                    updateAssistantMessage("Sorry, something went wrong.");
                }
            } catch (error) {
                console.error("Stream failed:", error);

                const isNetworkDrop =
                    error instanceof TypeError &&
                    /load failed|network connection was lost|fetch/i.test(String(error.message || error));

                if (isNetworkDrop) {
                    appendMessage("assistant", "The connection dropped while waiting for a response. Please try again.");
                    showStatusBanner("error", "The connection was lost while generating the reply.");
                    return;
                }

                appendMessage("assistant", `Connection error: ${error?.message || "Unknown error"}`);
                showStatusBanner("error", "The connection was lost while generating the reply.");
            }
        }

        async function sendMessage() {
            const input = document.getElementById("chat-input");
            if (!input || chatState.isStreamingResponse) return;

            const message = input.value.trim();
            if (!message) return;

            removeChatEmptyState();
            ensureMessagesContainer();
            appendMessage("user", message);
            input.value = "";
            autoResizeTextarea(input);
            clearDraft();
            
            const sendBtn = document.getElementById("send-btn");
            if(sendBtn) sendBtn.style.opacity = "0.7";

            setSendLoading(true);
            showTypingIndicator(true);
            chatState.isStreamingResponse = true;

            try {
                await streamAssistantResponse("/chat/", {
                    message,
                    conversation_id: window.conversationId || null,
                    document_text: window.currentDocumentText,
                    document_name: window.currentDocumentName,
                    response_mode: getResponseMode()
                });

                await loadConversations(true);
            } finally {
                chatState.isStreamingResponse = false;
                showTypingIndicator(false);
                setSendLoading(false);
            }
        }

        function createMessageElement(role, text = "", messageId = null, timestamp = null) {

            avatar.className = "ica-message-avatar";
            avatar.textContent = role === "assistant" ? "IC" : getUserInitials();

            const block = document.createElement("div");
            block.className = "ica-message-block";

            const meta = document.createElement("div");

            const roleLabel = role === "assistant" ? "IndiCare" : "You";

            meta.textContent = `${roleLabel} · ${displayTime}`;

            const msg = document.createElement("div");
            msg.className = `ica-message ${role === "user" ? "is-user" : "is-assistant"}`;

                copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;margin-right:4px;vertical-align:middle;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>Copy`;
                copyBtn.setAttribute("data-copy-text", text);

                actions.appendChild(copyBtn);
                block.appendChild(meta);
                block.appendChild(msg);
                block.appendChild(actions);
            } else {
                msg.textContent = text;

                const actions = document.createElement("div");
                actions.className = "ica-message-actions";

                if (messageId) {
                    const editBtn = document.createElement("button");
                    editBtn.className = "ica-copy-btn";
                    editBtn.type = "button";
                    editBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;margin-right:4px;vertical-align:middle;"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path></svg>Edit`;
                    editBtn.setAttribute("data-edit-message-id", messageId);
                    editBtn.setAttribute("data-current-text", encodeURIComponent(text));
                    actions.appendChild(editBtn);
                }

                block.appendChild(meta);
                block.appendChild(msg);
                if (messageId) block.appendChild(actions);
            }

            if (role === "user") {
                wrapper.appendChild(block);
            } else {

            return wrapper;
