<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IndiCare | Assistant</title>

    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
    <link rel="stylesheet" href="/css/reset.css" />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/components.css" />

    <style>
        .assistant-page {
            min-height: 100vh;
            background: var(--bg);
        }

        .assistant-shell {
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: 100vh;
        }

        .assistant-history {
            background: linear-gradient(180deg, #0c1730 0%, #122348 100%);
            color: #fff;
            border-right: 1px solid rgba(255,255,255,0.08);
            display: grid;
            grid-template-rows: auto auto auto 1fr auto;
            gap: 1rem;
            padding: 1rem;
            min-height: 0;
        }

        .assistant-brand {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.4rem 0.25rem;
        }

        .assistant-brand img {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(255,255,255,0.12);
            padding: 0.35rem;
        }

        .assistant-brand h1 {
            margin: 0;
            font-size: 1.25rem;
            line-height: 1.1;
        }

        .assistant-brand p {
            margin: 0.2rem 0 0;
            font-size: 0.92rem;
            color: rgba(255,255,255,0.72);
        }

        .assistant-history-top {
            display: grid;
            gap: 0.75rem;
        }

        .history-title {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 700;
            color: rgba(255,255,255,0.88);
        }

        .upload-panel {
            display: grid;
            gap: 0.65rem;
            padding: 0.85rem;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            border-radius: 14px;
        }

        .upload-panel label {
            color: #fff;
            font-weight: 700;
        }

        .upload-panel input[type="file"] {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.16);
        }

        .upload-meta {
            font-size: 0.86rem;
            color: rgba(255,255,255,0.76);
            line-height: 1.45;
        }

        .history-list {
            min-height: 0;
            overflow-y: auto;
            display: grid;
            gap: 0.65rem;
            padding-right: 0.15rem;
        }

        .history-empty {
            color: rgba(255,255,255,0.68);
            font-size: 0.92rem;
            line-height: 1.5;
            padding: 0.3rem 0.1rem;
        }

        .history-item {
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 0.85rem;
        }

        .history-item.active {
            background: rgba(79,116,255,0.18);
            border-color: rgba(121,147,255,0.45);
        }

        .history-item-title {
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.35rem;
            line-height: 1.35;
            word-break: break-word;
        }

        .history-item-meta {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.66);
            margin-bottom: 0.6rem;
        }

        .history-item-actions {
            display: flex;
            gap: 0.45rem;
            flex-wrap: wrap;
        }

        .history-btn {
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(255,255,255,0.08);
            color: #fff;
            border-radius: 10px;
            padding: 0.35rem 0.6rem;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .assistant-history-footer {
            display: grid;
            gap: 0.75rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.08);
            color: #fff;
            border-radius: 12px;
            padding: 0.8rem 0.95rem;
            text-decoration: none;
            font-weight: 600;
        }

        .assistant-main {
            min-width: 0;
            display: grid;
            grid-template-rows: auto 1fr auto;
            background: var(--bg);
        }

        .assistant-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1.1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(8px);
        }

        .assistant-topbar h2 {
            margin: 0 0 0.2rem;
            font-size: 1.35rem;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        .assistant-topbar p {
            margin: 0;
            color: var(--text-soft);
            font-size: 0.94rem;
        }

        .assistant-chat {
            overflow-y: auto;
            padding: 1.5rem;
            background:
                radial-gradient(circle at top left, rgba(79,116,255,0.08), transparent 18%),
                linear-gradient(180deg, #fbfcff 0%, #f4f8fd 100%);
        }

        .chat-empty {
            min-height: calc(100vh - 240px);
            display: grid;
            place-items: center;
            text-align: center;
            color: var(--text-soft);
        }

        .chat-empty h3 {
            margin: 0 0 0.5rem;
            color: var(--text);
            font-size: 1.4rem;
            letter-spacing: -0.03em;
        }

        .message-wrapper {
            display: flex;
            margin-bottom: 1rem;
        }

        .message-wrapper.user {
            justify-content: flex-end;
        }

        .message-wrapper.assistant {
            justify-content: flex-start;
        }

        .message-block {
            max-width: min(820px, 88%);
        }

        .message {
            padding: 1rem 1.05rem;
            border-radius: 18px;
            line-height: 1.65;
            word-break: break-word;
            box-shadow: var(--shadow-sm);
        }

        .message.user {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .message.assistant {
            background: #fff;
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 6px;
        }

        .message-actions {
            margin-top: 0.45rem;
            display: flex;
            gap: 0.45rem;
        }

        .copy-btn {
            border: 1px solid var(--border);
            background: var(--surface-muted);
            color: var(--text-soft);
            border-radius: 10px;
            padding: 0.35rem 0.65rem;
            cursor: pointer;
            font-size: 0.82rem;
        }

        .assistant-inputbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 0.75rem;
            align-items: center;
            padding: 1rem 1.5rem 1.25rem;
            border-top: 1px solid var(--border);
            background: rgba(255,255,255,0.92);
        }

        #chat-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: #fff;
            color: var(--text);
            padding: 1rem 1rem;
            outline: none;
        }

        #chat-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(47,92,255,0.12);
        }

        @media (max-width: 980px) {
            .assistant-shell {
                grid-template-columns: 1fr;
            }

            .assistant-history {
                min-height: auto;
                grid-template-rows: auto auto auto auto auto;
            }

            .history-list {
                max-height: 280px;
            }
        }

        @media (max-width: 720px) {
            .assistant-topbar,
            .assistant-chat,
            .assistant-inputbar {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .assistant-inputbar {
                grid-template-columns: 1fr;
            }

            .message-block {
                max-width: 100%;
            }
        }
    </style>
</head>
<body class="assistant-page">
    <div class="assistant-shell">
        <aside class="assistant-history">
            <div class="assistant-brand">
                <img src="/assets/logo.svg" alt="IndiCare logo" />
                <div>
                    <h1>IndiCare</h1>
                    <p>Assistant</p>
                </div>
            </div>

            <div class="assistant-history-top">
                <button id="newConversationBtn" class="button" type="button">New chat</button>
                <h3 class="history-title">Chat history</h3>
            </div>

            <div class="upload-panel">
                <label for="documentUpload">Upload document</label>
                <input id="documentUpload" type="file" accept=".txt,.docx,.pdf" />
                <div id="uploadStatus" class="upload-meta">No document loaded.</div>
                <button id="clearDocumentBtn" class="button button--secondary" type="button">Clear document</button>
            </div>

            <div id="conversationList" class="history-list">
                <div class="history-empty">No conversations yet.</div>
            </div>

            <div class="assistant-history-footer">
                <a href="/" class="back-link">Back to dashboard</a>
                <button id="logoutBtn" class="button button--secondary" type="button">Log out</button>
            </div>
        </aside>

        <main class="assistant-main">
            <header class="assistant-topbar">
                <div>
                    <h2>IndiCare Assistant</h2>
                    <p id="conversationHeading">New conversation</p>
                </div>
                <div class="user-badge">Residential AI Brain</div>
            </header>

            <section id="chat" class="assistant-chat">
                <div class="chat-empty">
                    <div>
                        <h3>How can I help today?</h3>
                        <p>Ask anything about residential care practice, wording, reflection, planning, records, or professional support.</p>
                    </div>
                </div>
            </section>

            <div class="assistant-inputbar">
                <input id="chat-input" type="text" placeholder="Message IndiCare..." />
                <button id="send-btn" class="button" type="button">Send</button>
            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
