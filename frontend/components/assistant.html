<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndiCare OS</title>

<style>
body{margin:0;font-family:Inter, sans-serif;background:#f4f7fb;color:#1e293b}
.hidden{display:none}
.shell{display:flex;height:100vh}
.sidebar{width:240px;background:#fff;border-right:1px solid #ddd;padding:12px}
.workspace{flex:1;display:flex;flex-direction:column}

.navbtn{display:block;width:100%;padding:10px;border-radius:8px;margin-bottom:6px;text-align:left;cursor:pointer}
.navbtn.active{background:#2563eb;color:#fff}

.panel{flex:1;overflow:auto;padding:20px}
.card{border:1px solid #ddd;border-radius:10px;padding:14px;margin-bottom:12px;background:#fff}

.field,.area,.sel{width:100%;padding:8px;margin-top:4px;margin-bottom:10px}
.action{background:#2563eb;color:#fff;padding:10px;border:none;border-radius:8px;cursor:pointer}

.entity-row{border:1px solid #ddd;padding:10px;border-radius:8px;margin-bottom:8px}
</style>
</head>

<body>

<div class="shell">

<!-- SIDEBAR -->
<div class="sidebar">
  <button id="navAssistant" class="navbtn active">Assistant</button>
  <button id="navLibrary" class="navbtn">Library</button>
  <button id="navManager" class="navbtn hidden">Manager</button>
  <button id="navAdmin" class="navbtn hidden">Admin</button>
</div>

<!-- MAIN -->
<div class="workspace">

<!-- ASSISTANT -->
<section id="assistantPanel" class="panel">
  <h2>Assistant</h2>
  <textarea id="input" class="area" placeholder="Type here..."></textarea>
  <button id="send" class="action">Send</button>
  <div id="messages"></div>
</section>

<!-- LIBRARY -->
<section id="libraryPanel" class="panel hidden">
  <h2>Library</h2>
  <div id="libraryList"></div>
</section>

<!-- MANAGER -->
<section id="managerPanel" class="panel hidden">
  <h2>Manager Dashboard</h2>

  <div class="card">
    <h3>Onboard Staff</h3>
    <input id="mgrFirst" class="field" placeholder="First name">
    <input id="mgrLast" class="field" placeholder="Last name">
    <input id="mgrEmail" class="field" placeholder="Email">
    <input id="mgrPass" class="field" placeholder="Password">
    <select id="mgrRole" class="sel">
      <option value="staff">staff</option>
      <option value="manager">manager</option>
    </select>
    <button id="createStaff" class="action">Create Staff</button>
  </div>

  <div class="card">
    <h3>Staff List</h3>
    <div id="mgrUsers"></div>
  </div>

  <div class="card">
    <h3>Home Documents</h3>
    <input id="mgrDocTitle" class="field" placeholder="Title">
    <textarea id="mgrDocText" class="area"></textarea>
    <button id="saveDoc" class="action">Save</button>
    <div id="mgrDocs"></div>
  </div>
</section>

<!-- ADMIN -->
<section id="adminPanel" class="panel hidden">
  <h2>Admin</h2>
  <div id="adminUsers"></div>
</section>

</div>
</div>

<script>

/* ========= STATE ========= */
let currentUser = null;

/* ========= API ========= */
async function api(url, options={}){
  const res = await fetch(url,{
    ...options,
    credentials:"include",
    headers:{ "Content-Type":"application/json", ...(options.headers||{}) }
  });
  if(res.status===401){location.href="/login";return}
  return res.json();
}

/* ========= NAV ========= */
function show(panel){
  ["assistant","library","manager","admin"].forEach(p=>{
    document.getElementById(p+"Panel").classList.add("hidden");
    document.getElementById("nav"+p.charAt(0).toUpperCase()+p.slice(1)).classList.remove("active");
  });
  document.getElementById(panel+"Panel").classList.remove("hidden");
  document.getElementById("nav"+panel.charAt(0).toUpperCase()+panel.slice(1)).classList.add("active");
}

navAssistant.onclick=()=>show("assistant");
navLibrary.onclick=()=>show("library");
navManager.onclick=()=>show("manager");
navAdmin.onclick=()=>show("admin");

/* ========= USER ========= */
async function loadUser(){
  const data = await api("/auth/me");
  currentUser = data.user;

  if(currentUser.role==="manager"){
    navManager.classList.remove("hidden");
  }
  if(currentUser.role==="admin"){
    navAdmin.classList.remove("hidden");
  }
}

/* ========= ASSISTANT ========= */
send.onclick=async()=>{
  const text = input.value.trim();
  if(!text) return;

  messages.innerHTML += `<div><b>You:</b> ${text}</div>`;

  const res = await api("/chat/",{
    method:"POST",
    body:JSON.stringify({message:text})
  });

  messages.innerHTML += `<div><b>AI:</b> ${res.reply}</div>`;
  input.value="";
};

/* ========= MANAGER ========= */

createStaff.onclick=async()=>{
  await api("/manager/users",{
    method:"POST",
    body:JSON.stringify({
      first_name:mgrFirst.value,
      last_name:mgrLast.value,
      email:mgrEmail.value,
      password:mgrPass.value,
      role:mgrRole.value
    })
  });
  loadManager();
};

saveDoc.onclick=async()=>{
  await api("/manager/documents",{
    method:"POST",
    body:JSON.stringify({
      title:mgrDocTitle.value,
      input_text:mgrDocText.value
    })
  });
  loadManager();
};

async function loadManager(){
  const data = await api("/manager/overview");

  mgrUsers.innerHTML="";
  (data.users||[]).forEach(u=>{
    mgrUsers.innerHTML+=`<div class="entity-row">${u.first_name} ${u.last_name}</div>`;
  });

  mgrDocs.innerHTML="";
  (data.documents||[]).forEach(d=>{
    mgrDocs.innerHTML+=`<div class="entity-row">${d.title}</div>`;
  });
}

/* ========= INIT ========= */
(async()=>{
  await loadUser();
  show("assistant");
})();

</script>
</body>
</html>
