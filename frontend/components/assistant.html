=<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiCare AI | Intelligence for Care</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- Premium Blue Design System --- */
        :root {
            --bg-app: #f4f7fb;
            --bg-sidebar: #ffffff;
            --bg-chat: #ffffff;
            --bg-input: #ffffff;
            --bg-msg-user: #e0e9f5;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --accent-color: #2563eb;
            --shadow-md: 0 4px 12px -2px rgb(0 0 0 / 0.05);
            --sidebar-width-full: 280px;
            --sidebar-width-mini: 68px;
        }

        body.theme-dark {
            --bg-app: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-chat: #0f172a;
            --bg-input: #0a0f1d;
            --bg-msg-user: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --accent-color: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-primary); height: 100dvh; overflow: hidden; -webkit-font-smoothing: antialiased; }
        button { background: none; border: none; cursor: pointer; color: inherit; outline: none; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        
        .ica-shell { display: flex; height: 100%; width: 100vw; position: relative; }

        /* --- SIDEBAR --- */
        .ica-sidebar {
            width: var(--sidebar-width-mini);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 40; overflow: hidden; position: relative;
        }
        .is-sidebar-open .ica-sidebar { width: var(--sidebar-width-full); }
        .ica-sidebar-header { height: 60px; display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
        .ica-sidebar-content { flex: 1; display: flex; flex-direction: column; width: var(--sidebar-width-full); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .is-sidebar-open .ica-sidebar-content { opacity: 1; pointer-events: auto; }

        .ica-nav-rail { position: absolute; top: 70px; left: 0; width: var(--sidebar-width-mini); display: flex; flex-direction: column; align-items: center; gap: 20px; transition: opacity 0.2s; }
        .is-sidebar-open .ica-nav-rail { opacity: 0; pointer-events: none; }
        .rail-icon { width: 44px; height: 44px; border-radius: 12px; color: var(--text-secondary); }
        .rail-icon:hover { background: var(--bg-hover); color: var(--accent-color); }
        .rail-icon.active { background: rgba(37, 99, 235, 0.1); color: var(--accent-color); }

        /* Sidebar Groups */
        .sidebar-group-label { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; padding: 16px 12px 8px; letter-spacing: 0.05em; }
        .ica-sidebar-list { flex: 1; overflow-y: auto; padding: 0 8px; }
        .ica-history-item { 
            padding: 10px 12px; border-radius: 10px; cursor: pointer; margin-bottom: 2px; 
            display: flex; align-items: center; justify-content: space-between; transition: 0.2s;
        }
        .ica-history-item:hover { background: var(--bg-app); }
        .ica-history-item.is-active { background: var(--bg-app); border: 1px solid var(--border-color); }
        .ica-history-item.is-pinned { border-left: 3px solid var(--accent-color); background: rgba(37, 99, 235, 0.03); }

        .ica-history-item-title { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .ica-history-actions { display: none; gap: 4px; padding-left: 8px; }
        .ica-history-item:hover .ica-history-actions { display: flex; }
        .action-btn { color: var(--text-muted); width: 24px; height: 24px; border-radius: 4px; font-size: 12px; }
        .action-btn:hover { color: var(--text-primary); background: var(--border-color); }

        /* --- MAIN AREA --- */
        .ica-main { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); min-width: 0; }
        .ica-header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--border-color); }
        
        /* Privacy Blur Logic */
        .privacy-active .ica-message-block { filter: blur(8px); transition: 0.3s; }
        .privacy-active .ica-message-block:hover { filter: blur(0); }

        .ica-chat-scroll { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }
        .ica-messages-container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 32px; padding-bottom: 40px; }

        .ica-message-wrapper { display: flex; gap: 16px; width: 100%; }
        .ica-message-wrapper.is-user { flex-direction: row-reverse; }
        .ica-message-avatar { width: 32px; height: 32px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; background: var(--border-color); flex-shrink: 0; }
        .is-assistant .ica-message-avatar { background: var(--accent-color); color: white; }
        
        .ica-message-block { display: flex; flex-direction: column; gap: 8px; max-width: 85%; }
        .ica-message { font-size: 0.95rem; line-height: 1.7; color: var(--text-primary); }
        .is-user .ica-message { background: var(--bg-msg-user); padding: 12px 18px; border-radius: 18px 18px 4px 18px; color: #0f172a; }

        /* Assistant Message Features */
        .assistant-actions { display: flex; gap: 12px; margin-top: 4px; opacity: 0; transition: 0.2s; }
        .ica-message-wrapper:hover .assistant-actions { opacity: 1; }

        /* Markdown Rendering Fixes */
        .ica-message h3 { font-size: 1.1rem; margin: 16px 0 8px; color: var(--accent-color); font-weight: 600; }
        .ica-message ul { margin: 8px 0 16px 20px; list-style-type: disc; }
        .ica-message li { margin-bottom: 6px; }
        .ica-message strong { font-weight: 600; }

        .is-typing::after { content: '▊'; color: var(--accent-color); animation: blink 1s infinite; margin-left: 2px; }

        /* --- INPUT --- */
        .ica-input-container { padding: 0 24px 12px; max-width: 800px; margin: 0 auto; width: 100%; flex-shrink: 0; }
        .ica-input-box { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 24px; padding: 10px 16px; box-shadow: var(--shadow-md); display: flex; flex-direction: column; }
        .ica-input-row { display: flex; align-items: flex-end; gap: 12px; }
        .ica-textarea { flex: 1; max-height: 150px; padding: 8px 0; color: var(--text-primary); border: none; outline: none; }
        .ica-send-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-color); color: white; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        @media (max-width: 768px) {
            .ica-sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 0; transform: translateX(-100%); }
            .is-sidebar-open .ica-sidebar { width: 280px; transform: translateX(0); }
            .ica-nav-rail { display: none; }
        }
    </style>
</head>
<body class="theme-light">

    <div id="statusBanner" class="ica-status-banner"></div>

    <div id="assistantShell" class="ica-shell">
        <aside class="ica-sidebar">
            <div class="ica-sidebar-header">
                <button id="sidebarToggle"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                <span style="font-weight: 600; color: var(--accent-color);">IndiCare</span>
            </div>

            <div class="ica-nav-rail">
                <div class="rail-icon active"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></div>
                <div class="rail-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line></svg></div>
            </div>

            <div class="ica-sidebar-content">
                <button id="newConversationBtn" class="ica-btn-primary" style="margin-top:10px;">+ New Session</button>
                <div id="sidebarList" class="ica-sidebar-list">
                    <div class="sidebar-group-label">Pinned</div>
                    <div id="pinnedList"></div>
                    <div class="sidebar-group-label">Recent History</div>
                    <div id="recentList"></div>
                </div>
                <div class="ica-sidebar-footer">
                    <button id="logoutBtn" style="font-size: 0.8rem; color: var(--text-secondary);">Sign out</button>
                </div>
            </div>
        </aside>

        <main class="ica-main">
            <header class="ica-header">
                <h2 id="conversationHeading" style="font-size: 0.9rem; font-weight: 500; color: var(--text-secondary);">Assisting Residential Care</h2>
                <div style="display:flex; gap:12px;">
                    <button id="privacyBtn" title="Privacy Blur"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
                    <button id="themeToggle"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
                </div>
            </header>

            <div id="chat" class="ica-chat-scroll">
                <div id="chatEmpty" style="text-align: center; margin-top: 20vh;">
                    <h1 style="font-size: 2.4rem; letter-spacing: -0.04em; margin-bottom: 10px;">IndiCare OS.</h1>
                    <p style="color: var(--text-secondary);">Select a pinned case or start a new clinical log.</p>
                </div>
                <div id="messages" class="ica-messages-container" hidden></div>
                <div id="typingRow" class="ica-message-wrapper is-assistant" hidden style="margin-top: 20px;">
                    <div class="ica-message-avatar">IC</div>
                    <div style="padding:12px;"><span class="is-typing">Thinking</span></div>
                </div>
            </div>

            <div class="ica-input-container">
                <div class="ica-input-box">
                    <div class="ica-input-row">
                        <textarea id="chat-input" class="ica-textarea" placeholder="Start typing Shift+Enter for new line..." rows="1"></textarea>
                        <button id="send-btn" class="ica-send-btn"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="transform: rotate(45deg);"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- CORE STATE ---
        window.conversationId = null;
        let typewriterQueue = "";
        let isTypewriterActive = false;

        // --- BACKEND BRIDGE ---
        async function apiRequest(url, options = {}) {
            const token = localStorage.getItem("access_token");
            const res = await fetch(url, { ...options, headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` } });
            if (res.status === 401) { window.location.href = "/login"; return; }
            return res.json();
        }

        // --- BRAIN: SSE PARSER WITH WORD BUFFERING ---
        async function streamAssistantResponse(url, bodyData) {
            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${localStorage.getItem("access_token")}` },
                    body: JSON.stringify(bodyData)
                });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                createOrResetStreamingMessage();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const payload = line.slice(5).trim();
                            if (payload === '[DONE]') continue;
                            // Critical Fix: Add a space between data chunks to prevent joined-up words
                            typewriterQueue += payload + " "; 
                            startTypewriter();
                        }
                    }
                }
            } catch (err) { console.error(err); }
        }

        function startTypewriter() {
            if (isTypewriterActive) return;
            isTypewriterActive = true;
            const el = document.querySelector('#streaming-msg .ica-message');
            el.classList.add('is-typing');
            let currentText = el.getAttribute('data-raw') || "";

            const interval = setInterval(() => {
                if (typewriterQueue.length > 0) {
                    currentText += typewriterQueue.charAt(0);
                    typewriterQueue = typewriterQueue.slice(1);
                    el.innerHTML = renderMarkdown(currentText);
                    el.setAttribute('data-raw', currentText);
                    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                } else {
                    clearInterval(interval);
                    isTypewriterActive = false;
                    el.classList.remove('is-typing');
                }
            }, 12);
        }

        function renderMarkdown(text) {
            return text
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^\- (.*$)/gim, '<li>$1</li>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>')
                .replace(/(<li>.*<\/li>)/gim, '<ul>$1</ul>')
                .replace(/<\/ul><ul>/gim, '');
        }

        // --- CONVERSATION MGMT ---
        async function loadConversations() {
            const rows = await apiRequest("/chat/conversations") || [];
            const pinnedList = document.getElementById('pinnedList');
            const recentList = document.getElementById('recentList');
            const pins = JSON.parse(localStorage.getItem("indicare-pinned") || "[]");
            
            const pinnedRows = rows.filter(r => pins.includes(String(r.id)));
            const recentRows = rows.filter(r => !pins.includes(String(r.id)));

            const renderItem = (r) => `
                <div class="ica-history-item ${window.conversationId == r.id ? 'is-active' : ''} ${pins.includes(String(r.id)) ? 'is-pinned' : ''}">
                    <div class="ica-history-item-title" onclick="openConversation('${r.id}')">${r.title || "Observation"}</div>
                    <div class="ica-history-actions">
                        <button class="action-btn" title="Pin" onclick="togglePin('${r.id}')">📌</button>
                        <button class="action-btn" title="Delete" onclick="deleteConv('${r.id}')">✕</button>
                    </div>
                </div>`;

            pinnedList.innerHTML = pinnedRows.map(renderItem).join('') || '<div style="font-size:0.7rem; color:var(--text-muted); padding:10px;">No pinned items</div>';
            recentList.innerHTML = recentRows.map(renderItem).join('');
        }

        window.togglePin = (id) => {
            let pins = JSON.parse(localStorage.getItem("indicare-pinned") || "[]");
            pins = pins.includes(String(id)) ? pins.filter(p => p !== String(id)) : [...pins, String(id)];
            localStorage.setItem("indicare-pinned", JSON.stringify(pins));
            loadConversations();
        };

        window.deleteConv = async (id) => {
            if (!confirm("Delete?")) return;
            await apiRequest(`/chat/conversations/${id}`, { method: "DELETE" });
            loadConversations();
        };

        // --- UI HANDLERS ---
        function initChat() {
            const shell = document.getElementById('assistantShell');
            document.getElementById('sidebarToggle').onclick = () => shell.classList.toggle('is-sidebar-open');
            document.getElementById('themeToggle').onclick = () => {
                const t = document.body.classList.contains('theme-light') ? 'dark' : 'light';
                document.body.className = 'theme-' + t;
                localStorage.setItem("indicare-theme", t);
            };
            document.getElementById('privacyBtn').onclick = () => shell.classList.toggle('privacy-active');
            document.getElementById('send-btn').onclick = sendMessage;
            document.getElementById('newConversationBtn').onclick = () => window.location.reload();
            
            document.body.className = 'theme-' + (localStorage.getItem("indicare-theme") || 'light');
            loadConversations();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            document.getElementById('chatEmpty').hidden = true;
            document.getElementById('messages').hidden = false;
            appendMessage('user', text);
            input.value = '';
            await streamAssistantResponse("/chat/", { message: text, conversation_id: window.conversationId });
            loadConversations();
        }

        function appendMessage(role, text) {
            const wrapper = document.createElement("div");
            wrapper.className = `ica-message-wrapper is-${role}`;
            const avatar = role === 'assistant' ? 'IC' : 'Y';
            const actions = role === 'assistant' ? `<div class="assistant-actions"><button class="action-btn" onclick="copyText(this)">Copy</button></div>` : '';
            
            wrapper.innerHTML = `
                <div class="ica-message-avatar">${avatar}</div>
                <div class="ica-message-block">
                    <div class="ica-message">${role === 'user' ? escapeHtml(text) : renderMarkdown(text)}</div>
                    ${actions}
                </div>`;
            document.getElementById('messages').appendChild(wrapper);
        }

        function createOrResetStreamingMessage() {
            const old = document.getElementById('streaming-msg');
            if (old) old.remove();
            const wrapper = document.createElement("div");
            wrapper.id = 'streaming-msg';
            wrapper.className = 'ica-message-wrapper is-assistant';
            wrapper.innerHTML = `<div class="ica-message-avatar">IC</div><div class="ica-message-block"><div class="ica-message" data-raw=""></div><div class="assistant-actions"><button class="action-btn">Copy</button></div></div>`;
            document.getElementById('messages').appendChild(wrapper);
        }

        async function openConversation(id) {
            const data = await apiRequest(`/chat/conversations/${id}`);
            window.conversationId = id;
            document.getElementById('messages').innerHTML = '';
            document.getElementById('chatEmpty').hidden = true;
            document.getElementById('messages').hidden = false;
            data.messages.forEach(m => appendMessage(m.role, m.message));
        }

        window.copyText = (btn) => {
            const txt = btn.closest('.ica-message-block').querySelector('.ica-message').innerText;
            navigator.clipboard.writeText(txt);
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy", 2000);
        }

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        document.addEventListener("DOMContentLoaded", initChat);
    </script>
</body>
</html>
