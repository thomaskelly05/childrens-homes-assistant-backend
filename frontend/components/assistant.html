<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IndiCare OS | Command Centre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- Million Pound Blue Palette --- */
        :root {
            --bg-app: #f4f7fb; --bg-sidebar: #ffffff; --bg-chat: #ffffff; --bg-input: #ffffff;
            --bg-msg-user: #e0e9f5; --text-primary: #1e293b; --text-secondary: #64748b;
            --text-muted: #94a3b8; --border-color: #e2e8f0; --accent-color: #2563eb;
            --shadow-lg: 0 10px 25px -3px rgb(0 0 0 / 0.08); --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --sidebar-width-full: 280px; --sidebar-width-mini: 68px;
        }
        body.theme-dark {
            --bg-app: #0f172a; --bg-sidebar: #1e293b; --bg-chat: #0f172a;
            --bg-input: #0a0f1d; --bg-msg-user: #1e293b; --text-primary: #f1f5f9;
            --text-secondary: #94a3b8; --border-color: #334155; --accent-color: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-primary); height: 100dvh; overflow: hidden; -webkit-font-smoothing: antialiased; }
        button { background: none; border: none; cursor: pointer; color: inherit; outline: none; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        
        .ica-shell { display: flex; height: 100%; width: 100vw; position: relative; }

        /* --- SIDEBAR RAIL --- */
        .ica-sidebar { width: var(--sidebar-width-mini); background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 45; overflow: hidden; }
        .is-sidebar-open .ica-sidebar { width: var(--sidebar-width-full); }
        .ica-sidebar-header { height: 60px; display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
        
        .ica-sidebar-content { flex: 1; display: flex; flex-direction: column; width: var(--sidebar-width-full); opacity: 0; transition: opacity 0.2s; pointer-events: none; padding: 0 12px; }
        .is-sidebar-open .ica-sidebar-content { opacity: 1; pointer-events: auto; }

        /* Nav Buttons inside sidebar (Mobile/Desktop friendly) */
        .ica-nav-menu { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
        .nav-btn { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; font-weight: 500; color: var(--text-secondary); width: 100%; justify-content: flex-start; }
        .nav-btn:hover { background: rgba(37, 99, 235, 0.05); color: var(--accent-color); }
        .nav-btn.active { background: rgba(37, 99, 235, 0.1); color: var(--accent-color); }

        .ica-btn-primary { background: var(--accent-color); color: white; padding: 12px; border-radius: 8px; font-weight: 600; width: 100%; margin-top: 10px; }
        .ica-sidebar-list { flex: 1; overflow-y: auto; margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
        .ica-history-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; color: var(--text-secondary); font-size: 0.9rem; }
        .ica-history-item:hover { background: rgba(0,0,0,0.05); }
        
        /* Mobile Overlay */
        .ica-sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; opacity: 0; transition: opacity 0.3s; }

        /* --- WORKSPACE CONTAINERS --- */
        .workspace { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); min-width: 0; position: relative; }
        .hidden-workspace { display: none !important; }

        .ica-header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .ica-chat-scroll { flex: 1; overflow-y: auto; padding: 24px 16px; scroll-behavior: smooth; }
        .ica-messages-container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

        /* --- MESSAGE BUBBLES --- */
        .ica-message-wrapper { display: flex; gap: 12px; width: 100%; }
        .ica-message-wrapper.is-user { flex-direction: row-reverse; }
        .ica-message-avatar { width: 32px; height: 32px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; background: var(--border-color); flex-shrink: 0; }
        .is-assistant .ica-message-avatar { background: var(--accent-color); color: white; }
        
        .ica-message-block { display: flex; flex-direction: column; gap: 4px; max-width: 85%; }
        .ica-message { font-size: 0.95rem; line-height: 1.6; color: var(--text-primary); overflow-wrap: break-word; }
        .is-user .ica-message { background: var(--bg-msg-user); padding: 12px 16px; border-radius: 18px 18px 4px 18px; color: #0f172a; }

        /* --- ACTION BAR --- */
        .ica-action-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; opacity: 0; transition: 0.3s; }
        .ica-message-wrapper:hover .ica-action-bar { opacity: 1; }
        .magic-chip { padding: 8px 14px; background: var(--bg-app); border: 1px solid var(--border-color); border-radius: 20px; font-size: 0.75rem; font-weight: 600; color: var(--accent-color); }
        .magic-chip:hover { background: var(--accent-color); color: white; }

        /* Privacy Mode */
        .privacy-active .ica-message { filter: blur(12px); transition: 0.3s; }
        .privacy-active .ica-message:hover { filter: blur(0); }

        /* Markdown Styles */
        .ica-message h3 { font-size: 1.15rem; margin: 18px 0 8px; color: var(--accent-color); font-weight: 600; display: block; }
        .ica-message ul { margin: 8px 0 16px 20px; list-style: disc; }
        .is-typing::after { content: '▊'; color: var(--accent-color); animation: blink 1s infinite; margin-left: 2px; }

        /* --- INPUT AREA --- */
        .ica-input-container { padding: 12px 16px; max-width: 800px; margin: 0 auto; width: 100%; flex-shrink: 0; }
        .ica-input-box { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 24px; padding: 8px 12px; box-shadow: var(--shadow-md); display: flex; flex-direction: column; }
        .ica-input-row { display: flex; align-items: flex-end; gap: 8px; }
        .ica-textarea { flex: 1; max-height: 120px; padding: 8px 4px; color: var(--text-primary); border: none; outline: none; background: transparent; font-size: 1rem; resize: none; }
        .ica-send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-color); color: white; transition: 0.3s; flex-shrink: 0; }
        .ica-send-btn:disabled { opacity: 0.3; }

        /* --- VERIFICATION PANEL --- */
        .ica-verify-panel { position: fixed; right: -100%; top: 0; bottom: 0; width: 380px; max-width: 100vw; background: var(--bg-sidebar); border-left: 1px solid var(--border-color); z-index: 50; transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; box-shadow: var(--shadow-lg); }
        .ica-verify-panel.is-open { right: 0; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* =========================================
           MOBILE RESPONSIVE OVERRIDES
           ========================================= */
        @media (max-width: 768px) {
            .ica-sidebar {
                position: absolute;
                top: 0; left: 0; bottom: 0;
                transform: translateX(-100%);
                width: 80vw !important;
                max-width: 300px;
                border-right: none;
                box-shadow: var(--shadow-lg);
            }
            .is-sidebar-open .ica-sidebar {
                transform: translateX(0);
            }
            .is-sidebar-open .ica-sidebar-overlay {
                display: block;
                opacity: 1;
            }
            .ica-header {
                padding: 0 12px;
            }
            .ica-action-bar {
                opacity: 1; /* Always show chips on mobile (no hover on touch) */
            }
            .ica-message-block {
                max-width: 90%;
            }
            .magic-chip {
                padding: 6px 10px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body class="theme-light">

    <div id="statusBanner" class="ica-status-banner"></div>
    
    <div id="verifyPanel" class="ica-verify-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <span style="font-weight:600;">Regulation Check</span>
            <button onclick="toggleVerify()" style="padding:8px;">✕</button>
        </div>
        <div id="verifyContent" style="font-size:0.85rem; line-height:1.6; color:var(--text-secondary);">
            AI is checking Ofsted Quality Standards... 
        </div>
    </div>

    <div id="assistantShell" class="ica-shell">
        <div id="sidebarOverlay" class="ica-sidebar-overlay"></div>

        <aside class="ica-sidebar">
            <div class="ica-sidebar-header">
                <button id="sidebarToggle" style="padding:8px;"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                <span style="font-weight: 600; color: var(--accent-color);">IndiCare Command</span>
            </div>

            <div class="ica-sidebar-content">
                <button id="newConversationBtn" class="ica-btn-primary">+ New Log</button>
                
                <div class="ica-nav-menu">
                    <button class="nav-btn active" onclick="switchWorkspace('assistant')" title="Assistant OS">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        Assistant OS
                    </button>
                    <button class="nav-btn" onclick="switchWorkspace('inotes')" title="I-Notes Factory">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line></svg>
                        I-Notes Factory
                    </button>
                </div>

                <div id="recentList" class="ica-sidebar-list"></div>
                
                <div class="ica-sidebar-footer" style="margin-top:auto; padding:16px 0;">
                    <button id="logoutBtn" style="font-size:0.85rem; color:var(--text-secondary); width:100%;">Sign out</button>
                </div>
            </div>
        </aside>

        <main id="assistantWorkspace" class="workspace">
            <header class="ica-header">
                <button id="mobileMenuBtn" class="ica-mobile-menu" style="display:none; padding:8px;"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                
                <h2 id="conversationHeading" style="font-size:0.95rem; font-weight:600;">Intelligence for Care</h2>
                
                <div style="display:flex; gap:8px;">
                    <button id="verifyBtn" onclick="toggleVerify()" style="padding:8px;"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg></button>
                    <button id="privacyBtn" style="padding:8px;"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
                    <button id="themeToggle" style="padding:8px;"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
                </div>
            </header>

            <div id="chat" class="ica-chat-scroll">
                <div id="chatEmpty" style="text-align:center; margin-top:15vh;">
                    <h1 style="font-size:2.2rem; letter-spacing:-0.04em;">Ready.</h1>
                    <p style="color:var(--text-secondary); margin-top: 8px;">Ofsted-Aligned OS Assistant.</p>
                </div>
                <div id="messages" class="ica-messages-container" hidden></div>
            </div>

            <div class="ica-input-container">
                <div id="documentChip" class="ica-doc-chip ica-hidden">
                    <span id="documentChipText"></span>
                    <button id="clearDocumentBtn">×</button>
                </div>
                <div class="ica-input-box">
                    <div class="ica-input-row">
                        <label for="documentUpload" style="cursor:pointer; color:var(--text-muted); padding:8px;"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg><input type="file" id="documentUpload" hidden></label>
                        <textarea id="chat-input" class="ica-textarea" placeholder="Describe situation..." rows="1"></textarea>
                        <button id="send-btn" class="ica-send-btn"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="transform:rotate(45deg); margin-right: 2px;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    </div>
                </div>
            </div>
        </main>

        <main id="inotesWorkspace" class="workspace hidden-workspace">
             <header class="ica-header"><h2>I-Notes Documentation Factory</h2></header>
             <div style="padding:40px; text-align:center;">
                <p>Engine 2 Active. Transcription and meeting processing connected to backend.</p>
             </div>
        </main>
    </div>

    <script>
        // --- 1. CONFIG & STATE ---
        window.conversationId = null;
        window.currentDocumentText = null;
        let typewriterQueue = [];
        let isTypewriterActive = false;
        const REG_PROMPT = " [SYSTEM: Verify response against Ofsted SCCIF and Quality Standards for Children's Homes]";

        // --- 2. BACKEND BRIDGE ---
        async function apiRequest(url, options = {}) {
            const token = localStorage.getItem("access_token");
            const res = await fetch(url, { ...options, headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` } });
            if (res.status === 401) { window.location.href = "/login"; return; }
            return res.json();
        }

        async function streamAssistantResponse(url, bodyData) {
            try {
                bodyData.message += REG_PROMPT; 

                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${localStorage.getItem("access_token")}` },
                    body: JSON.stringify(bodyData)
                });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                createOrResetStreamingMessage();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const payload = line.slice(5).trim();
                            if (payload === '[DONE]') continue;
                            payload.split('').forEach(char => typewriterQueue.push(char));
                            startTypewriter();
                        }
                    }
                }
            } catch (err) { console.error(err); }
        }

        // --- 3. TYPEWRITER & MARKDOWN ENGINE ---
        function startTypewriter() {
            if (isTypewriterActive) return;
            isTypewriterActive = true;
            const el = document.querySelector('#streaming-msg .ica-message');
            let rawBuffer = el.getAttribute('data-raw') || "";

            const interval = setInterval(() => {
                if (typewriterQueue.length > 0) {
                    rawBuffer += typewriterQueue.shift();
                    el.innerHTML = renderMarkdown(rawBuffer);
                    el.setAttribute('data-raw', rawBuffer);
                    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                } else if (!window.isStreaming) {
                    clearInterval(interval);
                    isTypewriterActive = false;
                    addActionButtons(el.closest('.ica-message-block'));
                }
            }, 8);
        }

        function renderMarkdown(text) {
            if (!text) return "";
            return text
                .replace(/(?:^|\n)### (.*)/g, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/(?:^|\n)\- (.*)/g, '<li>$1</li>')
                .replace(/\n/g, '<br>')
                .replace(/(<li>.*<\/li>)/g, '<ul>$1</ul>')
                .replace(/<\/ul><ul>/g, ''); 
        }

        // --- 4. ACTION COMMANDS & PDF ---
        function addActionButtons(container) {
            if (container.querySelector('.ica-action-bar')) return;
            const bar = document.createElement('div');
            bar.className = 'ica-action-bar';
            bar.innerHTML = `
                <button class="magic-chip" onclick="quickPrompt('Ofsted')">✨ Format for Ofsted</button>
                <button class="magic-chip" onclick="quickPrompt('Risk')">⚠️ Draft Risk Assess</button>
                <button class="magic-chip" style="color:var(--text-muted);" onclick="exportPDF(this)">📥 Download Record</button>
            `;
            container.appendChild(bar);
        }

        window.quickPrompt = (type) => {
            const input = document.getElementById('chat-input');
            input.value = type === 'Ofsted' ? "Rewrite the above clinical documentation so it perfectly aligns with Ofsted Quality Standards." : "Generate a formal risk assessment based on this situation.";
            sendMessage();
        };

        window.exportPDF = (btn) => {
            const text = btn.closest('.ica-message-block').querySelector('.ica-message').innerText;
            const win = window.open('', '_blank');
            win.document.write(`<html><body style="font-family:sans-serif; padding:50px; line-height:1.6;">
                <h1 style="color:#2563eb">IndiCare OS | Secure Record</h1><hr>
                <p><strong>Generated:</strong> ${new Date().toLocaleString()}</p>
                <div style="font-size:1.1rem; padding:20px 0;">${text}</div><hr>
                <p style="font-size:0.7rem; color:gray;">This document was securely generated via IndiCare AI Command OS.</p>
            </body></html>`);
            win.print();
        };

        // --- 5. WORKSPACE SWITCHER ---
        window.switchWorkspace = (name) => {
            document.getElementById('assistantWorkspace').classList.toggle('hidden-workspace', name !== 'assistant');
            document.getElementById('inotesWorkspace').classList.toggle('hidden-workspace', name !== 'inotes');
            document.querySelectorAll('.nav-btn').forEach((icon, idx) => {
                icon.classList.toggle('active', (name === 'assistant' && idx === 0) || (name === 'inotes' && idx === 1));
            });
            // Auto close menu on mobile after selection
            if(window.innerWidth <= 768) {
                document.getElementById('assistantShell').classList.remove('is-sidebar-open');
            }
        };

        function toggleVerify() { document.getElementById('verifyPanel').classList.toggle('is-open'); }

        // --- 6. CORE INIT ---
        function initChat() {
            const shell = document.getElementById('assistantShell');
            
            // Sidebar toggles
            document.getElementById('sidebarToggle').onclick = () => shell.classList.toggle('is-sidebar-open');
            
            // Mobile overlay tap-to-close
            document.getElementById('sidebarOverlay').onclick = () => shell.classList.remove('is-sidebar-open');

            document.getElementById('privacyBtn').onclick = () => shell.classList.toggle('privacy-active');
            document.getElementById('send-btn').onclick = sendMessage;
            document.getElementById('newConversationBtn').onclick = () => window.location.reload();
            
            // Allow Enter to submit, Shift+Enter for new line
            document.getElementById('chat-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            loadConversations();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            window.isStreaming = true;
            document.getElementById('chatEmpty').hidden = true;
            document.getElementById('messages').hidden = false;
            appendMessage('user', text);
            input.value = '';
            await streamAssistantResponse("/chat/", { message: text, conversation_id: window.conversationId, document_text: window.currentDocumentText });
            window.isStreaming = false;
            loadConversations();
        }

        function appendMessage(role, text) {
            const wrapper = document.createElement("div");
            wrapper.className = `ica-message-wrapper is-${role}`;
            const block = document.createElement("div");
            block.className = 'ica-message-block';
            block.innerHTML = `<div class="ica-message">${role==='user'?text:renderMarkdown(text)}</div>`;
            wrapper.innerHTML = `<div class="ica-message-avatar">${role==='assistant'?'IC':'Y'}</div>`;
            wrapper.appendChild(block);
            document.getElementById('messages').appendChild(wrapper);
            if (role === 'assistant') addActionButtons(block);
            
            // Auto-scroll on new message
            const chat = document.getElementById('chat');
            chat.scrollTop = chat.scrollHeight;
        }

        function createOrResetStreamingMessage() {
            const old = document.getElementById('streaming-msg');
            if (old) old.remove();
            const wrapper = document.createElement("div");
            wrapper.id = 'streaming-msg';
            wrapper.className = 'ica-message-wrapper is-assistant';
            wrapper.innerHTML = `<div class="ica-message-avatar">IC</div><div class="ica-message-block"><div class="ica-message" data-raw=""></div></div>`;
            document.getElementById('messages').appendChild(wrapper);
        }

        async function loadConversations() {
            try {
                const rows = await apiRequest("/chat/conversations") || [];
                document.getElementById('recentList').innerHTML = rows.map(r => `
                    <div class="ica-history-item" onclick="openConversation('${r.id}')">
                        <div class="ica-history-item-title">${r.title || "Observation"}</div>
                    </div>`).join('');
            } catch (e) {
                // Fails gracefully if no endpoint exists locally
                console.log("No backend detected for conversation history.");
            }
        }

        async function openConversation(id) {
            const data = await apiRequest(`/chat/conversations/${id}`);
            window.conversationId = id;
            document.getElementById('messages').innerHTML = '';
            document.getElementById('chatEmpty').hidden = true;
            document.getElementById('messages').hidden = false;
            data.messages.forEach(m => appendMessage(m.role, m.message));
            
            if(window.innerWidth <= 768) {
                document.getElementById('assistantShell').classList.remove('is-sidebar-open');
            }
        }

        document.addEventListener("DOMContentLoaded", initChat);
    </script>
</body>
</html>
