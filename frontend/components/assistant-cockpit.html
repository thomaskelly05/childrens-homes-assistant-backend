<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IndiCare AI</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="stylesheet" href="/css/assistant-design-system.css" />
  <link rel="stylesheet" href="/css/assistant-cockpit.css" />
  <link rel="stylesheet" href="/css/assistant-professional-renderer.css" />
  <link rel="stylesheet" href="/css/indicare-suite.css" />
  <link rel="stylesheet" href="/css/indicare-clean-assistant.css" />
</head>
<body>
  <div class="ic-cockpit ic-standalone-assistant" id="icCockpit" data-assistant-surface="standalone">
    <aside class="ic-sidebar" aria-label="IndiCare AI navigation">
      <div class="ic-brand">
        <div class="ic-logo">AI</div>
        <div>
          <div class="ic-brand-title">IndiCare AI</div>
          <div class="ic-brand-sub">Residential care assistant</div>
        </div>
      </div>

      <div class="ic-suite-switcher" aria-label="IndiCare AI workspaces">
        <button class="active" type="button" data-suite-view="intelligence">Assistant</button>
        <button type="button" data-suite-view="provider">Provider Overview</button>
        <button type="button" data-suite-view="notes">Notes</button>
        <button type="button" data-suite-view="docs">DOCS</button>
        <button type="button" data-suite-view="workflows">Workflows</button>
        <button type="button" data-suite-view="alerts">Alerts</button>
      </div>

      <div class="ic-sidebar-actions">
        <button id="newChat" class="ic-btn-primary" type="button">＋ New chat</button>
      </div>

      <div class="ic-sidebar-footer">
        <button id="openSettings" class="ic-settings-trigger" type="button">
          <span id="icUserAvatarSidebar" class="ic-sidebar-avatar">AI</span>
          <span>
            <strong id="icUserNameSidebar">Tom</strong>
            <small id="icUserRoleSidebar">Professional plan</small>
          </span>
        </button>
      </div>
    </aside>

    <main class="ic-main">
      <header class="ic-top">
        <div></div>

        <div class="ic-top-actions">
          <button id="icNotificationTrigger" class="ic-btn-secondary" type="button">Notifications</button>

          <div class="ic-user">
            <div id="icUserAvatar" class="ic-avatar">T</div>
            <div>
              <strong id="icUserName">Tom</strong>
            </div>
          </div>
        </div>
      </header>

      <section id="assistantPanel" class="ic-content panel panel-assistant">
        <div id="empty" class="ic-empty-state" data-suite-panel="intelligence">
          <div class="ic-empty-mark">AI</div>
          <h2>Good afternoon, Tom</h2>
          <p id="workspaceDescription">How can I help with your residential care work today?</p>

          <div class="ic-quick-starts">
            <button type="button" data-command="Create a professional incident record with chronology.">
              <strong>Write an incident record</strong>
              <span>Create a professional incident record with chronology.</span>
            </button>

            <button type="button" data-command="Improve this recording using professional and trauma-informed language.">
              <strong>Improve a recording</strong>
              <span>Strengthen language, analysis and safeguarding.</span>
            </button>

            <button type="button" data-command="Extract a chronology from these notes or documents.">
              <strong>Extract chronology</strong>
              <span>Build a clear chronology from notes or documents.</span>
            </button>

            <button type="button" data-command="Review safeguarding concerns and highlight key actions.">
              <strong>Review safeguarding</strong>
              <span>Analyse concerns and highlight key actions.</span>
            </button>

            <button type="button" data-command="Review inspection readiness and identify evidence gaps.">
              <strong>Inspection readiness</strong>
              <span>Check readiness and identify evidence gaps.</span>
            </button>
          </div>
        </div>

        <div id="messages" class="messages hidden" data-suite-panel="intelligence"></div>
      </section>

      <div class="ic-composer-dock" id="composerDock" data-suite-panel="intelligence">
        <div id="dropHint" class="ic-drop-hint hidden">Drop documents here to analyse them</div>
        <div id="doc" class="doc-pill"><span id="docText"></span><button id="clearDoc" type="button" aria-label="Remove attached document">×</button></div>

        <div id="suggestionChips" class="ic-suggestion-chips" aria-label="Quick assistant actions">
          <button type="button" data-command="/ofsted">/ofsted</button>
          <button type="button" data-command="/safeguarding">/safeguarding</button>
          <button type="button" data-command="/recording">/recording</button>
          <button type="button" data-command="/reg45">/reg45</button>
          <button type="button" data-command="/chronology">/chronology</button>
        </div>

        <div class="ic-composer">
          <div class="ic-input-row">
            <label class="ic-upload-label" for="upload" title="Attach document">＋</label>
            <input id="upload" type="file" accept=".pdf,.docx,.txt,.md,.csv,.json,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain,text/markdown,text/csv,application/json" hidden />
            <textarea id="input" placeholder="Message IndiCare AI..." rows="1"></textarea>
            <button id="send" class="ic-btn-primary" type="button" aria-label="Send message">↑</button>
          </div>
        </div>
      </div>
    </main>

    <aside class="ic-evidence" aria-label="Project memory and sources">
      <div class="ic-evidence-header">
        <h2>Project memory</h2>
        <button id="toggleEvidence" class="ic-btn-secondary" type="button">Hide</button>
      </div>

      <div class="ic-evidence-list" id="standaloneSourceList"></div>
    </aside>
  </div>

  <div id="settingsModal" class="ic-modal hidden" aria-hidden="true">
    <div class="ic-modal-card ic-card">
      <div class="ic-modal-header">
        <h3>IndiCare AI settings</h3>
        <button id="closeSettings" type="button">×</button>
      </div>

      <div class="ic-settings-grid">
        <label><span>Name</span><input id="settingsName" type="text" placeholder="Your name" /></label>
        <label><span>Role</span><input id="settingsRole" type="text" placeholder="Registered manager" /></label>
      </div>

      <div class="ic-modal-actions">
        <button id="saveSettings" class="ic-btn-primary" type="button">Save settings</button>
      </div>
    </div>
  </div>

  <script src="/js/assistant-standalone-cockpit.js"></script>
  <script src="/js/assistant-professional-renderer.js"></script>
  <script src="/js/assistant-workspaces.js"></script>
  <script src="/js/assistant-templates.js"></script>
  <script src="/js/assistant-project-store.js"></script>
  <script src="/js/assistant-document-engine.js"></script>
  <script src="/js/assistant-operational-engines.js"></script>
  <script src="/js/indicare-suite.js"></script>
  <script src="/js/indicare-tier-access.js"></script>
  <script src="/js/indicare-workflow-intelligence.js"></script>
  <script src="/js/indicare-operational-search.js"></script>
  <script src="/js/indicare-proactive-suggestions.js"></script>
  <script src="/js/indicare-mobile-shift-mode.js"></script>
  <script src="/js/indicare-command-onboarding.js"></script>
  <script src="/js/indicare-response-intelligence.js"></script>
  <script src="/js/indicare-export-polish.js"></script>
  <script src="/js/indicare-governance-layer.js"></script>
  <script src="/js/indicare-streaming-experience.js"></script>
  <script src="/js/indicare-live-transcription.js"></script>
  <script src="/js/indicare-notification-centre.js"></script>
  <script src="/js/indicare-workflow-orchestrator.js"></script>
  <script src="/js/indicare-provider-overview.js"></script>
</body>
</html>
