<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IndiCare OS | Children’s Homes Operating System</title>
  <link rel="stylesheet" href="/css/indicare-os-design-system.css" />
  <style>
    html, body { min-height: 100%; }
    body { overflow-y: auto; }
    .ic-topbar { position: sticky; top: 0; z-index: 20; }
    .ic-layout { align-items: start; min-height: calc(100vh - 68px); }
    .ic-rail { position: sticky; top: 86px; max-height: calc(100vh - 104px); overflow: auto; }
    .ic-right-rail { position: sticky; top: 86px; max-height: calc(100vh - 104px); overflow: auto; }
    .ic-workspace { overflow: visible; padding-bottom: 48px; }
    .workspace-view { display: none; }
    .workspace-view.active { display: grid; }
    .child-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .child-card { text-align: left; border: 1px solid var(--ic-border); background: var(--ic-surface-soft); border-radius: 18px; padding: 14px; }
    .child-card:hover { border-color: var(--ic-border-strong); background: #fff; }
    .child-card.active { outline: 3px solid #bfdbfe; background: #fff; }
    .child-name { font-weight: 900; font-size: 16px; }
    .child-meta { color: var(--ic-muted); font-size: 13px; margin-top: 4px; }
    .timeline { display: grid; gap: 10px; }
    .timeline-row { position: relative; padding-left: 18px; }
    .timeline-row:before { content: ''; position: absolute; left: 2px; top: 8px; width: 8px; height: 8px; border-radius: 99px; background: var(--ic-blue); }
    .timeline-row:after { content: ''; position: absolute; left: 5px; top: 20px; bottom: -14px; width: 2px; background: var(--ic-border); }
    .timeline-row:last-child:after { display: none; }
    @media (max-width: 1180px) { .ic-rail, .ic-right-rail { position: static; max-height: none; } }
  </style>
</head>
<body data-indicare-os-runtime="true">
  <!-- runtime unchanged -->
  <script src="/js/indicare-runtime-safe.js"></script>
  <script src="/js/indicare-connected-care-experience.js"></script>
  <script src="/js/oversight-intelligence-dashboard.js"></script>
  <script src="/js/os-child-workspace-tabs.js"></script>
  <script src="/js/os-command-ui-bridge.js"></script>
</body>
</html>
