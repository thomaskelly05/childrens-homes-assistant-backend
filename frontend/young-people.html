<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IndiCare — Young People</title>

<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/young-people.css">

</head>

<body>

<div class="page">

<header class="page-header">

<div class="header-left">
<h1>Young People</h1>
<p>Residential care records</p>
</div>

<div class="header-actions">
<button id="addYoungPersonBtn" class="btn">
Add Young Person
</button>
</div>

</header>


<div class="filters">

<input
type="text"
id="youngPersonSearch"
placeholder="Search young people..."
spellcheck="false"
/>

<select id="placementFilter">
<option value="">All placements</option>
<option value="active">Active</option>
<option value="planned">Planned</option>
<option value="discharged">Discharged</option>
</select>

</div>


<div id="youngPeopleGrid" class="young-people-grid">

<!-- young people cards render here -->

</div>

</div>


<!-- ADD / EDIT YOUNG PERSON MODAL -->

<div class="modal-overlay hidden" id="youngPersonModal">

<div class="modal">

<div class="modal-header">

<h2 id="youngPersonModalTitle">Add Young Person</h2>

<button id="closeYoungPersonModalBtn">✕</button>

</div>


<form id="youngPersonForm">

<input type="hidden" id="youngPersonId">


<div class="form-grid">

<div>

<label>First Name</label>

<input
type="text"
id="ypFirstName"
required
spellcheck="true"
/>

</div>


<div>

<label>Last Name</label>

<input
type="text"
id="ypLastName"
required
spellcheck="true"
/>

</div>


<div>

<label>Preferred Name</label>

<input
type="text"
id="ypPreferredName"
spellcheck="true"
/>

</div>


<div>

<label>Date of Birth</label>

<input
type="date"
id="ypDOB"
/>

</div>


<div>

<label>Gender</label>

<select id="ypGender">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Non-binary</option>
<option>Other</option>
</select>

</div>


<div>

<label>Ethnicity</label>

<input
type="text"
id="ypEthnicity"
spellcheck="true"
/>

</div>


<div>

<label>Admission Date</label>

<input
type="date"
id="ypAdmissionDate"
/>

</div>


<div>

<label>Placement Status</label>

<select id="ypPlacementStatus">
<option value="active">Active</option>
<option value="planned">Planned</option>
<option value="discharged">Discharged</option>
</select>

</div>


<div>

<label>Summary Risk Level</label>

<select id="ypRiskLevel">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

</div>

</div>


<div class="modal-footer">

<button
type="button"
id="cancelYoungPersonBtn"
class="btn secondary"
>
Cancel
</button>

<button
type="submit"
class="btn"
>
Save Young Person
</button>

</div>

</form>

</div>

</div>


<script src="/js/young-people.js"></script>

</body>
</html>
