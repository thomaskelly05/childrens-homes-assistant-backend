<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IndiCare Assistant</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/styles.css">

</head>

<body>

<div id="app">

<!-- LEFT ICON RAIL -->

<div class="rail">

<button id="menuBtn">☰</button>

<button onclick="newChat()">＋</button>

</div>


<!-- COLLAPSIBLE DRAWER -->

<div id="drawer">

<h2>IndiCare</h2>

<div class="drawer-section">

<label>Mode</label>

<select id="mode">

<option value="reflective">Reflective</option>
<option value="debrief">Debrief</option>
<option value="team">Team</option>
<option value="grounding">Grounding</option>

</select>

</div>


<div class="drawer-section">

<label>Role</label>

<select id="role">

<option value="support_worker">Support worker</option>
<option value="team_leader">Senior</option>
<option value="manager">Manager</option>

</select>

</div>


<label class="toggle">

<input type="checkbox" id="ld">

LD-friendly

</label>


<label class="toggle">

<input type="checkbox" id="slow">

Gentle pace

</label>


</div>


<!-- MAIN CHAT AREA -->

<div class="main">

<div class="header">

<div class="title">

IndiCare Assistant

</div>

</div>


<div id="chat" class="chat">

<div class="welcome">

What would you like to reflect on today?

</div>

</div>


<div class="input-bar">

<textarea id="input" placeholder="Type your reflection..."></textarea>

<button id="sendBtn">Send</button>

</div>


<div class="footer">

© 2026 IndiCare — AI support for residential children's homes

</div>


</div>

</div>

<script src="/app.js"></script>

</body>

</html>
