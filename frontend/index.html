<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IndiCare Assistant</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/styles.css">

</head>

<body>

<div id="app">

<!-- ICON RAIL -->

<nav class="rail">

<button id="menuBtn">☰</button>

<button onclick="newChat()">＋</button>

</nav>


<!-- DRAWER -->

<aside id="drawer">

<div class="drawer-header">

<h2>IndiCare</h2>
<p>Safe AI for residential children's homes</p>

</div>


<div class="drawer-section">

<label>Mode</label>

<select id="mode">

<option value="reflective">Reflective</option>
<option value="debrief">Debrief</option>
<option value="team">Team</option>
<option value="grounding">Grounding</option>

</select>

</div>


<div class="drawer-section">

<label>Role</label>

<select id="role">

<option value="support_worker">Support worker</option>
<option value="team_leader">Team leader</option>
<option value="manager">Manager</option>

</select>

</div>


<div class="drawer-section">

<label>

<input type="checkbox" id="ld">
LD-friendly

</label>

<label>

<input type="checkbox" id="slow">
Gentle pace

</label>

</div>

</aside>


<div class="main">

<header class="header">

<div class="brand">
IndiCare Assistant
</div>

</header>


<div id="chat" class="chat">

<div class="welcome">
What would you like to reflect on today?
</div>

</div>


<div class="inputbar">

<textarea id="input" placeholder="Type your reflection..."></textarea>

<button id="sendBtn">Send</button>

</div>


<footer class="footer">

© 2026 IndiCare — AI support for residential children's homes

</footer>


</div>

</div>

<script src="/app.js"></script>

</body>
</html>
