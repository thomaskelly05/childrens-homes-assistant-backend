<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>IndiCare Assistant</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div id="indicareApp"></div>

<script>

async function checkAuth(){

try{

const res = await fetch("https://api.indicare.co.uk/account/me",{
credentials:"include"
})

if(!res.ok){

window.location="/login.html"
return

}

loadApp()

}catch(e){

console.error("Auth check failed",e)
window.location="/login.html"

}

}

function loadApp(){

document.getElementById("indicareApp").innerHTML = `

<div id="overlay"></div>

<div id="sidebar">

<div class="sidebarHeader">IndiCare</div>

<input id="searchBox" placeholder="Search conversations...">

<div class="sidebarSection">Assistant</div>

<div class="tool" onclick="renderHome()">Home</div>
<div class="tool" onclick="newChat()">New Chat</div>

<div class="sidebarSection">Tools</div>

<div class="tool" onclick="toolPrompt('Write an incident report about')">Incident Report</div>
<div class="tool" onclick="toolPrompt('Create a risk assessment for')">Risk Assessment</div>
<div class="tool" onclick="toolPrompt('Generate a shift handover summary')">Shift Handover</div>
<div class="tool" onclick="toolPrompt('Provide safeguarding advice regarding')">Safeguarding Advice</div>
<div class="tool" onclick="toolPrompt('Reflect on a challenging shift')">Staff Reflection</div>

<div class="sidebarSection">Conversations</div>

<div id="conversationList"></div>

<div class="sidebarSection">Account</div>

<div class="tool" onclick="loadAccount()">Account</div>
<div class="tool" onclick="loadSettings()">Settings</div>
<div class="tool" onclick="logout()">Logout</div>

</div>

<div id="main">

<div id="header">
<div class="logo">IndiCare</div>
</div>

<div id="chat"></div>

<div id="inputBar">

<div id="inputRow">

<textarea id="chatInput" placeholder="Ask IndiCare..."></textarea>

<button class="sendBtn" onclick="sendChat()">Send</button>

</div>

</div>

</div>

`

initApp()

}

checkAuth()

</script>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="app.js"></script>

</body>
</html>
