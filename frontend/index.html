<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndiCare Assistant</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar" class="sidebar-shell">
            <div class="sidebar-top">
                <div class="brand-block">
                    <div class="brand-mark">AI</div>
                    <div class="brand-copy">
                        <h1>IndiCare</h1>
                        <p>Assistant for Children's Homes</p>
                    </div>
                </div>

                <div class="sidebar-toolbar">
                    <button id="new-chat-btn" type="button" class="sidebar-primary-btn">
                        New chat
                    </button>

                    <button id="open-ai-notes-btn" type="button" class="sidebar-secondary-btn">
                        AI meeting notes
                    </button>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-section-title">Recent chats</div>
                    <div id="conversation-list"></div>
                </div>
            </div>
        </aside>

        <main id="workspace" class="workspace-shell">
            <header class="workspace-header">
                <div class="workspace-header-copy">
                    <h2>Assistant workspace</h2>
                    <p id="workspace-user-text">Loading your workspace...</p>
                </div>

                <div class="workspace-header-actions">
                    <button id="logout-btn" type="button" class="ghost-btn">Log out</button>
                </div>
            </header>

            <section class="chat-shell">
                <div id="messages" class="messages"></div>

                <div class="chat-compose">
                    <textarea
                        id="chat-input"
                        placeholder="Type your message here..."
                        rows="3"
                    ></textarea>

                    <div class="chat-compose-actions">
                        <button id="send-btn" type="button" class="primary-btn">
                            Send
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <footer id="footer">
        © IndiCare
    </footer>

    <div id="command-palette" class="command-palette hidden">
        <div class="command-box">
            <input
                id="command-input"
                placeholder="Type a command or search..."
                autocomplete="off"
            />
            <div id="command-results"></div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/workspace.js"></script>
    <script src="/js/conversations.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/command.js"></script>
    <script src="/js/assistant.js"></script>
    <script src="/js/app.js"></script>

    <script>
        async function bootWorkspace() {
            const authenticated = await checkAuth();

            if (!authenticated) {
                window.location.href = "/login.html";
                return;
            }

            const currentUser = await loadCurrentUser();

            const workspaceUserText = document.getElementById("workspace-user-text");
            if (workspaceUserText) {
                if (currentUser && currentUser.first_name) {
                    workspaceUserText.textContent = `Welcome back, ${currentUser.first_name}.`;
                } else if (currentUser && currentUser.email) {
                    workspaceUserText.textContent = `Signed in as ${currentUser.email}.`;
                } else {
                    workspaceUserText.textContent = "Your workspace is ready.";
                }
            }

            const logoutBtn = document.getElementById("logout-btn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", logout);
            }

            const newChatBtn = document.getElementById("new-chat-btn");
            if (newChatBtn) {
                newChatBtn.addEventListener("click", () => {
                    if (window.createConversation) {
                        window.createConversation();
                    }
                });
            }

            const openAiNotesBtn = document.getElementById("open-ai-notes-btn");
            if (openAiNotesBtn) {
                openAiNotesBtn.addEventListener("click", () => {
                    window.location.href = "/ai-note.html";
                });
            }

            if (window.initChat) {
                window.initChat();
            }

            if (window.initAssistantMeetingModal) {
                window.initAssistantMeetingModal();
            }

            if (window.loadConversations) {
                await window.loadConversations();
            }

            if (window.createConversation) {
                window.createConversation();
            }
        }

        bootWorkspace().catch((error) => {
            console.error("Workspace boot failed:", error);
        });
    </script>
</body>
</html>
