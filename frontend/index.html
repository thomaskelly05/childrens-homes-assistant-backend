<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IndiCare Assistant</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="/styles.css">

</head>

<body>

<div id="app">

<!-- ICON RAIL -->

<div class="rail">

<button id="menuBtn">☰</button>
<button onclick="newChat()">＋</button>

</div>


<!-- DRAWER -->

<div class="drawer" id="drawer">

<div class="drawer-header">
<h2>IndiCare</h2>
<p>Safe AI for residential homes</p>
</div>

<div class="drawer-section">
<button onclick="newChat()">+ New chat</button>
</div>

<div class="drawer-section">

<select id="mode">
<option value="reflective">Reflective</option>
<option value="debrief">Debrief</option>
<option value="team">Team reflection</option>
<option value="grounding">Grounding</option>
</select>

<select id="role">
<option value="support_worker">Support worker</option>
<option value="team_leader">Team leader</option>
<option value="manager">Manager</option>
</select>

<label><input type="checkbox" id="ld"> LD-friendly</label>
<label><input type="checkbox" id="slow"> Gentle pace</label>

</div>

</div>


<!-- MAIN -->

<div class="main">

<div class="header">
IndiCare Assistant
</div>

<div id="chat" class="chat">

<div class="welcome">
What would you like to reflect on today?
</div>

</div>


<div class="inputbar">

<button id="micBtn">🎤</button>

<textarea id="input" placeholder="Type your reflection..."></textarea>

<button id="sendBtn">Send</button>

</div>

<div class="footer">
© 2026 IndiCare — AI support for residential children's homes
</div>

</div>

</div>

<script src="/app.js"></script>

</body>
</html>
