<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>IndiCare Assistant</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
margin:0;
font-family:Inter,system-ui;
background:#f7f8fc;
}

#app{
display:flex;
height:100vh;
}

/* SIDEBAR */

#sidebar{
width:280px;
background:white;
border-right:1px solid #e6e8ef;
display:flex;
flex-direction:column;
}

.tool{
padding:12px 16px;
cursor:pointer;
}

.tool:hover{
background:#f4f6fb;
}

#conversationList{
flex:1;
overflow-y:auto;
}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
height:60px;
display:flex;
align-items:center;
padding:0 20px;
border-bottom:1px solid #e6e8ef;
background:white;
}

#chat{
flex:1;
overflow-y:auto;
padding:30px;
display:flex;
flex-direction:column;
gap:16px;
}

.msg{
display:flex;
gap:10px;
max-width:700px;
}

.msg.user{
align-self:flex-end;
flex-direction:row-reverse;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
background:#111;
color:white;
display:flex;
align-items:center;
justify-content:center;
}

.bubble{
background:white;
border:1px solid #e6e8ef;
padding:14px;
border-radius:14px;
}

/* TYPING */

.typing{
display:flex;
gap:4px;
}

.typing span{
width:6px;
height:6px;
background:#9ca3af;
border-radius:50%;
animation:blink 1.2s infinite;
}

.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%,80%,100%{opacity:0}
40%{opacity:1}
}

#inputBar{
border-top:1px solid #e6e8ef;
padding:14px;
background:white;
}

</style>

</head>

<body>

<div id="app">

<div id="sidebar">

<div class="tool" onclick="home()">Home</div>
<div class="tool" onclick="newChat()">New Chat</div>

<div id="conversationList"></div>

</div>


<div id="main">

<div id="header">
IndiCare
</div>

<div id="chat"></div>

<div id="inputBar">

<textarea id="chatInput" style="width:100%;height:60px;"></textarea>

<button onclick="sendChat()">Send</button>

</div>

</div>

</div>

<script>

let conversation=null
let conversationCache={}

const chat=document.getElementById("chat")

function home(){

chat.innerHTML="<h2>Hello, how can I support you today?</h2>"

}


function addMessage(role,text){

const div=document.createElement("div")

div.className="msg "+role

div.innerHTML=`

<div class="avatar">${role==="assistant"?"AI":"You"}</div>

<div class="bubble">${marked.parse(text)}</div>

`

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

return div

}


async function sendChat(){

const input=document.getElementById("chatInput")

const text=input.value.trim()

if(!text) return

addMessage("user",text)

input.value=""

const msg=addMessage("assistant","")

const bubble=msg.querySelector(".bubble")

bubble.innerHTML=`<div class="typing"><span></span><span></span><span></span></div>`

const res=await fetch("/chat/",{

method:"POST",
credentials:"include",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text,
conversation_id:conversation
})

})

const reader=res.body.getReader()
const decoder=new TextDecoder()

let ai=""

while(true){

const {done,value}=await reader.read()

if(done) break

ai+=decoder.decode(value,{stream:true})

bubble.innerHTML=marked.parse(ai)

chat.scrollTop=chat.scrollHeight

}

}


home()

</script>

</body>
</html>
