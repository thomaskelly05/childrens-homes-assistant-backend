<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IndiCare</title>

    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

    <div class="sidebar">
        <h2>IndiCare</h2>
        <nav>
            <button data-section="home">Home</button>
            <button data-section="assistant">IndiCare Assistant</button>
            <button data-section="journal">Journal</button>
            <button data-section="handover">Handover</button>
            <button data-section="tasks">Tasks</button>
            <button data-section="account">Account</button>
        </nav>
    </div>

    <div id="content" class="content">
        <div class="loading">Loading…</div>
    </div>

    <!-- FULL-SCREEN ASSISTANT OVERLAY -->
    <div id="assistant-overlay" class="assistant-overlay hidden">
        <div class="assistant-close">×</div>
        <div id="assistant-container"></div>
    </div>

    <!-- ASSISTANT UI TEMPLATE (injected from Squarespace) -->
    <template id="assistant-ui-template">
        <!-- Squarespace Code Block content goes here -->
    </template>

    <script src="/static/app.js"></script>
</body>
</html>
