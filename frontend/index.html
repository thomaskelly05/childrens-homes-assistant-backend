<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>IndiCare Assistant</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
IndiCare
</div>

<button class="newChatBtn" onclick="newChat()">
+ New Chat
</button>

<div id="history" class="history"></div>

</div>


<!-- MAIN AREA -->

<div class="main">

<div class="header">
IndiCare Assistant
</div>

<div id="chat" class="chat">

<div class="welcome">
How can I support you today?
</div>

</div>

<div class="inputBar">

<textarea
id="input"
placeholder="Ask IndiCare anything..."
></textarea>

<button id="sendBtn">
Send
</button>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
