<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IndiCare</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body class="mode-reflective">

    <!-- Sidebar (icon-only) -->
    <aside id="sidebar">
        <div class="sidebar-item active" data-mode="reflective" title="Reflective">
            <span class="icon">🜁</span>
        </div>
        <div class="sidebar-item" data-mode="debrief" title="Debrief">
            <span class="icon">🜂</span>
        </div>
        <div class="sidebar-item" data-mode="team" title="Team">
            <span class="icon">🜄</span>
        </div>
        <div class="sidebar-item" data-mode="grounding" title="Grounding">
            <span class="icon">🜃</span>
        </div>
        <div class="sidebar-item" data-mode="supervision" title="Supervision">
            <span class="icon">◆</span>
        </div>
        <div class="sidebar-item" data-mode="settings" title="Settings">
            <span class="icon">⚙</span>
        </div>
    </aside>

    <!-- Floating Header -->
    <header id="topbar">
        <div id="mode-indicator">Reflective Mode</div>

        <div id="toggles">
            <label class="toggle">
                <input type="checkbox" id="ld-toggle" />
                <span>LD-friendly</span>
            </label>

            <label class="toggle">
                <input type="checkbox" id="slow-toggle" />
                <span>Slow mode</span>
            </label>
        </div>
    </header>

    <!-- Main Layout -->
    <div id="main">

        <!-- Conversation Column -->
        <section id="chat-container">
            <div id="messages"></div>

            <div id="mode-chips">
                <button class="mode-chip">What stayed with you?</button>
                <button class="mode-chip">What value were you holding?</button>
                <button class="mode-chip">What felt hardest?</button>
            </div>
        </section>

        <!-- Floating Input Bar -->
        <div id="input-bar">
            <textarea id="user-input" placeholder="Type your reflection…"></textarea>
            <button id="send-btn">Send</button>
        </div>

        <!-- Slide-in Supervision Panel -->
        <aside id="supervision-panel">
            <h3>Supervision Summary</h3>
            <p><strong>What stood out:</strong> <span id="sum-stood-out"></span></p>
            <p><strong>Internal experience:</strong> <span id="sum-internal"></span></p>
            <p><strong>Values:</strong> <span id="sum-values"></span></p>
            <p><strong>What felt hard:</strong> <span id="sum-hard"></span></p>
            <p><strong>Support needed:</strong> <span id="sum-support"></span></p>
            <p><strong>What to strengthen:</strong> <span id="sum-strengthen"></span></p>
        </aside>

    </div>

    <script src="app.js"></script>
</body>
</html>
