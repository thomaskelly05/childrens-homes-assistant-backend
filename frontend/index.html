<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>IndiCare Assistant</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

<div class="sidebar">

<div class="logo">
IndiCare
</div>

<button class="newChatBtn" onclick="newChat()">
+ New Chat
</button>

<input id="search" placeholder="Search conversations...">

<div id="history" class="history"></div>

</div>


<div class="main">

<div class="header">
IndiCare Assistant
</div>

<div id="chat" class="chat">

<div class="welcome">
Hello, how can I support you today?
</div>

</div>


<div class="inputBar">

<textarea id="input" placeholder="Ask IndiCare anything..."></textarea>

<button id="sendBtn">Send</button>

</div>

</div>

</div>

<script>

// check login before loading assistant

async function checkAuth(){

const res = await fetch(
"https://api.indicare.co.uk/account/me",
{
credentials:"include"
})

if(!res.ok){

window.location="/login.html"

}

}

checkAuth()

</script>

<script src="app.js"></script>

</body>
</html>
