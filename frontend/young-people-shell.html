<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Children’s Home OS</title>
  <link rel="stylesheet" href="css/young-people-shell.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>🏡 Home OS</h2>
    <nav>
      <button onclick="loadDashboard()">Shift</button>
      <button onclick="loadYoungPeople()">Young People</button>
      <button onclick="loadHandover()">Handover</button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main">

    <!-- Header -->
    <header class="header">
      <h1 id="pageTitle">Shift Dashboard</h1>
      <div class="actions">
        <button onclick="openNoteModal()">➕ Note</button>
        <button onclick="openIncidentModal()">⚠️ Incident</button>
      </div>
    </header>

    <!-- Content -->
    <section id="content" class="content"></section>

  </main>

</div>

<!-- NOTE MODAL -->
<div id="noteModal" class="modal hidden">
  <div class="modal-content">
    <h2>New Daily Note</h2>
    <textarea id="noteInput" placeholder="Type what happened..."></textarea>
    <button onclick="generateAINote()">✨ Improve with AI</button>
    <textarea id="noteOutput" placeholder="AI output..."></textarea>
    <button onclick="saveNote()">Save</button>
    <button onclick="closeModal('noteModal')">Cancel</button>
  </div>
</div>

<!-- INCIDENT MODAL -->
<div id="incidentModal" class="modal hidden">
  <div class="modal-content">
    <h2>New Incident</h2>
    <textarea id="incidentInput" placeholder="Describe incident..."></textarea>
    <button onclick="generateAIIncident()">✨ Structure with AI</button>
    <textarea id="incidentOutput"></textarea>
    <button onclick="saveIncident()">Save</button>
    <button onclick="closeModal('incidentModal')">Cancel</button>
  </div>
</div>

<script src="js/young-people-shell.js"></script>
</body>
</html>
