<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Young People OS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/assistant.css" />

  <style>
    .yp-shell {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      align-items: start;
    }

    .yp-sidebar-card,
    .yp-main-card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .yp-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
      max-height: calc(100dvh - 260px);
      overflow: auto;
    }

    .yp-create-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .yp-create-grid .full {
      grid-column: 1 / -1;
    }

    .yp-profile-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .yp-profile-name {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .yp-profile-meta {
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    .yp-tabbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .yp-tab-panel.hidden {
      display: none !important;
    }

    .entity-row.active {
      border-color: var(--accent);
      background: rgba(37,99,235,.06);
    }

    @media (max-width: 1000px) {
      .yp-shell {
        grid-template-columns: 1fr;
      }

      .yp-list {
        max-height: none;
      }
    }

    @media (max-width: 640px) {
      .yp-create-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="status" class="status"></div>

  <main class="workspace" style="min-height:100dvh;">
    <header class="header">
      <div class="header-left">
        <div id="title" class="title">Young People OS</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <a href="/assistant" class="ghost" style="padding:8px 12px;">Back to Assistant</a>
      </div>
    </header>

    <section class="panel">
      <div class="panel-inner">
        <div class="yp-shell">
          <aside class="yp-sidebar-card">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
              <strong>Young People</strong>
              <button id="ypRefreshBtn" class="ghost" type="button" style="padding:8px 12px;">Refresh</button>
            </div>

            <div style="margin-top:12px;">
              <label for="ypSearch" style="font-size:.82rem;color:var(--muted);font-weight:600;">Search</label>
              <input id="ypSearch" class="field" placeholder="Search by name">
            </div>

            <div class="rowset" style="margin-top:12px;">
              <div>
                <div style="font-weight:600;">Include archived</div>
                <div style="font-size:.8rem;color:var(--muted);">Show archived records</div>
              </div>
              <input id="ypIncludeArchived" type="checkbox" style="width:18px;height:18px;">
            </div>

            <div class="card" style="margin-top:14px;">
              <strong>Create young person</strong>

              <div class="yp-create-grid">
                <div>
                  <label for="ypFirstName">First name</label>
                  <input id="ypFirstName" class="field" placeholder="First name">
                </div>

                <div>
                  <label for="ypLastName">Last name</label>
                  <input id="ypLastName" class="field" placeholder="Last name">
                </div>

                <div class="full">
                  <label for="ypPreferredName">Preferred name</label>
                  <input id="ypPreferredName" class="field" placeholder="Preferred name">
                </div>

                <div>
                  <label for="ypDob">Date of birth</label>
                  <input id="ypDob" class="field" type="date">
                </div>

                <div>
                  <label for="ypAdmissionDate">Admission date</label>
                  <input id="ypAdmissionDate" class="field" type="date">
                </div>

                <div>
                  <label for="ypGender">Gender</label>
                  <input id="ypGender" class="field" placeholder="Gender">
                </div>

                <div>
                  <label for="ypEthnicity">Ethnicity</label>
                  <input id="ypEthnicity" class="field" placeholder="Ethnicity">
                </div>

                <div>
                  <label for="ypPlacementStatus">Placement status</label>
                  <input id="ypPlacementStatus" class="field" placeholder="e.g. placed / planned">
                </div>

                <div>
                  <label for="ypRiskLevel">Summary risk level</label>
                  <input id="ypRiskLevel" class="field" placeholder="e.g. low / medium / high">
                </div>
              </div>

              <button id="ypCreateBtn" class="action" type="button">Create young person</button>
            </div>

            <div id="youngPeopleList" class="yp-list"></div>
          </aside>

          <section id="youngPeopleDetail" class="yp-main-card">
            <div class="yp-profile-head">
              <div>
                <div id="ypCurrentName" class="yp-profile-name">Select a young person</div>
                <div id="ypCurrentMeta" class="yp-profile-meta">Open a record to view profile information.</div>
              </div>
            </div>

            <div class="yp-tabbar">
              <button class="tabbtn active" data-yp-tab="overview" type="button">Overview</button>
              <button class="tabbtn" data-yp-tab="profiles" type="button">Profiles</button>
              <button class="tabbtn" data-yp-tab="contacts" type="button">Contacts</button>
              <button class="tabbtn" data-yp-tab="alerts" type="button">Alerts</button>
            </div>

            <div id="yp-tab-overview" class="yp-tab-panel"></div>
            <div id="yp-tab-profiles" class="yp-tab-panel hidden"></div>
            <div id="yp-tab-contacts" class="yp-tab-panel hidden"></div>
            <div id="yp-tab-alerts" class="yp-tab-panel hidden"></div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/young-people-shell.js"></script>
</body>
</html>
