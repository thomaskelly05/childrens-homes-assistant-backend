<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Young Person Shell</title>
  <link rel="stylesheet" href="/css/young-people-shell.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">IC</div>
        <div>
          <h1>IndiCare OS</h1>
          <p>Young Person Shell</p>
        </div>
      </div>

      <div class="young-person-summary" id="youngPersonSummary">
        <div class="avatar" id="youngPersonAvatar">YP</div>
        <div class="summary-text">
          <h2 id="youngPersonName">No young person selected</h2>
          <p id="youngPersonMeta">Choose from the selector</p>
        </div>
      </div>

      <nav class="nav" id="shellNav">
        <button class="nav-item active" data-view="overview">Overview</button>
        <button class="nav-item" data-view="daily-notes">Daily Notes</button>
        <button class="nav-item" data-view="incidents">Incidents</button>
        <button class="nav-item" data-view="risk">Risk</button>
        <button class="nav-item" data-view="plans">Plans</button>
        <button class="nav-item" data-view="health">Health</button>
        <button class="nav-item" data-view="education">Education</button>
        <button class="nav-item" data-view="family">Family</button>
        <button class="nav-item" data-view="keywork">Keywork</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="pageTitle">Select a young person</h2>
          <p id="pageSubtitle">Open a workspace to begin</p>
        </div>

        <div class="topbar-actions">
          <button class="ghost-btn hidden" id="refreshBtn">Refresh</button>
        </div>
      </header>

      <section id="statusBar" class="status-bar hidden"></section>

      <section id="selectorPanel" class="panel hidden">
        <h3>Select a young person</h3>
        <p class="selector-help">Choose a young person to open their OS workspace.</p>

        <div class="selector-toolbar">
          <input
            type="text"
            id="selectorSearch"
            class="selector-input"
            placeholder="Search by name..."
            autocomplete="off"
          />
          <button class="ghost-btn" id="selectorRefreshBtn">Refresh list</button>
        </div>

        <div id="selectorList" class="selector-list"></div>
      </section>

      <section id="viewContent" class="view-content">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading workspace...</p>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/young-people-shell.js"></script>
</body>
</html>
