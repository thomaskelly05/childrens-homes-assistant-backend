<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>IndiCare OS | Young People Care Hub</title>
  <meta name="description" content="IndiCare OS Young People Care Hub for residential children’s homes." />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#003b96" />

  <link rel="stylesheet" href="/css/young-people-shell.css" />
  <link rel="stylesheet" href="/css/indicare-os.css" />
</head>

<body class="indicare-care-hub-body" data-young-person-id="" data-home-id="" data-provider-id="">

  <main id="ypShell" class="yp-shell" data-workspace="young-people-shell">

    <header id="ypHeader" class="yp-header">
      <div class="yp-brand">
        <div class="yp-brand-mark">IC</div>
        <div>
          <p class="yp-eyebrow">IndiCare OS</p>
          <h1 id="ypPersonName">Young People Care Hub</h1>
          <p id="ypPersonMeta">Select a young person to begin.</p>
        </div>
      </div>

      <div class="yp-header-actions">
        <select id="ypSelector" class="yp-selector"></select>
        <div id="ypStatus" class="yp-status">Loading…</div>
      </div>
    </header>

    <section class="yp-hero">
      <div>
        <p class="yp-eyebrow">Children’s home workspace</p>
        <h2>Calm records, safer decisions, full visibility.</h2>
        <p>Everything about this young person in one operating system.</p>
      </div>
    </section>

    <nav id="ypTabs" class="yp-tabs">
      <button type="button" class="active" data-tab="daily">Daily</button>
      <button type="button" data-tab="health">Health</button>
      <button type="button" data-tab="education">Education</button>
      <button type="button" data-tab="family">Family</button>
      <button type="button" data-tab="incidents">Incidents</button>
      <button type="button" data-tab="medication">Medication</button>
      <button type="button" data-tab="assistant">Assistant</button>
    </nav>

    <section id="ypContent" class="yp-content">

      <section id="ypRecordsPanel" class="yp-panel">
        <div class="yp-panel-head">
          <div>
            <h2 id="ypRecordsTitle">Records</h2>
            <p id="ypRecordsSubtitle">All activity and care logs</p>
          </div>
        </div>

        <div id="ypRecordsList" class="yp-record-list"></div>
      </section>

      <section id="ypAssistantPanel" class="yp-panel hidden">
        <h2 id="ypAssistantTitle">Assistant</h2>
        <div id="ypAssistantMessages"></div>
        <textarea id="ypAssistantInput"></textarea>
        <button id="ypAssistantSend">Send</button>
        <div id="ypAssistantStatus"></div>
      </section>

    </section>

  </main>

  <section id="ypComposer" class="yp-composer hidden">
    <div id="ypComposerBackdrop"></div>
    <div id="ypComposerDialog">
      <h2 id="ypComposerTitle"></h2>
      <p id="ypComposerSubtitle"></p>
      <form id="ypComposerForm">
        <div id="ypComposerFields"></div>
        <button id="ypComposerSaveDraft"></button>
        <button id="ypComposerSubmit"></button>
      </form>
      <div id="ypComposerStatus"></div>
    </div>
  </section>

  <script type="module" src="/js/young-people-shell/modular-entry.js"></script>
  <script src="/js/indicare-os.js"></script>
</body>
</html>
