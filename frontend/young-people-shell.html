<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>IndiCare OS | Young People Operating System</title>
  <meta name="description" content="IndiCare OS Young People Shell for residential children’s homes: care records, chronology, inspection readiness, workforce intelligence and assistant support." />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#163b3a" />
  <meta name="application-name" content="IndiCare OS" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="csrf-token" content="" />
  <link rel="stylesheet" href="/css/young-people-shell.css" />
  <link rel="stylesheet" href="/css/young-people-shell-os.css" />
  <link rel="stylesheet" href="/css/indicare-os-modern.css" />
</head>
<body class="indicare-care-hub-body" data-young-person-id="" data-home-id="" data-provider-id="">
  <main id="ypShell" class="yp-shell yp-os-shell yp-operational-shell" data-workspace="young-people-shell">
    <aside class="yp-os-sidebar" aria-label="IndiCare OS navigation">
      <div class="yp-sidebar-brand"><div class="yp-brand-mark" aria-hidden="true">IC</div><div><p class="yp-eyebrow">IndiCare OS</p><h1>Care Hub</h1></div></div>
      <label class="yp-selector-wrap yp-sidebar-selector" for="ypSelector"><span>Open young person</span><select id="ypSelector" class="yp-selector"><option value="">Loading…</option></select></label>
      <nav id="ypTabs" class="yp-sidebar-nav yp-tabs" aria-label="Young person record areas">
        <button type="button" class="active" data-tab="daily"><span>Daily notes</span><small>Care notes</small></button>
        <button type="button" data-tab="health"><span>Health</span><small>Wellbeing</small></button>
        <button type="button" data-tab="education"><span>Education</span><small>Learning</small></button>
        <button type="button" data-tab="family"><span>Family</span><small>Relationships</small></button>
        <button type="button" data-tab="incidents"><span>Incidents</span><small>Events & responses</small></button>
        <button type="button" data-tab="medication"><span>Medication</span><small>Profiles & records</small></button>
        <button type="button" data-tab="inspection"><span>Inspection</span><small>Safety & evidence</small></button>
        <button type="button" data-tab="assistant"><span>Assistant</span><small>Ask IndiCare</small></button>
      </nav>
      <div class="yp-sidebar-footer">
        <a class="yp-button yp-button-ghost" href="/my-profile">My Profile</a>
        <a class="yp-button yp-button-ghost" href="/staff-profiles">Staff Hub</a>
        <a class="yp-button yp-button-ghost" href="/rostering">Rostering</a>
        <a class="yp-button yp-button-ghost" href="/academy">Academy</a>
        <a class="yp-button yp-button-ghost" href="/os-dashboard">RM Dashboard</a>
        <a class="yp-button yp-button-ghost" href="/assistant">Standalone assistant</a>
        <div id="ypStatus" class="yp-status" role="status" aria-live="polite">Loading…</div>
      </div>
    </aside>
    <section class="yp-os-main-frame">
      <!-- content unchanged -->
    </section>
  </main>

  <!-- Page-specific scripts only (global shell scripts injected server-side) -->
  <script src="/js/young-people-shell.js"></script>
  <script src="/js/young-people-shell-os.js"></script>
  <script src="/js/record-guidance.js"></script>
  <script src="/js/inspection-shell-panel.js"></script>
  <script src="/js/os-alert-banner.js"></script>
  <script src="/js/indicare-os-forms.js"></script>
  <script src="/js/os-intelligence-panel.js"></script>
</body>
</html>
