<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IndiCare</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles.css">
</head>

<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="brand">
      <div class="brand-mark">IC</div>
      <div>
        <div class="brand-title">IndiCare</div>
        <div class="brand-subtitle">Children’s Home</div>
      </div>
    </div>

    <div class="nav">
      <button class="nav-btn active" data-section="command-centre">Command Centre</button>
      <button class="nav-btn" data-section="young-people">Young People</button>
      <button class="nav-btn" data-section="handover">Handover</button>
      <button class="nav-btn" data-section="manager-qa">Manager QA</button>
      <button class="nav-btn" data-section="staff">Staff</button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <div class="page-header">
      <div>
        <h1 id="pageTitle">Command Centre</h1>
        <p id="pageSubtitle"></p>
        <p id="welcomeMessage" class="muted"></p>
      </div>
    </div>

    <!-- STATUS -->
    <div id="statusBar" class="statusbar hidden"></div>

    <!-- BROWSE MODE -->
    <div id="browseMode">

      <!-- COMMAND CENTRE -->
      <section class="section active" id="section-command-centre">
        <div class="grid metrics-grid" id="commandCentreMetrics"></div>

        <div class="grid two-col">
          <div class="card">
            <h3>Alerts</h3>
            <div id="commandCentreAlerts"></div>
          </div>

          <div class="card">
            <h3>Tasks</h3>
            <div id="commandCentreTasks"></div>
          </div>

          <div class="card">
            <h3>Medication</h3>
            <div id="commandCentreMeds"></div>
          </div>

          <div class="card">
            <h3>Handover</h3>
            <div id="commandCentreHandover"></div>
          </div>
        </div>
      </section>

      <!-- YOUNG PEOPLE -->
      <section class="section" id="section-young-people">

        <select id="youngPersonSelect" class="input slim"></select>

        <div class="person-hero">
          <div>
            <h2 id="selectedYoungPersonName"></h2>
            <div id="selectedYoungPersonMeta"></div>
          </div>
          <div id="selectedYoungPersonBadges"></div>
        </div>

        <!-- TABS -->
        <div class="subtabs">
          <button class="tab active" data-tab="overview">Overview</button>
          <button class="tab" data-tab="timeline">Timeline</button>
          <button class="tab" data-tab="daily-notes">Daily</button>
          <button class="tab" data-tab="incidents">Incidents</button>
          <button class="tab" data-tab="health">Health</button>
          <button class="tab" data-tab="education">Education</button>
          <button class="tab" data-tab="family">Family</button>
          <button class="tab" data-tab="keywork">Keywork</button>
          <button class="tab" data-tab="plans">Plans</button>
          <button class="tab" data-tab="reviews">Reviews</button>
          <button class="tab" data-tab="archive">Archive</button>
        </div>

        <!-- PANELS -->
        <div id="tab-overview" class="panel active"></div>
        <div id="tab-timeline" class="panel"></div>
        <div id="tab-daily-notes" class="panel"></div>
        <div id="tab-incidents" class="panel"></div>
        <div id="tab-health" class="panel"></div>
        <div id="tab-education" class="panel"></div>
        <div id="tab-family" class="panel"></div>
        <div id="tab-keywork" class="panel"></div>
        <div id="tab-plans" class="panel"></div>
        <div id="tab-reviews" class="panel"></div>
        <div id="tab-archive" class="panel"></div>

      </section>

      <!-- HANDOVER -->
      <section class="section" id="section-handover">
        <div id="handoverBoard"></div>
      </section>

      <!-- MANAGER -->
      <section class="section" id="section-manager-qa">
        <div id="managerQaContent"></div>
      </section>

      <!-- STAFF -->
      <section class="section" id="section-staff">

        <div class="subtabs">
          <button class="tab active" data-tab="staff-home">Home</button>
          <button class="tab" data-tab="supervision">Supervision</button>
          <button class="tab" data-tab="team-meetings">Meetings</button>
          <button class="tab" data-tab="health-safety">H&S</button>
        </div>

        <div id="tab-staff-home" class="panel active"></div>
        <div id="tab-supervision" class="panel"></div>
        <div id="tab-team-meetings" class="panel"></div>
        <div id="tab-health-safety" class="panel"></div>

      </section>

    </div>

    <!-- DOCUMENT MODAL -->
    <div id="documentMode" class="hidden">
      <button id="docBackBtn" class="btn">← Back</button>
      <h2 id="docTitle"></h2>
      <div id="docMetaLine" class="muted"></div>
      <div id="docBody"></div>
    </div>

  </main>
</div>

<!-- QUICK MENU -->
<div class="quick-menu-wrap">
  <button id="quickMenuBtn" class="quick-menu-btn">☰</button>

  <div id="quickMenu" class="quick-menu hidden">
    <button class="btn" id="quickNewDailyNote">Daily note</button>
    <button class="btn" id="quickNewIncident">Incident</button>
    <button class="btn" id="quickNewHealth">Health</button>
    <button class="btn" id="quickNewFamily">Family</button>
    <button class="btn" id="quickNewKeywork">Keywork</button>
    <button class="btn primary" id="quickNewPlan">Plan</button>
    <hr>
    <button class="btn" id="quickHandover">Handover</button>
    <button class="btn" id="quickMissing">Missing</button>
    <button class="btn" id="quickFireDrill">Fire drill</button>
    <button class="btn" id="quickMedAudit">Medication audit</button>
    <button class="btn" id="quickDailyHsCheck">Daily H&S</button>
  </div>
</div>

<script src="/static/young-people-shell.js"></script>
</body>
</html>
