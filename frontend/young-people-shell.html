<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>IndiCare OS | Young People Operating System</title>
  <link rel="stylesheet" href="/css/young-people-shell.css" />
</head>
<body class="indicare-care-hub-body" data-young-person-id="">
  <main id="ypShell">

    <header>
      <h1 id="ypPersonName">Young Person</h1>
      <select id="ypSelector"></select>
      <div id="ypStatus"></div>
    </header>

    <section id="ypContent">
      <section>
        <h2>Records</h2>
        <div id="ypRecordsList"></div>
      </section>

      <section id="ypInspectionPanel">
        <h2>Inspection & Safety</h2>
        <p id="ypInspectionStatus"></p>

        <h3>Shift Safety</h3>
        <p id="ypInspectionShiftSafety"></p>

        <h3>Responsibility</h3>
        <p id="ypInspectionResponsibility"></p>

        <h3>Child Voice</h3>
        <ul id="ypInspectionChildVoice"></ul>

        <h3>Safeguarding Story</h3>
        <ul id="ypInspectionSafeguardingStory"></ul>

        <h3>Consistency</h3>
        <ul id="ypInspectionConsistency"></ul>

        <h3>Enforcement</h3>
        <p id="ypInspectionEnforcement"></p>
      </section>

    </section>

  </main>

  <script src="/js/young-people-shell.js"></script>
  <script src="/js/inspection-shell-panel.js"></script>
</body>
</html>
