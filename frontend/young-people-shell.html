<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Young Person Panel | IndiCare</title>
  <link rel="stylesheet" href="/css/young-people-shell.css" />
</head>
<body>
  <div class="yp-shell-page">
    <header class="yp-shell-header">
      <div class="yp-shell-header-top">
        <div>
          <h1>Young Person Panel</h1>
          <p>Residential care record workspace</p>
        </div>

        <div class="yp-shell-actions">
          <button class="btn secondary" id="backToListBtn" type="button">Back to list</button>
          <button class="btn" id="editYoungPersonBtn" type="button">Edit profile</button>
        </div>
      </div>

      <div class="yp-selector-row">
        <label for="youngPersonSelector">Select young person</label>
        <select id="youngPersonSelector">
          <option value="">Select a young person</option>
        </select>
      </div>

      <div id="ypSummaryCards" class="yp-summary-cards"></div>

      <div class="yp-status-row">
        <div>
          <h3>Alerts</h3>
          <div id="ypAlerts" class="badge-row">
            <span class="badge muted">No alerts loaded</span>
          </div>
        </div>

        <div>
          <h3>Compliance</h3>
          <div id="ypCompliance" class="badge-row">
            <span class="badge muted">No compliance data yet</span>
          </div>
        </div>
      </div>
    </header>

    <nav class="yp-tabs" id="ypTabs">
      <button class="tab-btn active" data-tab="overview" type="button">Overview</button>
      <button class="tab-btn" data-tab="profile" type="button">Profile</button>
      <button class="tab-btn" data-tab="plans" type="button">Plans</button>
      <button class="tab-btn" data-tab="risk" type="button">Risk</button>
      <button class="tab-btn" data-tab="daily-notes" type="button">Daily Notes</button>
      <button class="tab-btn" data-tab="incidents" type="button">Incidents</button>
      <button class="tab-btn" data-tab="health" type="button">Health</button>
      <button class="tab-btn" data-tab="education" type="button">Education</button>
      <button class="tab-btn" data-tab="family" type="button">Family</button>
      <button class="tab-btn" data-tab="key-work" type="button">Key Work</button>
      <button class="tab-btn" data-tab="chronology" type="button">Chronology</button>
      <button class="tab-btn" data-tab="compliance" type="button">Compliance</button>
    </nav>
