<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Young Person Shell</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --line: #d9e2ec;
      --text: #243b53;
      --muted: #6b7c93;
      --primary: #2563eb;
      --primary-soft: #eff6ff;
      --success: #15803d;
      --danger: #b91c1c;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 20px;
      overflow-y: auto;
    }

    .sidebar h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .sidebar p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .search-box {
      margin-bottom: 16px;
    }

    .search-box input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    .search-box input:focus {
      border-color: var(--primary);
    }

    .young-people-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .yp-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      background: #fff;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .yp-card:hover {
      border-color: var(--primary);
      background: #fafcff;
    }

    .yp-card.active {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    .yp-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .yp-meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .main {
      padding: 24px;
      overflow-y: auto;
    }

    .shell-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .shell-header h2 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .shell-header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid #cde7d4;
      background: #edf9f0;
      color: var(--success);
      font-size: 13px;
      font-weight: 700;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .empty-state,
    .loading-state,
    .error-state {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .error-state {
      color: var(--danger);
    }

    .muted {
      color: var(--muted);
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .tab-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .tab-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .section-title {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .info-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      background: #fff;
    }

    .info-card h4 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .info-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      white-space: pre-wrap;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    .placeholder-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .placeholder-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      background: #fff;
    }

    .placeholder-item strong {
      display: block;
      margin-bottom: 6px;
    }

    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 13px;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--line);
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>Young People</h1>
      <p>Select a young person to open their shell.</p>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by name..." />
      </div>

      <div id="youngPeopleList" class="young-people-list">
        <div class="loading-state">Loading young people...</div>
      </div>
    </aside>

    <main class="main">
      <div id="mainContent">
        <div class="empty-state">
          <h2 style="margin-top: 0;">Young Person Shell</h2>
          <p class="muted">Select a young person from the left to load their record.</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    const tabs = [
      "overview",
      "profile",
      "plans",
      "risk",
      "daily-notes",
      "incidents",
      "health",
      "education",
      "family",
      "key-work",
      "chronology",
      "compliance"
    ];

    let youngPeople = [];
    let selectedYoungPerson = null;
    let activeTab = "overview";

    const youngPeopleListEl = document.getElementById("youngPeopleList");
    const mainContentEl = document.getElementById("mainContent");
    const searchInputEl = document.getElementById("searchInput");

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, {
        credentials: "include",
        headers: {
          "Content-Type": "application/json"
        },
        ...options
      });

      if (!response.ok) {
        let message = `Request failed: ${response.status}`;
        try {
          const errorData = await response.json();
          if (errorData.detail) {
            message = errorData.detail;
          }
        } catch (e) {}
        throw new Error(message);
      }

      return response.json();
    }

    async function loadYoungPeople() {
      youngPeopleListEl.innerHTML = `<div class="loading-state">Loading young people...</div>`;

      try {
        const data = await fetchJson("/young-people");
        youngPeople = Array.isArray(data) ? data : [];
        renderYoungPeopleList(filterYoungPeople(searchInputEl.value.trim()));

        if (youngPeople.length > 0) {
          await selectYoungPerson(youngPeople[0].id);
        } else {
          mainContentEl.innerHTML = `
            <div class="empty-state">
              <h2 style="margin-top: 0;">No young people found</h2>
              <p class="muted">There are currently no young people to display.</p>
            </div>
          `;
        }
      } catch (error) {
        youngPeopleListEl.innerHTML = `
          <div class="error-state">
            Failed to load young people.<br />
            <span class="muted">${escapeHtml(error.message)}</span>
          </div>
        `;
      }
    }

    function renderYoungPeopleList(items) {
      if (!items.length) {
        youngPeopleListEl.innerHTML = `
          <div class="empty-state">
            No matching young people found.
          </div>
        `;
        return;
      }

      youngPeopleListEl.innerHTML = items.map(person => {
        const fullName = `${person.first_name || ""} ${person.last_name || ""}`.trim() || "Unnamed young person";
        const dob = person.date_of_birth || person.dob || "Not recorded";
        const placement = person.placement_name || person.home_name || "Not recorded";
        const isActive = selectedYoungPerson && selectedYoungPerson.id === person.id;

        return `
          <div class="yp-card ${isActive ? "active" : ""}" data-id="${person.id}">
            <div class="yp-name">${escapeHtml(fullName)}</div>
            <div class="yp-meta">
              DOB: ${escapeHtml(String(dob))}<br>
              Placement: ${escapeHtml(String(placement))}
            </div>
          </div>
        `;
      }).join("");

      document.querySelectorAll(".yp-card").forEach(card => {
        card.addEventListener("click", async () => {
          const id = Number(card.dataset.id);
          await selectYoungPerson(id);
        });
      });
    }

    async function selectYoungPerson(id) {
      mainContentEl.innerHTML = `<div class="loading-state">Loading young person shell...</div>`;

      try {
        const person = await fetchJson(`/young-people/${id}`);
        selectedYoungPerson = person;
        activeTab = "overview";
        renderYoungPeopleList(filterYoungPeople(searchInputEl.value.trim()));
        renderShell();
      } catch (error) {
        mainContentEl.innerHTML = `
          <div class="error-state">
            Failed to load young person.<br />
            <span class="muted">${escapeHtml(error.message)}</span>
          </div>
        `;
      }
    }

    function renderShell() {
      if (!selectedYoungPerson) return;

      const fullName = `${selectedYoungPerson.first_name || ""} ${selectedYoungPerson.last_name || ""}`.trim() || "Young Person";

      mainContentEl.innerHTML = `
        <div class="shell-header">
          <div>
            <h2>${escapeHtml(fullName)}</h2>
            <p>ID: ${escapeHtml(String(selectedYoungPerson.id || ""))}</p>
          </div>
          <div class="status-badge">${escapeHtml(selectedYoungPerson.status || "Current")}</div>
        </div>

        <div class="tabs">
          ${tabs.map(tab => `
            <button class="tab-btn ${activeTab === tab ? "active" : ""}" data-tab="${tab}">
              ${formatTabLabel(tab)}
            </button>
          `).join("")}
        </div>

        <div class="panel">
          ${renderTabContent(activeTab, selectedYoungPerson)}
        </div>
      `;

      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          activeTab = btn.dataset.tab;
          renderShell();
        });
      });
    }

    function renderTabContent(tab, person) {
      switch (tab) {
        case "overview":
          return `
            <h3 class="section-title">Overview</h3>
            <div class="grid">
              <div class="info-card">
                <h4>Full Name</h4>
                <p>${escapeHtml(`${person.first_name || ""} ${person.last_name || ""}`.trim() || "Not recorded")}</p>
              </div>
              <div class="info-card">
                <h4>Date of Birth</h4>
                <p>${escapeHtml(String(person.date_of_birth || person.dob || "Not recorded"))}</p>
              </div>
              <div class="info-card">
                <h4>Placement</h4>
                <p>${escapeHtml(String(person.placement_name || person.home_name || "Not recorded"))}</p>
              </div>
              <div class="info-card">
                <h4>Status</h4>
                <p>${escapeHtml(String(person.status || "Current"))}</p>
              </div>
              <div class="info-card full-width">
                <h4>Summary</h4>
                <p>${escapeHtml(String(person.summary || person.overview || "No overview added yet."))}</p>
              </div>
            </div>
          `;

        case "profile":
          return `
            <h3 class="section-title">Profile</h3>
            <div class="grid">
              <div class="info-card">
                <h4>Preferred Name</h4>
                <p>${escapeHtml(String(person.preferred_name || "Not recorded"))}</p>
              </div>
              <div class="info-card">
                <h4>Gender</h4>
                <p>${escapeHtml(String(person.gender || "Not recorded"))}</p>
              </div>
              <div class="info-card">
                <h4>Ethnicity</h4>
                <p>${escapeHtml(String(person.ethnicity || "Not recorded"))}</p>
              </div>
              <div class="info-card">
                <h4>Legal Status</h4>
                <p>${escapeHtml(String(person.legal_status || "Not recorded"))}</p>
              </div>
              <div class="info-card full-width">
                <h4>About Me</h4>
                <p>${escapeHtml(String(person.about_me || "No profile details added yet."))}</p>
              </div>
            </div>
          `;

        case "key-work":
          return `
            <h3 class="section-title">Key Work</h3>
            <div class="placeholder-list">
              <div class="placeholder-item">
                <strong>Key work route connected</strong>
                <span class="muted">This shell can use <code>GET /young-people/${person.id}/keywork</code>.</span>
              </div>
              <div class="placeholder-item">
                <strong>Create key work session</strong>
                <span class="muted">Use <code>POST /young-people/keywork</code>.</span>
              </div>
              <div class="placeholder-item">
                <strong>Edit key work session</strong>
                <span class="muted">Use <code>PUT /young-people/keywork/{keywork_session_id}</code>.</span>
              </div>
            </div>
          `;

        default:
          return `
            <h3 class="section-title">${escapeHtml(formatTabLabel(tab))}</h3>
            <div class="placeholder-list">
              <div class="placeholder-item">
                <strong>${escapeHtml(formatTabLabel(tab))}</strong>
                <span class="muted">This is the reset shell placeholder for this section.</span>
              </div>
              <div class="placeholder-item">
                <strong>Young person</strong>
                <span class="muted">${escapeHtml(`${person.first_name || ""} ${person.last_name || ""}`.trim())}</span>
              </div>
            </div>
          `;
      }
    }

    function formatTabLabel(tab) {
      return tab
        .split("-")
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");
    }

    function filterYoungPeople(query) {
      if (!query) return youngPeople;

      const q = query.toLowerCase();
      return youngPeople.filter(person => {
        const fullName = `${person.first_name || ""} ${person.last_name || ""}`.trim().toLowerCase();
        return fullName.includes(q);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    searchInputEl.addEventListener("input", () => {
      renderYoungPeopleList(filterYoungPeople(searchInputEl.value.trim()));
    });

    loadYoungPeople();
  </script>
</body>
</html>
