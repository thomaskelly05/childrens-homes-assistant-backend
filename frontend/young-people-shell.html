<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IndiCare OS</title>
  <link rel="stylesheet" href="/css/young-people-shell.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="app-rail">
      <div class="rail-brand">
        <div class="rail-logo">IC</div>
        <div>
          <h1>IndiCare OS</h1>
          <p>Residential Care Operating System</p>
        </div>
      </div>

      <div class="rail-card">
        <div class="rail-label">Signed in</div>
        <div id="currentUserChip">Loading…</div>
      </div>

      <nav id="primaryNav" class="rail-nav"></nav>

      <div class="rail-card rail-actions">
        <button id="refreshBtn" class="btn btn-primary btn-full">Refresh</button>
        <button id="logoutBtn" class="btn btn-ghost btn-full">Logout</button>
      </div>

      <div class="rail-card">
        <label class="rail-label" for="youngPeopleSearch">Find young person</label>
        <input id="youngPeopleSearch" type="text" placeholder="Search by name or status" />
      </div>

      <div class="rail-card rail-list">
        <div class="rail-label">Young people</div>
        <div id="youngPeopleList" class="young-people-list"></div>
      </div>
    </aside>

    <main class="workspace">
      <header class="workspace-topbar">
        <div>
          <div class="workspace-kicker">Children’s Home Operating System</div>
          <h2 id="pageTitle">Home</h2>
          <p id="pageSubtitle">Command, care, quality and inspection readiness in one place.</p>
        </div>

        <div id="globalActions" class="toolbar-actions"></div>
      </header>

      <section class="context-bar">
        <div class="context-main">
          <div id="heroAvatar" class="context-avatar">OS</div>
          <div>
            <h3 id="heroTitle">IndiCare OS</h3>
            <p id="heroDescription">Select a young person to begin.</p>
          </div>
        </div>
        <div id="heroBadges" class="context-badges"></div>
      </section>

      <section id="secondaryNavWrap" class="subnav-wrap hidden">
        <nav id="secondaryNav" class="subnav"></nav>
      </section>

      <section id="workspaceContent" class="workspace-content">
        <div class="empty-state">Loading workspace…</div>
      </section>
    </main>
  </div>

  <!-- UNIVERSAL MODAL -->
  <div class="modal hidden" id="appModal">
    <div class="modal-card modal-xl">
      <div class="modal-header">
        <h3 id="modalTitle">Editor</h3>
        <button class="icon-btn" id="closeModalBtn">✕</button>
      </div>

      <div class="modal-body">
        <div id="modalContent"></div>
        <div id="modalStatus" class="status-text"></div>
      </div>
    </div>
  </div>

  <script src="/js/young-people-shell.js"></script>
</body>
</html>
