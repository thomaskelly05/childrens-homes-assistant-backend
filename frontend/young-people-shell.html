<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Young People Shell</title>
  <link rel="stylesheet" href="css/young-people-shell.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">🏡</div>
        <div>
          <h1>Home OS</h1>
          <p>Young People Shell</p>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-view="dashboard">Shift</button>
        <button class="nav-btn" data-view="young-people">Young People</button>
      </nav>

      <div class="sidebar-footer">
        <div class="status-pill">
          <span class="dot"></span>
          System ready
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="pageTitle">Shift Dashboard</h2>
          <p id="pageSubtitle">Overview of young people in the home</p>
        </div>

        <div class="topbar-actions">
          <button class="secondary-btn" id="refreshBtn">Refresh</button>
        </div>
      </header>

      <section class="content-grid">
        <section class="panel panel-left">
          <div class="panel-header">
            <h3>Young People</h3>
            <div class="panel-tools">
              <input
                id="youngPeopleSearch"
                type="text"
                placeholder="Search young people..."
              />
            </div>
          </div>

          <div id="youngPeopleList" class="young-people-list"></div>
        </section>

        <section class="panel panel-right">
          <div class="panel-header">
            <h3>Profile Overview</h3>
          </div>

          <div id="profilePanel" class="profile-panel empty-panel">
            Select a young person to view their profile.
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="js/young-people-shell.js"></script>
</body>
</html>
