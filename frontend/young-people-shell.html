<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IndiCare OS</title>
  <link rel="stylesheet" href="/css/young-people-shell.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="app-sidebar">
      <div class="brand-block">
        <div class="brand-logo">IC</div>
        <div class="brand-copy">
          <h1>IndiCare OS</h1>
          <p>Therapeutic Residential Care Platform</p>
        </div>
      </div>

      <nav id="primaryNav" class="sidebar-nav"></nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-label">Signed in</div>
          <div id="currentUserChip">Loading…</div>
        </div>

        <div class="sidebar-actions">
          <button id="refreshBtn" class="btn btn-primary btn-full">Refresh</button>
          <button id="logoutBtn" class="btn btn-ghost btn-full">Logout</button>
        </div>
      </div>
    </aside>

    <main class="workspace">
      <header class="workspace-header">
        <div class="workspace-header-top">
          <div>
            <div class="workspace-kicker">Residential Children’s Homes Operating System</div>
            <h2 id="pageTitle">Home</h2>
            <p id="pageSubtitle">Therapeutic recording, oversight, compliance and inspection readiness.</p>
          </div>

          <div id="globalActions" class="header-actions"></div>
        </div>

        <div class="workspace-context">
          <div class="context-left">
            <div class="field field-compact yp-select-field">
              <label for="youngPersonSelect">Young person</label>
              <select id="youngPersonSelect"></select>
            </div>

            <div class="hero-block">
              <div id="heroAvatar" class="hero-avatar">OS</div>
              <div class="hero-copy">
                <h3 id="heroTitle">IndiCare OS</h3>
                <p id="heroDescription">Select a young person to begin.</p>
              </div>
            </div>
          </div>

          <div id="heroBadges" class="hero-badges"></div>
        </div>
      </header>

      <section id="secondaryNavWrap" class="subnav-wrap hidden">
        <nav id="secondaryNav" class="subnav"></nav>
      </section>

      <section id="workspaceContent" class="workspace-content">
        <div class="empty-state">Loading workspace…</div>
      </section>
    </main>
  </div>

  <div class="modal hidden modal-fullscreen" id="appModal">
    <div class="modal-card modal-card-full">
      <div class="modal-header">
        <div>
          <div class="workspace-kicker" id="modalKicker">Workspace</div>
          <h3 id="modalTitle">Modal</h3>
        </div>
        <div class="header-actions">
          <button class="btn btn-ghost" id="closeModalBtn">Close</button>
        </div>
      </div>
      <div class="modal-body modal-body-full">
        <div id="modalContent"></div>
        <div id="modalStatus" class="status-text"></div>
      </div>
    </div>
  </div>

  <script src="/js/young-people-shell.js"></script>
</body>
</html>
