<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home OS</title>
  <link rel="stylesheet" href="css/young-people-shell.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">🏡 Home OS</div>

    <button onclick="loadDashboard()">Shift</button>
    <button onclick="loadYoungPeople()">Young People</button>
    <button onclick="loadHandover()">Handover</button>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Top Bar -->
    <div class="topbar">
      <h1 id="pageTitle">Shift</h1>

      <div class="top-actions">
        <button onclick="openNoteModal()">+ Note</button>
        <button onclick="openIncidentModal()">+ Incident</button>
      </div>
    </div>

    <!-- Main Grid -->
    <div class="grid">

      <!-- Left: Young People -->
      <div class="panel">
        <h3>Young People</h3>
        <div id="youngPeopleList"></div>
      </div>

      <!-- Right: Activity -->
      <div class="panel">
        <h3>Activity</h3>
        <div id="activityFeed"></div>
      </div>

    </div>

  </main>

</div>

<!-- NOTE MODAL -->
<div id="noteModal" class="modal hidden">
  <div class="modal-content">
    <h2>Write Note</h2>
    <textarea id="noteInput"></textarea>
    <button onclick="runAINote()">Improve with AI</button>
    <textarea id="noteOutput"></textarea>
    <button onclick="saveNote()">Save</button>
  </div>
</div>

<!-- INCIDENT MODAL -->
<div id="incidentModal" class="modal hidden">
  <div class="modal-content">
    <h2>Log Incident</h2>
    <textarea id="incidentInput"></textarea>
    <button onclick="runAIIncident()">Structure with AI</button>
    <textarea id="incidentOutput"></textarea>
    <button onclick="saveIncident()">Save</button>
  </div>
</div>

<script src="js/young-people-shell.js"></script>
</body>
</html>
