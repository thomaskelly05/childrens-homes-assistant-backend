<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Child OS</title>
<link rel="stylesheet" href="/css/indicare-os-base.css" />
<link rel="stylesheet" href="/css/os-child.css" />
</head>
<body>
<div class="ic-os">
<aside class="ic-side"><div class="ic-brand"><div class="ic-mark">IC</div><div><h1>INDICARE</h1><p>Child OS</p></div></div></aside>
<header class="ic-top"><h2>Child OS</h2></header>
<main class="ic-main">
<div class="child-hero">
<h1>Jamie Smith</h1>
<p>Everything about this young person</p>
<div class="child-profile-strip">
<div><span>Age</span><strong>15</strong></div>
<div><span>Risk</span><strong>Medium</strong></div>
<div><span>Key worker</span><strong>Sarah</strong></div>
<div><span>Status</span><strong>Stable</strong></div>
</div>
</div>
<div class="ic-section-tabs">
<button class="active">Daily</button>
<button>Incidents</button>
<button>Risk</button>
<button>Health</button>
</div>
<div class="ic-record-grid">
<div class="ic-record"><div class="ic-record-type">Incident</div><h3>Physical aggression</h3><p>After phone call</p><div class="ic-record-actions"><button class="ic-btn primary">Open</button></div></div>
</div>
</main>
</div>
<script src="/js/os-child.js"></script>
</body>
</html>
